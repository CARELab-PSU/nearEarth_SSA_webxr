/* --- Open-Meteo fetch (CORS-safe, no key needed) --- */
async function fetchWeather(lat,lon){
  // Use observer&#x27;s IANA timezone so Open-Meteo returns times in local time
  let tz=encodeURIComponent(SITE.tz||&#x27;UTC&#x27;);
  let url=`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&amp;longitude=${lon.toFixed(4)}`
    +`&amp;hourly=cloud_cover,wind_speed_10m,precipitation_probability,cape,lifted_index,dewpoint_2m,temperature_2m`
    +`&amp;forecast_days=2&amp;timezone=${tz}`;
  try{
    let r=await fetch(url,{signal:fetchTimeoutSignal(30000)});
    if(r.ok){
      let j=await r.json();
      if(j&amp;&amp;j.hourly) return j.hourly;
    }
  }catch(e){}
  return null;
}

/* --- AirNow fetch --- */
async function fetchAQI(lat,lon){
  let omUrl=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat.toFixed(4)}&amp;longitude=${lon.toFixed(4)}&amp;current=us_aqi,pm2_5`;
  try{
    let r=await fetch(omUrl,{signal:fetchTimeoutSignal(6000)});
    if(r.ok){
      let j=await r.json();
      if(j&amp;&amp;j.current) return{aqi:j.current.us_aqi,pm25:j.current.pm2_5};
    }
  }catch(e){}
  return null;
}

/* --- Derive seeing (1-5) from CAPE + lifted index --- */
function deriveSee(cape,li){
  // Lifted index: positive=stable(good seeing), negative=unstable(bad seeing)
  // CAPE: 0=stable, &gt;500=convective
  if(li===null||li===undefined) return 3;
  if(li&gt;4&amp;&amp;(cape||0)&lt;100) return 5;   // excellent
  if(li&gt;2&amp;&amp;(cape||0)&lt;300) return 4;   // good
  if(li&gt;0) return 3;                   // average
  if(li&gt;-2) return 2;                  // poor
  return 1;                            // bad
}

/* --- Derive transparency (1-8) from dewpoint depression --- */
function deriveTrans(temp,dew,cloud){
  if(cloud&gt;75) return 1; // too cloudy
  let dep=temp-dew; // dewpoint depression — higher=drier=more transparent
  if(dep&gt;20) return 8;
  if(dep&gt;15) return 7;
  if(dep&gt;12) return 6;
  if(dep&gt;9)  return 5;
  if(dep&gt;6)  return 4;
  if(dep&gt;3)  return 3;
  return 2;
}

/* --- Color helpers --- */
function cloudColor(v){ // 0-100% cloud cover
  if(v&lt;=10) return&#x27;#032a1a&#x27;;
  if(v&lt;=25) return&#x27;#054a28&#x27;;
  if(v&lt;=40) return&#x27;#3aaa60&#x27;;
  if(v&lt;=55) return&#x27;#bbbb66&#x27;;
  if(v&lt;=70) return&#x27;#ccaa33&#x27;;
  if(v&lt;=85) return&#x27;#cc5500&#x27;;
  return&#x27;#aa1100&#x27;;
}
function seeingColor(v){ // 1=bad..5=excellent
  const c=[&#x27;#aa1100&#x27;,&#x27;#cc5500&#x27;,&#x27;#bbaa00&#x27;,&#x27;#44aa44&#x27;,&#x27;#0088ff&#x27;];
  return c[Math.min(4,Math.max(0,v-1))];
}
function transpColor(v){ // 1=poor..8=excellent
  const c=[&#x27;#aa1100&#x27;,&#x27;#882200&#x27;,&#x27;#aa5500&#x27;,&#x27;#999900&#x27;,&#x27;#448844&#x27;,&#x27;#0066cc&#x27;,&#x27;#0044ff&#x27;,&#x27;#0022dd&#x27;];
  return c[Math.min(7,Math.max(0,v-1))];
}
function windColor(v){ // m/s
  if(v&lt;3) return &#x27;#0044cc&#x27;;
  if(v&lt;6) return &#x27;#008844&#x27;;
  if(v&lt;10) return &#x27;#888800&#x27;;
  if(v&lt;15) return &#x27;#cc5500&#x27;;
  return &#x27;#cc1100&#x27;;
}
function smokeColor(aqi){
  if(aqi===null||aqi===undefined) return&#x27;#1a1a2a&#x27;;
  if(aqi&lt;=50) return&#x27;#032a1a&#x27;;
  if(aqi&lt;=100) return&#x27;#887700&#x27;;
  if(aqi&lt;=150) return&#x27;#cc5500&#x27;;
  if(aqi&lt;=200) return&#x27;#aa1100&#x27;;
  return&#x27;#660000&#x27;;
}

/* --- Tooltip text --- */
const wxTip={
  cloud:v=&gt;&#x27;Cloud cover: &#x27;+v+&#x27;%&#x27;,
  seeing:v=&gt;{const l=[&#x27;Bad 1/5&#x27;,&#x27;Poor 2/5&#x27;,&#x27;Average 3/5&#x27;,&#x27;Good 4/5&#x27;,&#x27;Excellent 5/5&#x27;];return&#x27;Seeing: &#x27;+l[Math.min(4,v-1)];},
  transp:v=&gt;{const l=[&#x27;Poor&#x27;,&#x27;Below Avg&#x27;,&#x27;Below Avg&#x27;,&#x27;Average&#x27;,&#x27;Above Avg&#x27;,&#x27;Transparent&#x27;,&#x27;Transparent&#x27;,&#x27;Transparent&#x27;];return&#x27;Transparency: &#x27;+l[Math.min(7,v-1)];},
  wind:v=&gt;v.toFixed(1)+&#x27; m/s · &#x27;+(v*1.944).toFixed(0)+&#x27; kt&#x27;,
  dark:(d,lm)=&gt;d.label+(lm!==null?&#x27; · LimMag &#x27;+lm:&#x27;&#x27;),
  smoke:aqi=&gt;aqi===null?&#x27;AQI: No data&#x27;:&#x27;AQI &#x27;+aqi+(aqi&lt;=50?&#x27; · Good&#x27;:aqi&lt;=100?&#x27; · Moderate&#x27;:aqi&lt;=150?&#x27; · Unhealthy (sensitive)&#x27;:&#x27; · Unhealthy&#x27;)
};

/* --- Main fetch &amp; render --- */
let wxData=null;

async function fetchConditions(){
  let lat=SITE.lat_deg,lon=SITE.lon_deg;
  document.getElementById(&#x27;wx-status&#x27;).textContent=&#x27;FETCHING…&#x27;;
  document.getElementById(&#x27;wx-site-label&#x27;).textContent=lat.toFixed(2)+&#x27;°N &#x27;+Math.abs(lon).toFixed(2)+&#x27;°&#x27;+(lon&gt;=0?&#x27;E&#x27;:&#x27;W&#x27;);

  let [hourly, aqiData] = await Promise.all([fetchWeather(lat,lon), fetchAQI(lat,lon)]);

  if(!hourly){document.getElementById(&#x27;wx-status&#x27;).textContent=&#x27;WEATHER UNAVAILABLE&#x27;;return;}

  wxData={hourly,aqiData,lat,lon,fetchedAt:Date.now()};
  renderConditions();
  overlayPasses();
  document.getElementById(&#x27;wx-status&#x27;).textContent=&#x27;UPDATED &#x27;+fmtLocalTime(new Date(),SITE.tz).slice(0,5)+&#x27; LOCAL&#x27;;
}

function renderConditions(){
  if(!wxData) return;
  const {hourly,aqiData,lat,lon}=wxData;
  const now=new Date();

  // Find the index of the current hour in the hourly array
  // Open-Meteo now returns times in observer local time e.g. &quot;2026-05-16T10:00&quot;
  const times=hourly.time;
  const nowLocal=fmtLocalTime(now,SITE.tz); // &quot;HH:MM:SS&quot;
  const nowLocalHour=fmtLocalTime(now,SITE.tz).slice(0,13); // unused — match by index instead
  // Build a local date string to match against Open-Meteo&#x27;s local time strings
  const nowLocalStr=(()=&gt;{
    try{
      return new Intl.DateTimeFormat(&#x27;sv-SE&#x27;,{timeZone:SITE.tz,year:&#x27;numeric&#x27;,month:&#x27;2-digit&#x27;,day:&#x27;2-digit&#x27;,hour:&#x27;2-digit&#x27;,hour12:false}).format(now).slice(0,13);
    }catch(e){return now.toISOString().slice(0,13);}
  })();
  let startIdx=times.findIndex(t=&gt;t.slice(0,13)===nowLocalStr);
  if(startIdx&lt;0) startIdx=0;

  // Show next 24 hours, one cell per hour
  const numSlots=24;
  const slots=[];
  for(let i=0;i&lt;numSlots;i++){
    let idx=startIdx+i;
    if(idx&gt;=times.length) break;
    // times[idx] is local time string e.g. &quot;2026-05-16T22:00&quot;
    // Convert to real UTC using the site&#x27;s known offset (tzOffsetMin)
    let localHour=parseInt(times[idx].slice(11,13));
    // Parse local string as if UTC, then subtract the local offset to get true UTC
    let localMs=Date.parse(times[idx]+&#x27;:00Z&#x27;); // treat as UTC first
    let slotUTC=new Date(localMs - SITE.tzOffsetMin*60000); // shift back to real UTC
    slots.push({
      localHour,
      slotUTC,
      cloud: hourly.cloud_cover[idx]??50,
      wind:  hourly.wind_speed_10m[idx]??0,
      cape:  hourly.cape[idx]??0,
      li:    hourly.lifted_index[idx]??0,
      temp:  hourly.temperature_2m[idx]??10,
      dew:   hourly.dewpoint_2m[idx]??5,
    });
  }

  // Clear all cells
  [&#x27;wx-hours&#x27;,&#x27;wx-cloud&#x27;,&#x27;wx-seeing&#x27;,&#x27;wx-transp&#x27;,&#x27;wx-dark&#x27;,&#x27;wx-wind&#x27;,&#x27;wx-smoke&#x27;].forEach(id=&gt;{
    document.getElementById(id).innerHTML=&#x27;&#x27;;
  });

  const tooltip=document.getElementById(&#x27;tooltip&#x27;);

  slots.forEach((s,i)=&gt;{
    let hh=padZ(s.localHour);
    let dark=limitingMag(s.slotUTC,lat,lon);
    let see=deriveSee(s.cape,s.li);
    let trans=deriveTrans(s.temp,s.dew,s.cloud);

    let defs=[
      {id:&#x27;wx-hours&#x27;, label:hh,  bg:&#x27;transparent&#x27;, color:&#x27;var(--muted)&#x27;, tip:null},
      {id:&#x27;wx-cloud&#x27;, bg:cloudColor(s.cloud),  tip:wxTip.cloud(Math.round(s.cloud))},
      {id:&#x27;wx-seeing&#x27;,bg:seeingColor(see),     tip:wxTip.seeing(see)},
      {id:&#x27;wx-transp&#x27;,bg:transpColor(trans),   tip:wxTip.transp(trans)},
      {id:&#x27;wx-dark&#x27;,  bg:darkColor(dark.dark), tip:wxTip.dark(dark,dark.lm)},
      {id:&#x27;wx-wind&#x27;,  bg:windColor(s.wind),    tip:wxTip.wind(s.wind)},
      {id:&#x27;wx-smoke&#x27;, bg:smokeColor(aqiData?.aqi), tip:wxTip.smoke(aqiData?.aqi)},
    ];

    defs.forEach(d=&gt;{
      let cell=document.createElement(&#x27;div&#x27;);
      cell.className=&#x27;wx-cell&#x27;;
      cell.style.background=d.bg;
      if(d.label){
        cell.style.display=&#x27;flex&#x27;;cell.style.alignItems=&#x27;center&#x27;;cell.style.justifyContent=&#x27;center&#x27;;
        cell.style.fontSize=&#x27;6px&#x27;;cell.style.color=d.color||&#x27;var(--muted)&#x27;;
        cell.style.fontFamily=&#x27;var(--font-hud)&#x27;;cell.textContent=d.label;
        cell.style.background=&#x27;transparent&#x27;;cell.style.height=&#x27;10px&#x27;;
      }
      if(d.tip){
        cell.addEventListener(&#x27;mouseenter&#x27;,e=&gt;{
          tooltip.textContent=d.tip;tooltip.style.display=&#x27;block&#x27;;
          tooltip.style.left=(e.clientX+12)+&#x27;px&#x27;;tooltip.style.top=(e.clientY-24)+&#x27;px&#x27;;
        });
        cell.addEventListener(&#x27;mousemove&#x27;,e=&gt;{
          tooltip.style.left=(e.clientX+12)+&#x27;px&#x27;;tooltip.style.top=(e.clientY-24)+&#x27;px&#x27;;
        });
        cell.addEventListener(&#x27;mouseleave&#x27;,()=&gt;{tooltip.style.display=&#x27;none&#x27;;});
      }
      document.getElementById(d.id).appendChild(cell);
    });
  });
}

/* ════ PASS OVERLAY ON CONDITIONS STRIP ════
   After conditions render, mark hours that fall within a predicted pass.
   Called after renderConditions() and after selectSat().             */
function overlayPasses(){
  if(!wxData||!currentPasses||!currentTLE||!propagationTime) return;
  const cloudCells=document.getElementById(&#x27;wx-cloud&#x27;).children;
  if(!cloudCells.length) return;

  const numCells=cloudCells.length;
  // Each cell i corresponds to slotUTC[i] — rebuild times from wxData
  const {hourly}=wxData;
  const times=hourly.time;
  const startIdx=(()=&gt;{
    const nowLocalStr=(()=&gt;{
      try{return new Intl.DateTimeFormat(&#x27;sv-SE&#x27;,{timeZone:SITE.tz,year:&#x27;numeric&#x27;,month:&#x27;2-digit&#x27;,day:&#x27;2-digit&#x27;,hour:&#x27;2-digit&#x27;,hour12:false}).format(new Date()).slice(0,13);}
      catch(e){return new Date().toISOString().slice(0,13);}
    })();
    let idx=times.findIndex(t=&gt;t.slice(0,13)===nowLocalStr);
    return idx&lt;0?0:idx;
  })();

  // Remove any existing pass overlays
  document.querySelectorAll(&#x27;.wx-pass-overlay&#x27;).forEach(el=&gt;el.remove());

  // For each pass, find which hour cells it overlaps
  const rows=[&#x27;wx-cloud&#x27;,&#x27;wx-seeing&#x27;,&#x27;wx-transp&#x27;,&#x27;wx-dark&#x27;,&#x27;wx-wind&#x27;,&#x27;wx-smoke&#x27;];

  currentPasses.forEach((p,pi)=&gt;{
    // p.t_rise / p.t_set are seconds from propagationTime
    let riseUTC=new Date(propagationTime.getTime()+p.t_rise*1000);
    let setUTC =new Date(propagationTime.getTime()+p.t_set*1000);
    let elPk=p.el_peak;
    let col=elPk&gt;30?&#x27;rgba(0,255,136,0.55)&#x27;:elPk&gt;10?&#x27;rgba(255,170,0,0.45)&#x27;:&#x27;rgba(100,150,255,0.35)&#x27;;
    let border=elPk&gt;30?&#x27;#00ff88&#x27;:elPk&gt;10?&#x27;#ffaa00&#x27;:&#x27;#6699ff&#x27;;

    for(let i=0;i&lt;numCells;i++){
      let idx=startIdx+i;
      if(idx&gt;=times.length) break;
      // Get UTC instant for this cell
      let localMs=Date.parse(times[idx]+&#x27;:00Z&#x27;);
      let cellUTC=new Date(localMs-SITE.tzOffsetMin*60000);
      let cellEnd=new Date(cellUTC.getTime()+3600000);
      // Check overlap: pass overlaps cell if rise&lt;cellEnd &amp;&amp; set&gt;cellStart
      if(riseUTC&lt;cellEnd &amp;&amp; setUTC&gt;cellUTC){
        rows.forEach(rowId=&gt;{
          let cells=document.getElementById(rowId).children;
          if(i&lt;cells.length){
            let overlay=document.createElement(&#x27;div&#x27;);
            overlay.className=&#x27;wx-pass-overlay&#x27;;
            overlay.style.cssText=`position:absolute;inset:0;background:${col};border-top:2px solid ${border};border-bottom:2px solid ${border};pointer-events:none;z-index:3;`;
            // First cell of pass: left border
            let localRiseMs=Date.parse(times[idx]+&#x27;:00Z&#x27;)-SITE.tzOffsetMin*60000;
            if(riseUTC&gt;=cellUTC) overlay.style.borderLeft=`2px solid ${border}`;
            if(setUTC&lt;=cellEnd)  overlay.style.borderRight=`2px solid ${border}`;
            cells[i].style.position=&#x27;relative&#x27;;
            cells[i].appendChild(overlay);
          }
        });
        // Also add tooltip enhancement to hour cell
        let hCells=document.getElementById(&#x27;wx-hours&#x27;).children;
        if(i&lt;hCells.length){
          let tip=document.getElementById(&#x27;tooltip&#x27;);
          let passLabel=`${currentTLE.name} · ${fmtLocalShort(riseUTC,SITE.tz)}–${fmtLocalShort(setUTC,SITE.tz)} · peak ${elPk.toFixed(0)}°`;
          hCells[i].style.color=border;
          hCells[i].style.fontWeight=&#x27;bold&#x27;;
          // Attach tooltip
          hCells[i].addEventListener(&#x27;mouseenter&#x27;,e=&gt;{tip.textContent=passLabel;tip.style.display=&#x27;block&#x27;;tip.style.left=(e.clientX+12)+&#x27;px&#x27;;tip.style.top=(e.clientY-24)+&#x27;px&#x27;;});
          hCells[i].addEventListener(&#x27;mousemove&#x27;,e=&gt;{tip.style.left=(e.clientX+12)+&#x27;px&#x27;;tip.style.top=(e.clientY-24)+&#x27;px&#x27;;});
          hCells[i].addEventListener(&#x27;mouseleave&#x27;,()=&gt;{tip.style.display=&#x27;none&#x27;;});
        }
      }
    }
  });
}


/* ════ V2 · CATALOG 3D — full-catalog real-time inertial viewer ════
   Propagation strategy (accuracy-honest at every time scale):
   · every object is seeded with SGP4 at the current sim epoch;
   · between SGP4 fixes, motion is bridged with a symplectic-Euler two-body
     integration (substeps ≤ 8 s of sim time) — energy-stable, no secular drift;
   · a time-boxed (≈3 ms/frame) background sweep continuously re-anchors objects
     with fresh SGP4 fixes, cycling through the whole catalog, so the two-body
     bridge never accumulates more than a few seconds–minutes of drag/J2 error.
   Earth orientation: rotation.y = GMST(simTime) — same convention as ECI view. */
const CAT={
  three:null,sats:[],mesh:null,
  anchorIdx:0,selected:-1,hoverIdx:-1,
  _ray:null,_mouse:null,_mouseEv:null,_hoverLast:0,
  _orbitT:0,_cardLast:0,_loadToken:0,inited:false,
  _dummyM:null,

  /* full tracked-environment buckets: payloads, rocket bodies, debris fields */
  GROUPS:[
    {id:&#x27;__full&#x27;,  n:&#x27;FULL PUBLIC CATALOG (EVERYTHING TRACKED)&#x27;, on:true},
    {id:&#x27;visual&#x27;,  n:&#x27;100 BRIGHTEST&#x27;,        on:true},
    {id:&#x27;stations&#x27;,n:&#x27;SPACE STATIONS&#x27;,       on:true},
    {id:&#x27;active&#x27;,  n:&#x27;ACTIVE PAYLOADS (ALL)&#x27;,on:true},
    {id:&#x27;starlink&#x27;,n:&#x27;STARLINK&#x27;,             on:false},
    {id:&#x27;oneweb&#x27;,  n:&#x27;ONEWEB&#x27;,               on:false},
    {id:&#x27;gps-ops&#x27;, n:&#x27;GPS OPS&#x27;,              on:false},
    {id:&#x27;glo-ops&#x27;, n:&#x27;GLONASS&#x27;,              on:false},
    {id:&#x27;galileo&#x27;, n:&#x27;GALILEO&#x27;,              on:false},
    {id:&#x27;beidou&#x27;,  n:&#x27;BEIDOU&#x27;,               on:false},
    {id:&#x27;geo&#x27;,     n:&#x27;GEO BELT&#x27;,             on:false},
    {id:&#x27;weather&#x27;, n:&#x27;WEATHER&#x27;,              on:false},
    {id:&#x27;science&#x27;, n:&#x27;SCIENCE&#x27;,              on:false},
    {id:&#x27;cosmos-2251-debris&#x27;, n:&#x27;COSMOS-2251 DEBRIS&#x27;, on:true},
    {id:&#x27;iridium-33-debris&#x27;,  n:&#x27;IRIDIUM-33 DEBRIS&#x27;,  on:true},
    {id:&#x27;fengyun-1c-debris&#x27;,  n:&#x27;FENGYUN-1C DEBRIS&#x27;,  on:true},
    {id:&#x27;cosmos-1408-debris&#x27;, n:&#x27;COSMOS-1408 DEBRIS&#x27;, on:false},
    {id:&#x27;last-30-days&#x27;,       n:&#x27;LAUNCHED &lt;30 DAYS&#x27;,  on:false}
  ],
  /* object classes: payloads colored by regime; debris + rocket bodies get

  CLS_COLOR:{LEO:[1,0.82,0.29],MEO:[0,1,0.70],GEO:[1,0.31,0.85],HEO:[0.69,0.55,1],MOLNIYA:[0.69,0.55,1],
             DEB:[0.62,0.72,0.80],RB:[1,0.48,0.29]},
  classOf(t){

    if(t.objType===&#x27;RB&#x27;) return &#x27;RB&#x27;;

  /* coarse object_type from a TLE name (for CelesTrak-sourced buckets that

  objTypeOfName(t){
    const n=(t.name||&#x27;&#x27;).toUpperCase();

    if(/R\/B|\bAKM\b|\bPKM\b|ROCKET/.test(n)) return &#x27;RB&#x27;;

  },
  filter:&#x27;ALL&#x27;,
  matchesFilter(objType){

    if(f===&#x27;ALL&#x27;) return true;
    if(f===&#x27;ACTIVE&#x27;) return objType===&#x27;PAYLOAD&#x27;;
    if(f===&#x27;DEBRIS&#x27;) return objType===&#x27;DEBRIS&#x27;;

  setFilter(f,btn){
    this.filter=f;
    document.querySelectorAll(&#x27;#cat-filter-bar .cfb-btn&#x27;).forEach(b=&gt;b.classList.remove(&#x27;on&#x27;));

    if(this.sats) for(const s of this.sats) s.vis=this.matchesFilter(s.objType);

    if(typeof STATE!==&#x27;undefined&#x27;) STATE.dirty();
  },

  init(){
    if(this.inited) return;
    this.inited=true;
    this.three=initThree3D(&#x27;cat-canvas-wrap&#x27;,{axes:false,rad:RE_KM*6.2});
    this._ray=new THREE.Raycaster();
    this._mouse=new THREE.Vector2();
    const dom=this.three.renderer.domElement;
    dom.addEventListener(&#x27;pointermove&#x27;,e=&gt;{
      const r=dom.getBoundingClientRect();
      this._mouse.x=((e.clientX-r.left)/r.width)*2-1;
      this._mouse.y=-((e.clientY-r.top)/r.height)*2+1;
      this._mouseEv=e;
    });
    let downXY=null;
    dom.addEventListener(&#x27;pointerdown&#x27;,e=&gt;downXY=[e.clientX,e.clientY]);
    dom.addEventListener(&#x27;pointerup&#x27;,e=&gt;{
      if(!downXY) return;
      const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]);

    document.getElementById(&#x27;cat-groups-btn&#x27;).addEventListener(&#x27;click&#x27;,e=&gt;{
      e.stopPropagation();
      document.getElementById(&#x27;cat-groups-menu&#x27;).classList.toggle(&#x27;open&#x27;);
    });
    document.addEventListener(&#x27;click&#x27;,e=&gt;{
      const m=document.getElementById(&#x27;cat-groups-menu&#x27;);
      if(m&amp;&amp;!m.contains(e.target)&amp;&amp;e.target.id!==&#x27;cat-groups-btn&#x27;) m.classList.remove(&#x27;open&#x27;);
    });
  },

  renderGroupMenu(){
    const m=document.getElementById(&#x27;cat-groups-menu&#x27;);
    const allOn=this.GROUPS.every(g=&gt;g.on);
    m.innerHTML=&#x27;&lt;label class=&quot;cg-item cg-all&quot;&gt;&lt;input type=&quot;checkbox&quot; id=&quot;cg-selall&quot; &#x27;+(allOn?&#x27;checked&#x27;:&#x27;&#x27;)+&#x27;/&gt; ★ SELECT ALL&lt;/label&gt;&#x27;+
      this.GROUPS.map((g,i)=&gt;
      &#x27;&lt;label class=&quot;cg-item&quot;&gt;&lt;input type=&quot;checkbox&quot; data-i=&quot;&#x27;+i+&#x27;&quot; &#x27;+(g.on?&#x27;checked&#x27;:&#x27;&#x27;)+&#x27;/&gt; &#x27;+g.n+&#x27;&lt;/label&gt;&#x27;).join(&#x27;&#x27;)+
      &#x27;&lt;button class=&quot;hud-btn amber&quot; style=&quot;margin:6px;&quot; onclick=&quot;CAT.loadChecked()&quot;&gt;⟳ LOAD SELECTED&lt;/button&gt;&#x27;;
    m.querySelectorAll(&#x27;input[data-i]&#x27;).forEach(inp=&gt;inp.addEventListener(&#x27;change&#x27;,e=&gt;{
      this.GROUPS[+e.target.dataset.i].on=e.target.checked;
      if(typeof STATE!==&#x27;undefined&#x27;) STATE.dirty();

    document.getElementById(&#x27;cg-selall&#x27;).addEventListener(&#x27;change&#x27;,e=&gt;{
      this.GROUPS.forEach(g=&gt;g.on=e.target.checked);
      this.renderGroupMenu();
      document.getElementById(&#x27;cat-groups-menu&#x27;).classList.add(&#x27;open&#x27;);
      if(typeof STATE!==&#x27;undefined&#x27;) STATE.dirty();
    });
    const btn=document.getElementById(&#x27;cat-groups-btn&#x27;);
    if(btn) btn.textContent=&#x27;BUCKETS (&#x27;+this.GROUPS.filter(g=&gt;g.on).length+&#x27;) ▾&#x27;;
  },
  _groupCache:{},
  async loadChecked(){
    const token=++this._loadToken;
    document.getElementById(&#x27;cat-groups-menu&#x27;).classList.remove(&#x27;open&#x27;);
    const want=this.GROUPS.filter(g=&gt;g.on);
    const btn=document.getElementById(&#x27;cat-groups-btn&#x27;);
    if(btn) btn.textContent=&#x27;BUCKETS (&#x27;+want.length+&#x27;) ▾&#x27;;
    const prog=document.getElementById(&#x27;cat-progress&#x27;),ptxt=document.getElementById(&#x27;cat-progress-txt&#x27;);
    prog.style.display=&#x27;flex&#x27;;
    this.deselect();
    /* combined buckets, deduped by NORAD id */
    const byNorad=new Map();
    let gotAny=false;
    for(let gi=0;gi&lt;want.length;gi++){
      if(token!==this._loadToken) return;
      ptxt.textContent=&#x27;Fetching &#x27;+want[gi].n+&#x27; (&#x27;+(gi+1)+&#x27;/&#x27;+want.length+&#x27;)…&#x27;;
      let raw=this._groupCache[want[gi].id];
      if(raw===undefined){
        if(want[gi].id===&#x27;__full&#x27;){
          /* primary: OrbitSmith static mirror (full ~34.6k + object_type) */
          ptxt.textContent=&#x27;Loading full catalog from OrbitSmith…&#x27;;
          raw=await OS.fetchCatalog((d,tot,nObj)=&gt;{ptxt.textContent=&#x27;OrbitSmith catalog — shard &#x27;+d+&#x27; / &#x27;+tot+&#x27; · &#x27;+nObj+&#x27; objects…&#x27;;});
          if(raw){this._srcLabel=&#x27;ORBITSMITH (OFFLINE MIRROR)&#x27;;}
          else{
            /* fallback: live CelesTrak full dump */
            ptxt.textContent=&#x27;OrbitSmith unreachable — falling back to CelesTrak…&#x27;;
            raw=await fetchFullCatalog(p=&gt;{ptxt.textContent=&#x27;CelesTrak full catalog… &#x27;+(p/1048576).toFixed(1)+&#x27; MB&#x27;;});
            if(raw) this._srcLabel=&#x27;CELESTRAK GP (FALLBACK)&#x27;;
          }
        }else{
          raw=await fetchGroup(want[gi].id);
          if(raw&amp;&amp;!this._srcLabel) this._srcLabel=&#x27;CELESTRAK GP&#x27;;
        }
        if(raw) this._groupCache[want[gi].id]=raw;
      }
      if(token!==this._loadToken) return;
      if(!raw) continue;
      gotAny=true;
      if(Array.isArray(raw)){
        /* OrbitSmith path: objects already parsed + objType-tagged */
        raw.forEach(t=&gt;{if(t.satrec&amp;&amp;!byNorad.has(t.satnum)) byNorad.set(t.satnum,t);});
      }else{
        parseCatalog(raw).forEach(t=&gt;{if(t.satrec&amp;&amp;!byNorad.has(t.satnum)){t.objType=this.objTypeOfName(t);byNorad.set(t.satnum,t);}});
      }
    }
    let parsed=[...byNorad.values()];
    if(!gotAny){parsed=getFallbackSats().filter(t=&gt;t.satrec);parsed.forEach(t=&gt;t.objType=this.objTypeOfName(t));this._srcLabel=&#x27;EMBEDDED SAMPLE&#x27;;ptxt.textContent=&#x27;⚠ All sources blocked — embedded sample set&#x27;;}
    else ptxt.textContent=parsed.length+&#x27; unique objects merged — building instanced buffer…&#x27;;
    document.getElementById(&#x27;cat-src-stamp&#x27;).textContent=(this._srcLabel||&#x27;CATALOG&#x27;)+&#x27; · FETCHED &#x27;+fmtUTCShort(new Date())+&#x27;Z · &#x27;+parsed.length+&#x27; OBJ&#x27;;
    this._srcLabel=null;
    this.buildInstanced(parsed,token,prog,ptxt);
  },
  /* ── Instanced WebGL strategy: ONE hardware-accelerated draw call for the
        entire tracked environment (tens of thousands of objects). Round
        geometry (icosahedron) — no square points anywhere. Per-frame motion
        writes translation terms straight into the instance matrix buffer. ── */
  buildInstanced(parsed,token,prog,ptxt){
    this.sats=parsed.map(t=&gt;{const ot=t.objType||this.objTypeOfName(t);return{tle:t,cls:this.classOf(t),objType:ot,vis:this.matchesFilter(ot),r:[0,0,0],v:[0,0,0],ok:false};});
    if(this.mesh){this.three.scene.remove(this.mesh);this.mesh.geometry.dispose();this.mesh.material.dispose();this.mesh=null;}
    const n=this.sats.length;
    const geo=new THREE.IcosahedronGeometry(1,1);
    const mat=new THREE.MeshBasicMaterial({transparent:true,opacity:0.95});
    const mesh=new THREE.InstancedMesh(geo,mat,n);
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    const M=new THREE.Matrix4();
    for(let i=0;i&lt;n;i++){
      const cls=this.sats[i].cls;
      const sc=cls===&#x27;DEB&#x27;?26:cls===&#x27;RB&#x27;?38:46;       /* debris renders smaller */
      this.sats[i].sc=sc;
      M.makeScale(sc,sc,sc);M.setPosition(0,-1e9,0);  /* park off-screen until seeded */
      mesh.setMatrixAt(i,M);
      const c=this.CLS_COLOR[cls]||[0.7,0.7,0.8];
      mesh.setColorAt(i,new THREE.Color(c[0],c[1],c[2]));
    }
    mesh.frustumCulled=false;
    mesh.instanceMatrix.needsUpdate=true;
    if(mesh.instanceColor) mesh.instanceColor.needsUpdate=true;
    this.mesh=mesh;
    this.three.scene.add(mesh);
    /* chunked SGP4 seed so the UI never blocks */
    let i=0;
    const seedChunk=()=&gt;{
      if(token!==this._loadToken) return;
      const t0=performance.now();
      const d=EPOCH.now();
      while(i&lt;n&amp;&amp;performance.now()-t0&lt;11){this.anchorOne(i,d);i++;}
      ptxt.textContent=&#x27;Seeding SGP4 states… &#x27;+i+&#x27; / &#x27;+n;
      this.mesh.instanceMatrix.needsUpdate=true;
      if(i&lt;n) requestAnimationFrame(seedChunk);
      else{prog.style.display=&#x27;none&#x27;;this.updateCounts();this.applyZoomScale(true);}
    };
    requestAnimationFrame(seedChunk);
    this.updateCounts();
  },

  /* one SGP4 fix → state vectors + GPU buffer (orbital → three coords: x, z, −y) */
  anchorOne(i,d){
    const s=this.sats[i],a=this.mesh.instanceMatrix.array,o=i*16;
    try{
      const pv=satellite.propagate(s.tle.satrec,d);
      if(pv&amp;&amp;pv.position&amp;&amp;isFinite(pv.position.x)){
        s.r[0]=pv.position.x;s.r[1]=pv.position.y;s.r[2]=pv.position.z;
        s.v[0]=pv.velocity.x;s.v[1]=pv.velocity.y;s.v[2]=pv.velocity.z;
        s.ok=true;
        a[o+12]=s.r[0];a[o+13]=s.r[2];a[o+14]=-s.r[1];
        return;
      }
    }catch(e){}
    s.ok=false;a[o+13]=-1e9;
  },

  /* time controls forward to the GLOBAL epoch clock — full lockstep */
  setScale(k,btn){
    EPOCH.setRate(k);
    document.querySelectorAll(&#x27;#cat-toolbar .tw-btn&#x27;).forEach(b=&gt;b.classList.remove(&#x27;on&#x27;));
    if(btn) btn.classList.add(&#x27;on&#x27;);
    document.getElementById(&#x27;tw-pause&#x27;).textContent=&#x27;⏸&#x27;;
  },
  setPause(){
    EPOCH.togglePause();
    document.getElementById(&#x27;tw-pause&#x27;).textContent=EPOCH.rate===0?&#x27;▶&#x27;:&#x27;⏸&#x27;;
    document.getElementById(&#x27;tw-pause&#x27;).classList.toggle(&#x27;on&#x27;,EPOCH.rate===0);
  },
  resetNow(){
    EPOCH.live();
    const d=EPOCH.now();
    for(let i=0;i&lt;this.sats.length;i++) this.anchorOne(i,d);
    if(this.mesh) this.mesh.instanceMatrix.needsUpdate=true;
    this.anchorIdx=0;
    if(this.selected&gt;=0) this.drawSelOrbit();
  },

  updateCounts(){
    const by={};let shown=0;
    this.sats.forEach(s=&gt;{by[s.cls]=(by[s.cls]||0)+1;if(s.vis!==false)shown++;});
    const fl=this.filter&amp;&amp;this.filter!==&#x27;ALL&#x27;?&#x27; · &#x27;+this.filter+&#x27; (&#x27;+shown+&#x27; SHOWN)&#x27;:&#x27;&#x27;;
    document.getElementById(&#x27;cat-counts&#x27;).textContent=
      this.sats.length+&#x27; OBJ · PAYLOAD &#x27;+((by.LEO||0)+(by.MEO||0)+(by.GEO||0)+(by.HEO||0))+
      &#x27; · DEBRIS &#x27;+(by.DEB||0)+&#x27; · R/B &#x27;+(by.RB||0)+fl+&#x27; · 1 DRAW CALL&#x27;;
  },

  /* zoom-adaptive geometric scale: markers shrink toward true point objects as
     the camera closes in; grow for legibility when zoomed far out */
  _lastScaleRad:0,
  applyZoomScale(force){
    if(!this.mesh) return;
    const rad=this.three.ctrl.rad,R0=RE_KM*6.2;
    if(!force&amp;&amp;Math.abs(rad-this._lastScaleRad)/Math.max(rad,1)&lt;0.04) return;
    this._lastScaleRad=rad;
    const f=Math.min(3,Math.max(0.06,Math.pow(rad/R0,1.3)));
    const a=this.mesh.instanceMatrix.array;
    for(let i=0;i&lt;this.sats.length;i++){
      const vis=this.sats[i].vis!==false;
      const sc=vis?this.sats[i].sc*f:0,o=i*16;
      a[o]=sc;a[o+5]=sc;a[o+10]=sc;
    }
    this.mesh.instanceMatrix.needsUpdate=true;
  },

  /* per-frame: advance sim clock, bridge-integrate, re-anchor, render */
  frame(nowP,dt){
    const T=this.three;
    T.ctrl.update(dt);
    this.applyZoomScale(false);
    const dtSim=dt*EPOCH.rate;            /* sim seconds this frame (global clock) */
    if(this.sats.length&amp;&amp;this.mesh&amp;&amp;Math.abs(dtSim)&gt;1e-9){
      /* symplectic Euler two-body bridge, substeps ≤ 8 s */
      const nSub=Math.max(1,Math.ceil(Math.abs(dtSim)/8));
      const h=dtSim/nSub;
      const arr=this.mesh.instanceMatrix.array;
      for(let i=0;i&lt;this.sats.length;i++){
        const s=this.sats[i];
        if(!s.ok) continue;
        let[rx,ry,rz]=s.r,[vx,vy,vz]=s.v;
        for(let q=0;q&lt;nSub;q++){
          const r2=rx*rx+ry*ry+rz*rz,r1=Math.sqrt(r2);
          const k=-MU_E/(r2*r1)*h;
          vx+=k*rx;vy+=k*ry;vz+=k*rz;     /* kick */
          rx+=vx*h;ry+=vy*h;rz+=vz*h;     /* drift */
        }
        s.r[0]=rx;s.r[1]=ry;s.r[2]=rz;s.v[0]=vx;s.v[1]=vy;s.v[2]=vz;
        const o=i*16;
        arr[o+12]=rx;arr[o+13]=rz;arr[o+14]=-ry;
      }
      /* time-boxed SGP4 re-anchor sweep (~3 ms budget) */
      const t0=performance.now(),d=EPOCH.now();
      let nA=0;
      while(performance.now()-t0&lt;3&amp;&amp;nA&lt;this.sats.length){
        this.anchorOne(this.anchorIdx,d);
        this.anchorIdx=(this.anchorIdx+1)%this.sats.length;
        nA++;
      }
      this.mesh.instanceMatrix.needsUpdate=true;
    }
    /* Earth orientation + Sun direction at the SIM epoch — true physics under acceleration */
    const simD=EPOCH.now();
    if(T.earthMesh) T.earthMesh.rotation.y=gmst_from_jd(julianDate(simD));
    if(nowP-(this._sunT||0)&gt;250){this._sunT=nowP;T.setSun(sunECIUnit(simD));}
    /* clocks (global epoch) */
    const sd=simD;
    document.getElementById(&#x27;cat-simclock&#x27;).textContent=
      sd.toISOString().slice(0,19).replace(&#x27;T&#x27;,&#x27; &#x27;)+&#x27; UTC&#x27;+(EPOCH.rate===0?&#x27; ⏸&#x27;:&#x27;&#x27;);
    const off=EPOCH.offsetMs()/1000;
    document.getElementById(&#x27;cat-simoffset&#x27;).textContent=
      Math.abs(off)&lt;2?&#x27;· REAL TIME&#x27;:(off&gt;0?&#x27;· +&#x27;:&#x27;· −&#x27;)+fmtHMS(Math.abs(off))+&#x27; vs now&#x27;;
    /* hover picking (throttled) */
    if(nowP-this._hoverLast&gt;70&amp;&amp;this.mesh){this._hoverLast=nowP;this.hoverPick();}
    /* selected: live marker + card */
    if(this.selected&gt;=0){
      const s=this.sats[this.selected];
      const mk=T.scene.getObjectByName(&#x27;catSelMk&#x27;);
      if(mk&amp;&amp;s.ok) mk.position.set(s.r[0],s.r[2],-s.r[1]);
      if(nowP-this._cardLast&gt;400){this._cardLast=this._cardLast=nowP;this.updateCard();}
      if(nowP-this._orbitT&gt;60000){this._orbitT=nowP;this.drawSelOrbit();}
    }
    T.renderer.render(T.scene,T.camera);
  },

  raySetup(){
    this._ray.setFromCamera(this._mouse,this.three.camera);
  },
  pick(){
    this.raySetup();
    const hits=this._ray.intersectObject(this.mesh);
    return hits.length?hits[0].instanceId:-1;
  },
  hoverPick(){
    const hv=document.getElementById(&#x27;cat-hover&#x27;);
    if(!this._mouseEv){hv.style.display=&#x27;none&#x27;;return;}
    const i=this.pick();
    if(i&gt;=0){
      this.hoverIdx=i;
      const s=this.sats[i],t=s.tle;
      const alt=Math.sqrt(s.r[0]**2+s.r[1]**2+s.r[2]**2)-RE_KM;
      const spd=Math.sqrt(s.v[0]**2+s.v[1]**2+s.v[2]**2);
      hv.innerHTML=&#x27;&lt;div class=&quot;ch-name&quot;&gt;&#x27;+t.name+&#x27;&lt;/div&gt;&#x27;+
        &#x27;&lt;div class=&quot;ch-row&quot;&gt;&lt;span&gt;NORAD&lt;/span&gt;&lt;span&gt;&#x27;+t.satnum+&#x27; · &#x27;+(s.cls===&#x27;DEB&#x27;?&#x27;DEBRIS&#x27;:s.cls===&#x27;RB&#x27;?&#x27;ROCKET BODY&#x27;:t.orbitType)+&#x27;&lt;/span&gt;&lt;/div&gt;&#x27;+
        &#x27;&lt;div class=&quot;ch-row&quot;&gt;&lt;span&gt;ALT&lt;/span&gt;&lt;span&gt;&#x27;+alt.toFixed(0)+&#x27; km&lt;/span&gt;&lt;/div&gt;&#x27;+
        &#x27;&lt;div class=&quot;ch-row&quot;&gt;&lt;span&gt;SPEED&lt;/span&gt;&lt;span&gt;&#x27;+spd.toFixed(2)+&#x27; km/s&lt;/span&gt;&lt;/div&gt;&#x27;+
        &#x27;&lt;div class=&quot;ch-row&quot;&gt;&lt;span&gt;INC / T&lt;/span&gt;&lt;span&gt;&#x27;+t.inc.toFixed(1)+&#x27;° · &#x27;+(t.T_s/60).toFixed(0)+&#x27; min&lt;/span&gt;&lt;/div&gt;&#x27;+
        &#x27;&lt;div class=&quot;ch-row&quot; style=&quot;color:var(--muted);margin-top:3px;&quot;&gt;&lt;span&gt;CLICK&lt;/span&gt;&lt;span&gt;ORBIT + DETAILS&lt;/span&gt;&lt;/div&gt;&#x27;;
      const wrap=document.getElementById(&#x27;cat-stage&#x27;).getBoundingClientRect();
      let x=this._mouseEv.clientX-wrap.left+14,y=this._mouseEv.clientY-wrap.top+10;
      hv.style.display=&#x27;block&#x27;;
      const hw=hv.offsetWidth,hh=hv.offsetHeight;
      if(x+hw&gt;wrap.width-8)x=this._mouseEv.clientX-wrap.left-hw-12;
      if(y+hh&gt;wrap.height-8)y=wrap.height-hh-8;
      hv.style.left=x+&#x27;px&#x27;;hv.style.top=y+&#x27;px&#x27;;
      this.three.renderer.domElement.style.cursor=&#x27;pointer&#x27;;
    } else {
      this.hoverIdx=-1;hv.style.display=&#x27;none&#x27;;
      this.three.renderer.domElement.style.cursor=&#x27;grab&#x27;;
    }
  },
  clickPick(){
    const i=this.pick();
    if(i&gt;=0) this.select(i);
  },

  select(i){
    this.selected=i;
    const T=this.three,s=this.sats[i];
    let mk=T.scene.getObjectByName(&#x27;catSelMk&#x27;);
    if(!mk){
      mk=new THREE.Mesh(new THREE.SphereGeometry(120,14,14),new THREE.MeshBasicMaterial({color:0xffcc00}));
      mk.name=&#x27;catSelMk&#x27;;T.scene.add(mk);
    }
    mk.position.set(s.r[0],s.r[2],-s.r[1]);
    this._orbitT=performance.now();
    this.drawSelOrbit();
    document.getElementById(&#x27;cat-card&#x27;).style.display=&#x27;block&#x27;;
    document.getElementById(&#x27;cc-name&#x27;).textContent=s.tle.name;
    this.updateCard();
  },
  /* one-period orbit sampled directly from SGP4 (true osculating + perturbed path) */
  drawSelOrbit(){
    const T=this.three;
    let old=T.scene.getObjectByName(&#x27;catSelOrbit&#x27;);
    if(old){T.scene.remove(old);old.geometry.dispose();old.material.dispose();}
    if(this.selected&lt;0) return;
    const s=this.sats[this.selected];
    const P=s.tle.T_s,NPTS=160,pts=[];
    for(let k=0;k&lt;=NPTS;k++){
      const d=new Date(EPOCH.ms()+(k/NPTS)*P*1000);
      try{
        const pv=satellite.propagate(s.tle.satrec,d);
        if(pv&amp;&amp;pv.position&amp;&amp;isFinite(pv.position.x))
          pts.push(new THREE.Vector3(pv.position.x,pv.position.z,-pv.position.y));
      }catch(e){}
    }
    if(pts.length&lt;2) return;
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(g,new THREE.LineBasicMaterial({color:0xffcc00,transparent:true,opacity:.85}));
    line.name=&#x27;catSelOrbit&#x27;;T.scene.add(line);
  },
  updateCard(){
    if(this.selected&lt;0) return;
    const s=this.sats[this.selected],t=s.tle;
    const rmag=Math.sqrt(s.r[0]**2+s.r[1]**2+s.r[2]**2);
    const spd=Math.sqrt(s.v[0]**2+s.v[1]**2+s.v[2]**2);
    /* sub-satellite point at sim epoch */
    const gm=gmst_from_jd(julianDate(EPOCH.now()));
    const ct=Math.cos(gm),st=Math.sin(gm);
    const fx=ct*s.r[0]+st*s.r[1],fy=-st*s.r[0]+ct*s.r[1],fz=s.r[2];
    const lon=((Math.atan2(fy,fx)*R2D+540)%360)-180;
    const lat=Math.atan2(fz,Math.sqrt(fx*fx+fy*fy))*R2D;
    const apo=t.a*(1+t.ecc)-RE_KM,per=t.a*(1-t.ecc)-RE_KM;
    const sl=isSunlit(s.r,sunECIUnit(EPOCH.now()));
    document.getElementById(&#x27;cc-grid&#x27;).innerHTML=
      row(&#x27;NORAD&#x27;,t.satnum)+row(&#x27;CLASS&#x27;,t.orbitType)+
      row(&#x27;ALT&#x27;,(rmag-RE_KM).toFixed(1)+&#x27; km&#x27;)+row(&#x27;SPEED&#x27;,spd.toFixed(3)+&#x27; km/s&#x27;)+
      row(&#x27;SUBPOINT&#x27;,lat.toFixed(2)+&#x27;°, &#x27;+lon.toFixed(2)+&#x27;°&#x27;)+row(&#x27;ILLUM&#x27;,sl?&#x27;SUNLIT ☀&#x27;:&#x27;IN SHADOW ●&#x27;)+
      row(&#x27;APOGEE&#x27;,apo.toFixed(0)+&#x27; km&#x27;)+row(&#x27;PERIGEE&#x27;,per.toFixed(0)+&#x27; km&#x27;)+
      row(&#x27;INC&#x27;,t.inc.toFixed(3)+&#x27;°&#x27;)+row(&#x27;PERIOD&#x27;,(t.T_s/60).toFixed(2)+&#x27; min&#x27;)+
      row(&#x27;ECC&#x27;,t.ecc.toFixed(6))+row(&#x27;RAAN&#x27;,t.raan.toFixed(2)+&#x27;°&#x27;);
    function row(k,v){return&#x27;&lt;div class=&quot;cc-row&quot;&gt;&lt;span class=&quot;cc-k&quot;&gt;&#x27;+k+&#x27;&lt;/span&gt;&lt;span class=&quot;cc-v&quot;&gt;&#x27;+v+&#x27;&lt;/span&gt;&lt;/div&gt;&#x27;;}
  },
  deselect(){
    this.selected=-1;
    document.getElementById(&#x27;cat-card&#x27;).style.display=&#x27;none&#x27;;
    if(this.three){
      const o=this.three.scene.getObjectByName(&#x27;catSelOrbit&#x27;);
      if(o){this.three.scene.remove(o);o.geometry.dispose();o.material.dispose();}
      const m=this.three.scene.getObjectByName(&#x27;catSelMk&#x27;);
      if(m) this.three.scene.remove(m);
    }
  },
  trackSelected(){
    if(this.selected&lt;0) return;
    const t=this.sats[this.selected].tle;
    let found=allSats.find(x=&gt;x.satnum===t.satnum);
    if(!found){allSats.unshift(t);populateList(allSats);found=t;}
    switchView(&#x27;tracker&#x27;);
    /* find its list item to highlight */
    let item=null;
    document.querySelectorAll(&#x27;#sat-list .sat-item&#x27;).forEach(el=&gt;{
      if(el.querySelector(&#x27;.sat-meta&#x27;)&amp;&amp;el.querySelector(&#x27;.sat-meta&#x27;).textContent.includes(String(found.satnum))) item=el;
    });
    selectSat(found,item);
    if(item) item.scrollIntoView({block:&#x27;center&#x27;});
  }
};

/* ╔══════════════════════════════════════════════════════════════════╗
   ║  MODULE · EphemerisService — deep-space pipeline (non-TLE class)  ║
   ║  · Fuzzy name resolution  → JPL Small-Body Database Lookup API    ║
   ║  · State-vector packets   → JPL Horizons EPHEM_TYPE=VECTORS       ║
   ║  · Rate-limit protection  → IndexedDB + in-memory packet cache    ║
   ║  · Fluid animation        → cubic Hermite interpolation (uses     ║
   ║    BOTH position and velocity samples ⇒ C¹-continuous motion)     ║
   ║  · Frame bridge           → ECI (equatorial, km) ⇄ heliocentric   ║
   ║    ecliptic J2000 (AU) into one unified scene space               ║
   ╚══════════════════════════════════════════════════════════════════╝ */
const AU_KM=149597870.7;
const EPHSVC={
  mem:{},            /* in-memory packet cache  cmd|window → pack */
  _db:null,_dbFail:false,

  /* ───── IndexedDB layer (graceful in-memory fallback) ───── */
  idb(){
    if(this._db||this._dbFail) return Promise.resolve(this._db);
    return new Promise(res=&gt;{
      try{
        const rq=indexedDB.open(&#x27;ssa-ephem-cache&#x27;,1);
        rq.onupgradeneeded=()=&gt;rq.result.createObjectStore(&#x27;vectors&#x27;);
        rq.onsuccess=()=&gt;{this._db=rq.result;res(this._db);};
        rq.onerror=()=&gt;{this._dbFail=true;res(null);};
      }catch(e){this._dbFail=true;res(null);}
    });
  },
  async idbGet(key){
    const db=await this.idb();if(!db)return null;
    return new Promise(res=&gt;{
      try{
        const rq=db.transaction(&#x27;vectors&#x27;).objectStore(&#x27;vectors&#x27;).get(key);
        rq.onsuccess=()=&gt;res(rq.result||null);rq.onerror=()=&gt;res(null);
      }catch(e){res(null);}
    });
  },
  async idbPut(key,val){
    const db=await this.idb();if(!db)return;
    try{db.transaction(&#x27;vectors&#x27;,&#x27;readwrite&#x27;).objectStore(&#x27;vectors&#x27;).put(val,key);}catch(e){}
  },

  async fetchText(url){
    const urls=[url,&#x27;https://corsproxy.io/?&#x27;+encodeURIComponent(url),
      &#x27;https://api.allorigins.win/raw?url=&#x27;+encodeURIComponent(url)];
    for(const u of urls){
      try{
        const r=await fetch(u,{signal:fetchTimeoutSignal(20000)});
        if(!r.ok) continue;
        const t=await r.text();
        if(t.length&gt;50) return t;
      }catch(e){}
    }
    return null;
  },

  /* major solar-system bodies are NOT in the Small-Body Database — resolve
     them locally against the Horizons major-body command table first */
  MAJORS:[
    {n:&#x27;Sun&#x27;,c:&#x27;10&#x27;},{n:&#x27;Moon (Luna)&#x27;,c:&#x27;301&#x27;},{n:&#x27;Mercury&#x27;,c:&#x27;199&#x27;},{n:&#x27;Venus&#x27;,c:&#x27;299&#x27;},
    {n:&#x27;Mars&#x27;,c:&#x27;499&#x27;},{n:&#x27;Jupiter&#x27;,c:&#x27;599&#x27;},{n:&#x27;Saturn&#x27;,c:&#x27;699&#x27;},{n:&#x27;Uranus&#x27;,c:&#x27;799&#x27;},
    {n:&#x27;Neptune&#x27;,c:&#x27;899&#x27;},{n:&#x27;Pluto&#x27;,c:&#x27;999&#x27;},
    {n:&#x27;Phobos (Mars I)&#x27;,c:&#x27;401&#x27;},{n:&#x27;Deimos (Mars II)&#x27;,c:&#x27;402&#x27;},
    {n:&#x27;Io (Jupiter I)&#x27;,c:&#x27;501&#x27;},{n:&#x27;Europa (Jupiter II)&#x27;,c:&#x27;502&#x27;},
    {n:&#x27;Ganymede (Jupiter III)&#x27;,c:&#x27;503&#x27;},{n:&#x27;Callisto (Jupiter IV)&#x27;,c:&#x27;504&#x27;},
    {n:&#x27;Mimas (Saturn I)&#x27;,c:&#x27;601&#x27;},{n:&#x27;Enceladus (Saturn II)&#x27;,c:&#x27;602&#x27;},
    {n:&#x27;Titan (Saturn VI)&#x27;,c:&#x27;606&#x27;},{n:&#x27;Iapetus (Saturn VIII)&#x27;,c:&#x27;608&#x27;},
    {n:&#x27;Titania (Uranus III)&#x27;,c:&#x27;703&#x27;},{n:&#x27;Triton (Neptune I)&#x27;,c:&#x27;801&#x27;},
    {n:&#x27;Charon (Pluto I)&#x27;,c:&#x27;901&#x27;}
  ],
  majorLookup(q){
    const s=q.toLowerCase().replace(/[^a-z0-9 ]/g,&#x27;&#x27;);
    if(s.length&lt;2) return null;
    const hits=this.MAJORS.filter(m=&gt;m.n.toLowerCase().includes(s));
    if(hits.length===1) return{ok:true,cmd:hits[0].c,name:hits[0].n,kind:&#x27;major&#x27;,orbitClass:&#x27;MAJOR BODY&#x27;};
    if(hits.length&gt;1) return{multi:hits.slice(0,8).map(m=&gt;({cmd:m.c,name:m.n}))};
    return null;
  },

  /* ───── Dynamic fuzzy search ─────
     pipeline: local major-body table → JPL SBDB Lookup API (small bodies)
     Returns {ok:true,cmd,name} | {multi:[{cmd,name}…]} | {none:true,q} */
  async sbdbLookup(q){
    const mj=this.majorLookup(q);
    if(mj) return mj;
    const url=&#x27;https://ssd-api.jpl.nasa.gov/sbdb.api?sstr=&#x27;+encodeURIComponent(q);
    const txt=await this.fetchText(url);
    if(!txt) return{err:true,q};
    let j;try{j=JSON.parse(txt);}catch(e){return{err:true,q};}
    if(j.object){
      const des=j.object.des||j.object.spkid;
      const cmd=j.object.kind&amp;&amp;j.object.kind[0]===&#x27;c&#x27;?&#x27;DES=&#x27;+des+&#x27;;CAP&#x27;:des+&#x27;;&#x27;;
      return{ok:true,cmd,name:(j.object.fullname||des).trim(),
             kind:j.object.kind,orbitClass:j.object.orbit_class?j.object.orbit_class.name:null};
    }
    if(j.code===&#x27;300&#x27;&amp;&amp;j.list&amp;&amp;j.list.length){
      return{multi:j.list.slice(0,8).map(o=&gt;({cmd:o.pdes?o.pdes+&#x27;;&#x27;:&#x27;DES=&#x27;+o.name+&#x27;;CAP&#x27;,name:o.name||o.pdes}))};
    }
    return{none:true,q};
  },

  /* ───── state-vector packets (heliocentric ecliptic J2000, AU &amp; AU/d) ───── */
  async getVectors(cmd,spanDays=16,stepH=6){
    const day=new Date().toISOString().slice(0,10);
    const key=cmd+&#x27;|&#x27;+day+&#x27;|&#x27;+spanDays+&#x27;|&#x27;+stepH;
    if(this.mem[key]) return this.mem[key];
    const stored=await this.idbGet(key);
    if(stored){this.mem[key]=stored;return stored;}
    const t0=new Date(Date.now()-2*86400000);
    const t1=new Date(t0.getTime()+spanDays*86400000);
    const fmt=d=&gt;&quot;&#x27;&quot;+d.toISOString().slice(0,16).replace(&#x27;T&#x27;,&#x27; &#x27;)+&quot;&#x27;&quot;;
    const p=new URLSearchParams({
      format:&#x27;text&#x27;,COMMAND:&quot;&#x27;&quot;+cmd+&quot;&#x27;&quot;,OBJ_DATA:&#x27;NO&#x27;,MAKE_EPHEM:&#x27;YES&#x27;,
      EPHEM_TYPE:&#x27;VECTORS&#x27;,CENTER:&quot;&#x27;500@10&#x27;&quot;,REF_PLANE:&#x27;ECLIPTIC&#x27;,
      START_TIME:fmt(t0),STOP_TIME:fmt(t1),STEP_SIZE:&quot;&#x27;&quot;+stepH+&quot; h&#x27;&quot;,
      VEC_TABLE:&#x27;2&#x27;,OUT_UNITS:&#x27;AU-D&#x27;,CSV_FORMAT:&#x27;YES&#x27;,VEC_LABELS:&#x27;NO&#x27;});
    const txt=await this.fetchText(&#x27;https://ssd.jpl.nasa.gov/api/horizons.api?&#x27;+p.toString());
    if(!txt) return null;
    const pack=this.parseVectors(txt);
    if(pack){this.mem[key]=pack;this.idbPut(key,pack);}
    return pack;
  },
  /* CSV rows: JDTDB, Cal, X, Y, Z, VX, VY, VZ */
  parseVectors(txt){
    const i0=txt.indexOf(&#x27;$$SOE&#x27;),i1=txt.indexOf(&#x27;$$EOE&#x27;);
    if(i0&lt;0||i1&lt;0) return null;
    const jd=[],P=[],V=[];
    txt.slice(i0+5,i1).split(&#x27;\n&#x27;).forEach(l=&gt;{
      const c=l.trim().split(&#x27;,&#x27;).map(s=&gt;s.trim());
      if(c.length&lt;8) return;
      const j=parseFloat(c[0]);if(!isFinite(j)) return;
      jd.push(j);
      P.push([+c[2],+c[3],+c[4]]);
      V.push([+c[5],+c[6],+c[7]]);
    });
    if(jd.length&lt;2) return null;
    return{jd0:jd[0],jd1:jd[jd.length-1],h:jd[1]-jd[0],jd,P,V};
  },

  /* ───── cubic Hermite interpolation over a vector packet ─────
     p(s)=h00·p0+h10·h·v0+h01·p1+h11·h·v1 — C¹ continuous because the
     segment endpoints share exact JPL velocities. */
  posAt(pack,jd){
    if(!pack||jd&lt;pack.jd0||jd&gt;pack.jd1) return null;
    let i=Math.min(pack.jd.length-2,Math.max(0,Math.floor((jd-pack.jd0)/pack.h)));
    while(i&gt;0&amp;&amp;jd&lt;pack.jd[i]) i--;
    while(i&lt;pack.jd.length-2&amp;&amp;jd&gt;pack.jd[i+1]) i++;
    const h=pack.jd[i+1]-pack.jd[i];
    const s=(jd-pack.jd[i])/h,s2=s*s,s3=s2*s;
    const h00=2*s3-3*s2+1,h10=s3-2*s2+s,h01=-2*s3+3*s2,h11=s3-s2;
    const p0=pack.P[i],p1=pack.P[i+1],v0=pack.V[i],v1=pack.V[i+1];
    const out=[0,0,0];
    for(let k=0;k&lt;3;k++) out[k]=h00*p0[k]+h10*h*v0[k]+h01*p1[k]+h11*h*v1[k];
    return out;
  },
  velAt(pack,jd){ /* AU/day, analytic Hermite derivative */
    if(!pack||jd&lt;pack.jd0||jd&gt;pack.jd1) return null;
    let i=Math.min(pack.jd.length-2,Math.max(0,Math.floor((jd-pack.jd0)/pack.h)));
    while(i&gt;0&amp;&amp;jd&lt;pack.jd[i]) i--;
    while(i&lt;pack.jd.length-2&amp;&amp;jd&gt;pack.jd[i+1]) i++;
    const h=pack.jd[i+1]-pack.jd[i];
    const s=(jd-pack.jd[i])/h;
    const d00=(6*s*s-6*s)/h,d10=(3*s*s-4*s+1),d01=(-6*s*s+6*s)/h,d11=(3*s*s-2*s);
    const p0=pack.P[i],p1=pack.P[i+1],v0=pack.V[i],v1=pack.V[i+1];
    const out=[0,0,0];
    for(let k=0;k&lt;3;k++) out[k]=d00*p0[k]+d10*v0[k]+d01*p1[k]+d11*v1[k];
    return out;
  }
};

/* ╔══════════════════════════════════════════════════════════════════╗
   ║  MODULE · FrameBridge — unified scene transformation layer        ║
   ║  Maps both tracking classes into ONE world space (heliocentric    ║
   ║  ecliptic J2000, AU):                                             ║
   ║    deep-space:  already heliocentric ecliptic       → identity    ║
   ║    satellites:  ECI equatorial km → rotate by −ε about X into     ║
   ║                 ecliptic, ÷AU, + Earth&#x27;s heliocentric position    ║
   ╚══════════════════════════════════════════════════════════════════╝ */
const BRIDGE={
  EPS:23.439291*Math.PI/180,
  eqToEcl(v){ /* equatorial → ecliptic (rotate about X by −ε) */
    const ce=Math.cos(this.EPS),se=Math.sin(this.EPS);
    return[v[0],ce*v[1]+se*v[2],-se*v[1]+ce*v[2]];
  },
  eclToEq(v){
    const ce=Math.cos(this.EPS),se=Math.sin(this.EPS);
    return[v[0],ce*v[1]-se*v[2],se*v[1]+ce*v[2]];
  },
  earthHelio(jd){return SS.planetPos(&#x27;Earth&#x27;,jd);},          /* AU, ecliptic */
  eciKmToHelioAU(rECI,jd){
    const e=this.eqToEcl(rECI);
    const E=this.earthHelio(jd);
    return[E[0]+e[0]/AU_KM,E[1]+e[1]/AU_KM,E[2]+e[2]/AU_KM];
  },
  helioAUToEarthKm(rHel,jd){ /* heliocentric AU → geocentric equatorial km */
    const E=this.earthHelio(jd);
    const g=[(rHel[0]-E[0])*AU_KM,(rHel[1]-E[1])*AU_KM,(rHel[2]-E[2])*AU_KM];
    return this.eclToEq(g);
  }
};

  PRESET_ELS:{
    &#x27;1;&#x27;:   {name:&#x27;1 Ceres&#x27;,   a:2.7666,e:0.0789,i:10.587,Om:80.27, w:73.74, M0:188.7,epoch:2461000.5},

    &#x27;DES=1P;CAP&#x27;:{name:&#x27;1P/Halley&#x27;,a:17.93,e:0.9679,i:162.19,Om:59.07,w:112.26,M0:38.8,epoch:2461000.5},
    &#x27;DES=2P;CAP&#x27;:{name:&#x27;2P/Encke&#x27;, a:2.218,e:0.8483,i:11.78,Om:334.56,w:187.34,M0:160.1,epoch:2461000.5}
  },
  presetEls(cmd){
    const p=this.PRESET_ELS[cmd];
    if(!p) return null;
    const n=0.9856076686/Math.pow(p.a,1.5); /* deg/day */
    return{a:p.a,e:p.e,i:p.i*D2R,Om:p.Om*D2R,w:p.w*D2R,M0:p.M0,n,epoch:p.epoch};
  },

  solveKepler(M,e){ /* bisection-safeguarded Newton — f(E)=E−e·sinE−M is monotone, so this always converges, even e→0.99 */
    M=((M%(2*Math.PI))+3*Math.PI)%(2*Math.PI)-Math.PI;
    let lo=-Math.PI,hi=Math.PI,E=e&lt;0.8?M:Math.PI*(M&gt;=0?1:-1)*0.999;
    for(let i=0;i&lt;64;i++){
      const f=E-e*Math.sin(E)-M;
      if(Math.abs(f)&lt;1e-12) break;
      if(f&gt;0) hi=E; else lo=E;
      let En=E-f/(1-e*Math.cos(E));
      if(!(En&gt;lo&amp;&amp;En&lt;hi)) En=(lo+hi)/2;
      E=En;
    }
    return E;
  },
  /* heliocentric ecliptic-J2000 position (AU) from element set at jd */
  posFromEls(a,e,I,om,Om,M){ /* angles rad */
    const E=this.solveKepler(M,e);
    const xp=a*(Math.cos(E)-e), yp=a*Math.sqrt(1-e*e)*Math.sin(E);
    const co=Math.cos(om),so=Math.sin(om),cO=Math.cos(Om),sO=Math.sin(Om),cI=Math.cos(I),sI=Math.sin(I);
    return[
      (co*cO-so*sO*cI)*xp+(-so*cO-co*sO*cI)*yp,
      (co*sO+so*cO*cI)*xp+(-so*sO+co*cO*cI)*yp,
      (so*sI)*xp+(co*sI)*yp];
  },
  planetEls(name,jd){
    const T=(jd-2451545.0)/36525;
    const[e0,e1]=this.EL[name];
    const a=e0[0]+e1[0]*T, e=e0[1]+e1[1]*T, I=(e0[2]+e1[2]*T)*D2R;
    const L=e0[3]+e1[3]*T, vp=e0[4]+e1[4]*T, Om0=e0[5]+e1[5]*T;
    const om=(vp-Om0)*D2R, Om=Om0*D2R;
    let M=((L-vp)%360+540)%360-180;
    return{a,e,I,om,Om,M:M*D2R};
  },
  planetPos(name,jd){
    const k=this.planetEls(name,jd);
    return this.posFromEls(k.a,k.e,k.I,k.om,k.Om,k.M);
  },
  /* display transform: ecliptic AU → scene units (compact compresses radius) */
  disp(v){
    const r=Math.hypot(v[0],v[1],v[2]);
    if(r&lt;1e-9) return new THREE.Vector3(0,0,0);
    const s=(this.trueScale?28*r:this.K*Math.pow(r,this.pExp))/r;
    return new THREE.Vector3(v[0]*s,v[2]*s,-v[1]*s); /* ecliptic plane horizontal */
  },

  /* ---- sprite helpers ---- */
  dotTex(color){
    const cv=document.createElement(&#x27;canvas&#x27;);cv.width=cv.height=64;
    const cx=cv.getContext(&#x27;2d&#x27;);
    const g=cx.createRadialGradient(32,32,2,32,32,30);
    g.addColorStop(0,&#x27;#ffffff&#x27;);g.addColorStop(0.25,color);g.addColorStop(1,&#x27;rgba(0,0,0,0)&#x27;);
    cx.fillStyle=g;cx.beginPath();cx.arc(32,32,30,0,2*Math.PI);cx.fill();
    return new THREE.CanvasTexture(cv);
  },
  labelTex(txt,color){
    const cv=document.createElement(&#x27;canvas&#x27;);
    const cx=cv.getContext(&#x27;2d&#x27;);
    cx.font=&#x27;600 26px &quot;Share Tech Mono&quot;,monospace&#x27;;
    const w=Math.ceil(cx.measureText(txt.toUpperCase()).width)+18;
    cv.width=w;cv.height=36;
    const c2=cv.getContext(&#x27;2d&#x27;);
    c2.font=&#x27;600 26px &quot;Share Tech Mono&quot;,monospace&#x27;;
    c2.fillStyle=color;c2.shadowColor=&#x27;rgba(0,0,0,0.9)&#x27;;c2.shadowBlur=5;
    c2.fillText(txt.toUpperCase(),9,28);
    const t=new THREE.CanvasTexture(cv);
    return{tex:t,aspect:w/36};
  },
  mkBody(name,color,rPx,clickCmd){
    const grp=new THREE.Group();
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:this.dotTex(color),sizeAttenuation:false,depthTest:false,transparent:true}));
    sp.scale.set(rPx*0.0042,rPx*0.0042,1);
    sp.userData={ssName:name,cmd:clickCmd};
    const lb=this.labelTex(name,color);
    const lab=new THREE.Sprite(new THREE.SpriteMaterial({map:lb.tex,sizeAttenuation:false,depthTest:false,transparent:true,opacity:.92}));
    lab.scale.set(0.035*lb.aspect,0.035,1);
    lab.position.set(0,0.028,0);
    lab.userData={ssName:name,cmd:clickCmd,isLabel:true};
    grp.add(sp);grp.add(lab);
    return{grp,sp,lab};
  },

  orbitPoints(elsFn,n=256){
    /* sample mean anomaly uniformly over one revolution at current epoch */
    const pts=[];
    const k=elsFn();
    for(let i=0;i&lt;=n;i++){
      const M=-Math.PI+2*Math.PI*i/n;
      const p=this.posFromEls(k.a,k.e,k.I,k.om,k.Om,M);
      pts.push(this.disp(p));
    }
    return pts;
  },

  init(){
    if(this.inited) return;
    this.inited=true;
    const container=document.getElementById(&#x27;ss-wrap&#x27;);
    const W=container.clientWidth||800,H=container.clientHeight||340;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(W,H);renderer.setClearColor(0x000204,1);
    container.appendChild(renderer.domElement);
    const scene=new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff,0.9));
    /* milky way */
    loadSkyTex(tex=&gt;{
      const sky=new THREE.Mesh(new THREE.SphereGeometry(5e4,40,24),
        new THREE.MeshBasicMaterial({map:tex,side:THREE.BackSide,depthWrite:false}));
      sky.rotation.x=1.0; /* galactic band tilted vs ecliptic (~60°) */
      scene.add(sky);
    },()=&gt;{
      const sv=[];
      for(let i=0;i&lt;2400;i++){const th=Math.random()*2*Math.PI,ph=Math.acos(2*Math.random()-1),r=4.6e4;
        sv.push(r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));}
      const sg=new THREE.BufferGeometry();sg.setAttribute(&#x27;position&#x27;,new THREE.Float32BufferAttribute(sv,3));
      scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xcfe2ff,size:60,transparent:true,opacity:.5})));
    });
    /* Sun */
    const sun=new THREE.Sprite(new THREE.SpriteMaterial({map:this.dotTex(&#x27;#ffcf5a&#x27;),sizeAttenuation:false,depthTest:false,transparent:true}));
    sun.scale.set(0.085,0.085,1);
    sun.userData={ssName:&#x27;Sun&#x27;,cmd:&#x27;10&#x27;};
    scene.add(sun);
    const sunGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:this.dotTex(&#x27;#ff9a2a&#x27;),sizeAttenuation:false,depthTest:false,transparent:true,opacity:.35}));
    sunGlow.scale.set(0.22,0.22,1);scene.add(sunGlow);
    this._sunSp=sun;

    const camera=new THREE.PerspectiveCamera(45,W/H,0.5,2e5);
    const ctrl=makeOrbitCtrl(renderer.domElement,camera,{rad:1500,theta:0.6,phi:0.95,minR:60,maxR:2.4e4});
    new ResizeObserver(()=&gt;{requestAnimationFrame(()=&gt;{const w=container.clientWidth,h=container.clientHeight;
      if(w&amp;&amp;h){renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}});}).observe(container);

    this.three={renderer,scene,camera,ctrl,container};
    this._ray=new THREE.Raycaster();this._mouse=new THREE.Vector2();
    const dom=renderer.domElement;
    dom.addEventListener(&#x27;pointermove&#x27;,e=&gt;{
      const r=dom.getBoundingClientRect();
      this._mouse.x=((e.clientX-r.left)/r.width)*2-1;
      this._mouse.y=-((e.clientY-r.top)/r.height)*2+1;
      this._mouseEv=e;
    });
    let dXY=null;
    dom.addEventListener(&#x27;pointerdown&#x27;,e=&gt;dXY=[e.clientX,e.clientY]);
    dom.addEventListener(&#x27;pointerup&#x27;,e=&gt;{
      if(!dXY)return;
      const mv=Math.hypot(e.clientX-dXY[0],e.clientY-dXY[1]);dXY=null;
      if(mv&lt;5) this.clickPick();
    });

    this.buildPlanets();
    this.buildGrid();
    this.buildBelts();
    /* bridge marker: the tracker&#x27;s primary TLE target mapped into heliocentric space */
    const bm=new THREE.Sprite(new THREE.SpriteMaterial({map:this.dotTex(&#x27;#00e5ff&#x27;),sizeAttenuation:false,depthTest:false,transparent:true}));
    bm.scale.set(0.02,0.02,1);bm.visible=false;
    this.three.scene.add(bm);this._bridgeMk=bm;
  },

  /* ── asteroid main belt + Kuiper belt: round-sprite point clouds with
        statistically representative element distributions; the whole cloud
        precesses at the belt&#x27;s mean motion so it lives, not poses ── */
  buildBelts(){
    if(this.beltGrp){this.three.scene.remove(this.beltGrp);}
    const grp=new THREE.Group();
    const mkCloud=(n,aMin,aMax,iMaxDeg,color,size,op)=&gt;{
      const pts=[];
      for(let k=0;k&lt;n;k++){
        const a=aMin+Math.random()*(aMax-aMin);
        const e=Math.random()*0.16;
        const i=(Math.random()**1.6)*iMaxDeg*D2R;
        const Om=Math.random()*2*Math.PI,w=Math.random()*2*Math.PI,M=Math.random()*2*Math.PI;
        const p=this.posFromEls(a,e,i,w,Om,M);
        pts.push(this.disp(p));
      }
      const g=new THREE.BufferGeometry().setFromPoints(pts);
      const m=new THREE.PointsMaterial({color:new THREE.Color(color),size,map:roundDotTex(),
        transparent:true,opacity:op,alphaTest:0.05,depthWrite:false,sizeAttenuation:false});
      const cloud=new THREE.Points(g,m);
      grp.add(cloud);
      return cloud;
    };
    /* warm dust-amber main belt + icy teal Kuiper — visually distinct from the
       cool-white starfield; clouds are non-pickable so clicks reach labeled bodies */
    this._mainBelt=mkCloud(1700,2.1,3.3,16,&#x27;#c89a5b&#x27;,2.4,0.6);
    this._kuiper=mkCloud(900,32,48,22,&#x27;#4fc3d9&#x27;,2.1,0.42);
    grp.children.forEach(c=&gt;c.raycast=function(){});
    this.beltGrp=grp;this.three.scene.add(grp);
    this._beltJd0=this.jd;
  },

  buildGrid(){
    if(this.gridGrp){this.three.scene.remove(this.gridGrp);}
    const grp=new THREE.Group();
    [1,2,5,10,20,30,40].forEach(rAU=&gt;{
      const pts=[];
      for(let i=0;i&lt;=128;i++){
        const a=2*Math.PI*i/128;
        pts.push(this.disp([rAU*Math.cos(a),rAU*Math.sin(a),0]));
      }
      const g=new THREE.BufferGeometry().setFromPoints(pts);
      grp.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x1d3a52,transparent:true,opacity:.5})));
      const lb=this.labelTex(rAU+&#x27; AU&#x27;,&#x27;#41617c&#x27;);
      const s=new THREE.Sprite(new THREE.SpriteMaterial({map:lb.tex,sizeAttenuation:false,depthTest:false,transparent:true,opacity:.8}));
      s.scale.set(0.026*lb.aspect,0.026,1);
      s.position.copy(this.disp([rAU,0,0]));
      grp.add(s);
    });
    /* vernal-equinox direction ♈ */
    const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),this.disp([46,0,0])]);
    grp.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:0x2a5470,transparent:true,opacity:.55})));
    this.gridGrp=grp;this.three.scene.add(grp);
  },

  buildPlanets(){
    this.bodies.forEach(b=&gt;this.three.scene.remove(b.grp));
    this.orbitLines.forEach(l=&gt;{this.three.scene.remove(l);l.geometry.dispose();});
    this.bodies=[];this.orbitLines=[];
    Object.keys(this.EL).forEach(name=&gt;{
      const st=this.STYLE[name];
      const b=this.mkBody(name,st.c,st.r,this.CMD[name]);
      this.three.scene.add(b.grp);
      const pts=this.orbitPoints(()=&gt;this.planetEls(name,this.jd));
      const g=new THREE.BufferGeometry().setFromPoints(pts);
      const line=new THREE.Line(g,new THREE.LineBasicMaterial({color:new THREE.Color(st.c),transparent:true,opacity:name===&#x27;Earth&#x27;?.65:.34}));
      line.userData={ssName:name};
      this.three.scene.add(line);
      this.orbitLines.push(line);
      this.bodies.push({name,...b,line});
    });
    this.refreshSmalls();
  },

  /* ---- small bodies fed by EPH (Horizons osculating elements) ---- */
  refreshSmalls(){
    this.smalls.forEach(s=&gt;{this.three.scene.remove(s.grp);if(s.line){this.three.scene.remove(s.line);s.line.geometry.dispose();}});
    this.smalls=[];
    if(typeof EPH===&#x27;undefined&#x27;) return;
    EPH.plotted.forEach(p=&gt;{
      if(!p.els&amp;&amp;!p.pack) return;
      const b=this.mkBody(p.name,p.color,7,p.cmd);
      this.three.scene.add(b.grp);
      let line=null;
      if(p.els&amp;&amp;p.els.e&lt;0.985){
        const pts=this.orbitPoints(()=&gt;({a:p.els.a,e:p.els.e,I:p.els.i,om:p.els.w,Om:p.els.Om,M:0}));
        const g=new THREE.BufferGeometry().setFromPoints(pts);
        line=new THREE.Line(g,new THREE.LineBasicMaterial({color:new THREE.Color(p.color),transparent:true,opacity:.6}));
        this.three.scene.add(line);
      }
      this.smalls.push({name:p.name,cmd:p.cmd,els:p.els,pack:p.pack||null,...b,line});
    });
  },
  smallPos(els,jd){
    let M=(els.M0+els.n*(jd-els.epoch))*D2R;
    M=((M%(2*Math.PI))+3*Math.PI)%(2*Math.PI)-Math.PI;
    return this.posFromEls(els.a,els.e,els.i,els.w,els.Om,M);
  },

  setScaleMode(trueScale,btn){
    this.trueScale=trueScale;
    document.querySelectorAll(&#x27;#ss-toolbar .ss-scale-btn&#x27;).forEach(b=&gt;b.classList.remove(&#x27;on&#x27;));
    if(btn) btn.classList.add(&#x27;on&#x27;);
    this.buildGrid();this.buildPlanets();this.buildBelts();
  },
  setRate(r,btn){ /* days-per-second → global epoch multiplier */
    EPOCH.setRate(r*86400);
    document.querySelectorAll(&#x27;#ss-toolbar .ss-rate-btn&#x27;).forEach(b=&gt;b.classList.remove(&#x27;on&#x27;));
    if(btn) btn.classList.add(&#x27;on&#x27;);
    document.getElementById(&#x27;ss-play&#x27;).textContent=&#x27;⏸&#x27;;
  },
  togglePlay(){
    EPOCH.togglePause();
    document.getElementById(&#x27;ss-play&#x27;).textContent=EPOCH.rate===0?&#x27;▶&#x27;:&#x27;⏸&#x27;;
  },
  goNow(){EPOCH.live();this.follow=null;if(this.three)this.three.ctrl.clearTarget();},
  step(days){EPOCH.scrub(days*86400000);},
  resetView(){
    this.follow=null;this.sel=null;
    const c=this.three.ctrl;c.clearTarget();c.tRad=1500;c.tTheta=0.6;c.tPhi=0.95;
  },

  frame(nowP,dt){
    const T=this.three;
    T.ctrl.update(dt);
    /* positions (epoch jd) */
    this.bodies.forEach(b=&gt;{
      const p=this.planetPos(b.name,this.jd);
      b.grp.position.copy(this.disp(p));
      const selOn=this.sel===b.name;
      b.sp.material.opacity=selOn?1:0.95;
      b.line.material.opacity=selOn?0.95:(b.name===&#x27;Earth&#x27;?0.65:0.34);
    });
    this.smalls.forEach(s=&gt;{
      let p=null;
      if(s.pack) p=EPHSVC.posAt(s.pack,this.jd);   /* exact JPL vectors + Hermite */
      if(!p&amp;&amp;s.els) p=this.smallPos(s.els,this.jd); /* Kepler fallback outside window */
      if(p) s.grp.position.copy(this.disp(p));
    });
    /* TLE-class primary mapped through the unified frame bridge */
    if(this._bridgeMk){
      let shown=false;
      if(typeof SEL!==&#x27;undefined&#x27;&amp;&amp;SEL.length&amp;&amp;SEL[0].tle&amp;&amp;SEL[0].tle.satrec){
        try{
          const pv=satellite.propagate(SEL[0].tle.satrec,EPOCH.now());
          if(pv&amp;&amp;pv.position&amp;&amp;isFinite(pv.position.x)){
            const hp=BRIDGE.eciKmToHelioAU([pv.position.x,pv.position.y,pv.position.z],this.jd);
            this._bridgeMk.position.copy(this.disp(hp));
            shown=true;
          }
        }catch(e){}
      }
      this._bridgeMk.visible=shown;
    }
    /* camera follow → smooth pan onto the focused body */
    if(this.follow){
      const b=this.bodies.find(x=&gt;x.name===this.follow)||this.smalls.find(x=&gt;x.name===this.follow);
      if(b) T.ctrl.setTarget(b.grp.position);
      else if(this.follow===&#x27;Sun&#x27;) T.ctrl.setTarget(new THREE.Vector3(0,0,0));
    }
    if(nowP-(this._infoT||0)&gt;300){this._infoT=nowP;this.renderInfo();}
    /* belts precess at their mean motion (~2.7 AU → 0.22°/day) */
    if(this.beltGrp){
      this.beltGrp.rotation.y=-(this.jd-(this._beltJd0||this.jd))*0.00386; /* rad: 0.221°/d */
    }
    /* readouts */
    const d=new Date((this.jd-2440587.5)*86400000);
    const el1=document.getElementById(&#x27;ss-date&#x27;);
    if(el1) el1.textContent=d.toISOString().slice(0,10)+&#x27; &#x27;+d.toISOString().slice(11,16)+&#x27; UTC&#x27;;
    const el2=document.getElementById(&#x27;ss-offset&#x27;);
    if(el2){
      const offD=EPOCH.offsetMs()/86400000;
      el2.textContent=Math.abs(offD)&lt;0.02?&#x27;· NOW&#x27;:(offD&gt;0?&#x27;+&#x27;:&#x27;−&#x27;)+Math.abs(offD).toFixed(1)+&#x27; d&#x27;;
    }
    /* hover */
    if(nowP-this._hoverLast&gt;80){this._hoverLast=nowP;this.hover();}
    T.renderer.render(T.scene,T.camera);
  },

  pickables(){
    const arr=[this._sunSp];
    this.bodies.forEach(b=&gt;{arr.push(b.sp);arr.push(b.lab);});
    this.smalls.forEach(s=&gt;{arr.push(s.sp);arr.push(s.lab);});
    return arr;
  },
  hover(){
    if(!this._mouseEv) return;
    this._ray.setFromCamera(this._mouse,this.three.camera);
    const hits=this._ray.intersectObjects(this.pickables());
    this.three.renderer.domElement.style.cursor=hits.length?&#x27;pointer&#x27;:&#x27;grab&#x27;;
  },
  clickPick(){
    this._ray.setFromCamera(this._mouse,this.three.camera);
    const hits=this._ray.intersectObjects(this.pickables());
    if(!hits.length) return;
    const u=hits[0].object.userData;
    if(!u||!u.ssName) return;
    this.sel=u.ssName;
    this.focus(u.ssName);
    if(u.cmd&amp;&amp;typeof EPH!==&#x27;undefined&#x27;){
      EPH.select({cmd:u.cmd,name:u.ssName});
    }
  },
  focus(name){ /* smooth camera pan onto the body&#x27;s position vector */
    this.follow=name;
    const b=this.bodies.find(x=&gt;x.name===name)||this.smalls.find(x=&gt;x.name===name);
    if(b){
      const d=b.grp.position.length();
      this.three.ctrl.setTarget(b.grp.position,Math.max(80,d*0.55));
    }
  },
  selectByName(name){this.sel=name;if(this.inited)this.focus(name);},

  /* ── overhauled high-visibility telemetry overlay ──
     live hybrid-layer extraction: heliocentric state vector (pos + velocity),
     az/el sweep, Earth &amp; Sun ranges, magnitude, phase, sidereal period */
  PERIODS:{Mercury:87.97,Venus:224.70,Earth:365.26,Mars:686.98,Jupiter:4332.6,
           Saturn:10759.2,Uranus:30688.5,Neptune:60182,Pluto:90560},
  renderInfo(){
    const el=document.getElementById(&#x27;ss-info&#x27;);if(!el)return;
    const name=this.follow||this.sel;
    if(!name||name===&#x27;Sun&#x27;){el.style.display=&#x27;none&#x27;;return;}
    const jd=this.jd;
    let p=null,v=null,src=&#x27;&#x27;;
    const pl=this.bodies.find(b=&gt;b.name===name);
    const sm=this.smalls.find(s=&gt;s.name===name);
    if(pl){
      p=this.planetPos(name,jd);
      const p2=this.planetPos(name,jd+1/1440);          /* +1 min */
      v=[(p2[0]-p[0])*1440,(p2[1]-p[1])*1440,(p2[2]-p[2])*1440]; /* AU/day */
      src=&#x27;STANDISH MEAN ELEMENTS&#x27;;
    } else if(sm){
      if(sm.pack){p=EPHSVC.posAt(sm.pack,jd);v=EPHSVC.velAt(sm.pack,jd);src=&#x27;JPL VECTORS · HERMITE C¹&#x27;;}
      if(!p&amp;&amp;sm.els){
        p=this.smallPos(sm.els,jd);
        const p2=this.smallPos(sm.els,jd+1/1440);
        v=[(p2[0]-p[0])*1440,(p2[1]-p[1])*1440,(p2[2]-p[2])*1440];
        src=&#x27;OSCULATING ELEMENTS&#x27;;
      }
    }
    if(!p){el.style.display=&#x27;none&#x27;;return;}
    const rSun=Math.hypot(p[0],p[1],p[2]);
    const E=BRIDGE.earthHelio(jd);
    const rE=Math.hypot(p[0]-E[0],p[1]-E[1],p[2]-E[2]);
    const vk=v?Math.hypot(v[0],v[1],v[2])*AU_KM/86400:null;  /* km/s */
    /* az/el + mag/phase from the live observer rows if this target is plotted */
    const plot=typeof EPH!==&#x27;undefined&#x27;?EPH.plotted.find(q=&gt;q.name===name||q.bodyName===name):null;
    let azel=&#x27;—&#x27;,mag=&#x27;—&#x27;,phase=&#x27;—&#x27;;
    if(plot&amp;&amp;plot.rows&amp;&amp;plot.rows.length){
      const tMs=(jd-2440587.5)*86400000;
      let i=0;
      const R=plot.rows;
      for(let k=0;k&lt;R.length;k++) if(Math.abs(R[k].d-tMs)&lt;Math.abs(R[i].d-tMs)) i=k;
      const j=Math.min(i+1,R.length-1);
      if(R[i].el!==null&amp;&amp;R[j].el!==null&amp;&amp;j&gt;i){
        const f=Math.max(0,Math.min(1,(tMs-R[i].d)/(R[j].d-R[i].d||1)));
        azel=(R[i].az+(R[j].az-R[i].az)*f).toFixed(1)+&#x27;° / &#x27;+(R[i].el+(R[j].el-R[i].el)*f).toFixed(1)+&#x27;°&#x27;;
      } else if(R[i].el!==null) azel=R[i].az.toFixed(1)+&#x27;° / &#x27;+R[i].el.toFixed(1)+&#x27;°&#x27;;
      if(R[i].mag!==null) mag=R[i].mag.toFixed(2);
      if(R[i].phase!==null) phase=R[i].phase.toFixed(1)+&#x27;° (&#x27;+(50*(1+Math.cos(R[i].phase*D2R))).toFixed(0)+&#x27;% LIT)&#x27;;
    }
    let period=&#x27;—&#x27;;
    if(this.PERIODS[name]) period=(this.PERIODS[name]/365.25).toFixed(2)+&#x27; yr&#x27;;
    else{
      const a=sm&amp;&amp;sm.els?sm.els.a:null;
      if(a) period=(Math.sqrt(a*a*a)*365.25&gt;730?Math.sqrt(a*a*a).toFixed(2)+&#x27; yr&#x27;:(Math.sqrt(a*a*a)*365.25).toFixed(1)+&#x27; d&#x27;);
    }
    const r6=x=&gt;(x&gt;=0?&#x27;+&#x27;:&#x27;&#x27;)+x.toFixed(6);
    el.style.display=&#x27;block&#x27;;
    el.innerHTML=&#x27;&lt;div class=&quot;ssi-name&quot;&gt;&#x27;+name.toUpperCase()+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-src&quot;&gt;&#x27;+src+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-grid&quot;&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;STATE r̄ (AU)&lt;/div&gt;&lt;div class=&quot;ssi-v mono&quot;&gt;&#x27;+r6(p[0])+&#x27;&lt;br/&gt;&#x27;+r6(p[1])+&#x27;&lt;br/&gt;&#x27;+r6(p[2])+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;VELOCITY&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+(vk?vk.toFixed(2)+&#x27; km/s&#x27;:&#x27;—&#x27;)+
        (v?&#x27;&lt;span class=&quot;ssi-sub&quot;&gt;[&#x27;+v.map(x=&gt;(x&gt;=0?&#x27;+&#x27;:&#x27;&#x27;)+x.toFixed(4)).join(&#x27;, &#x27;)+&#x27;] AU/d&lt;/span&gt;&#x27;:&#x27;&#x27;)+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;RANGE ☉&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+rSun.toFixed(4)+&#x27; AU&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;RANGE ⊕&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+rE.toFixed(4)+&#x27; AU · &#x27;+(rE*AU_KM/1e6).toFixed(1)+&#x27; M km&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;AZ / EL&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+azel+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;V MAG&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+mag+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;PHASE ∠&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+phase+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-k&quot;&gt;SID. PERIOD&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+period+&#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-foot&quot; onclick=&quot;SS.resetView()&quot;&gt;⟲ RELEASE CAMERA&lt;/div&gt;&#x27;;
  }
};

/* ════ V3 · EPHEMERIS — JPL HORIZONS multi-target observer module ════

   and phase from the JPL Horizons API for the observer site. Twilight state

  ],
  PALETTE:[&#x27;#00ff9d&#x27;,&#x27;#ffd24a&#x27;,&#x27;#ff5fd2&#x27;,&#x27;#9d6bff&#x27;,&#x27;#4ad9ff&#x27;,&#x27;#ff8a4a&#x27;],
  enabled:{PLANETS:true,&#x27;SUN / MOON&#x27;:true,ASTEROIDS:true,COMETS:true},
  cache:{},elsCache:{},
  plotted:[],            /* [{cmd,name,g,color,rows,bodyName,els?}] */
  active:null,           /* cmd of the active (detailed) target */

  /* ───────── sidebar list ───────── */
  renderList(){

  /* ── dynamic fuzzy search → JPL SBDB name resolution ──
     debounced; resolves fuzzy keywords to valid Horizons command IDs;
     cleanly catches misses with a stylized NO RECORD FOUND warning */
  _sbdbTimer:null,_sbdbToken:0,
  sbdbType(){
    clearTimeout(this._sbdbTimer);
    const v=document.getElementById(&#x27;eph-custom-inp&#x27;).value.trim();
    const box=document.getElementById(&#x27;eph-sbdb-results&#x27;);
    if(v.length&lt;2){box.style.display=&#x27;none&#x27;;box.innerHTML=&#x27;&#x27;;return;}
    box.style.display=&#x27;block&#x27;;
    box.innerHTML=&#x27;&lt;div class=&quot;sbdb-row dim&quot;&gt;⌕ searching SBDB…&lt;/div&gt;&#x27;;
    this._sbdbTimer=setTimeout(()=&gt;this.sbdbRun(v),450);
  },
  async sbdbRun(v){
    const token=++this._sbdbToken;
    const res=await EPHSVC.sbdbLookup(v);
    if(token!==this._sbdbToken) return;
    const box=document.getElementById(&#x27;eph-sbdb-results&#x27;);
    if(!box) return;
    if(res.ok){

    siteCoordStr(){

  /* ───────── selection / fetching ───────── */
  async select(it){
    const token=++this._token;
    this.active=it.cmd;
    this.renderList();
    document.getElementById(&#x27;eph-empty&#x27;).style.display=&#x27;none&#x27;;
    document.getElementById(&#x27;eph-target-name&#x27;).textContent=it.name.toUpperCase();
    document.getElementById(&#x27;eph-target-sub&#x27;).textContent=&#x27;HORIZONS CMD &#x27;+it.cmd+&#x27; · FETCHING…&#x27;;
    document.getElementById(&#x27;eph-fetch-state&#x27;).textContent=&#x27;QUERYING…&#x27;;
    const lg=document.getElementById(&#x27;eph-log&#x27;);lg.textContent=&#x27;&#x27;;lg.style.display=&#x27;none&#x27;;
    if(typeof SS!==&#x27;undefined&#x27;) SS.selectByName(it.name);

    /* register in plotted set IMMEDIATELY — the 3-D orbit must appear even if
       the observer-table fetch later fails (network/CORS) */
    let plot=this.plotted.find(p=&gt;p.cmd===it.cmd);
    if(!plot){
      if(this.plotted.length&gt;=6) this.removePlot(this.plotted[0].cmd,true);
      plot={cmd:it.cmd,name:it.name,g:it.g||&#x27;◆&#x27;,color:this.PALETTE[this.plotted.length%this.PALETTE.length]};
      this.plotted.push(plot);
    }
    if(this.isSmallBody(it.cmd)){
      if(!plot.els&amp;&amp;typeof SS!==&#x27;undefined&#x27;){const pe=SS.presetEls(it.cmd);if(pe) plot.els=pe;}
      if(typeof SS!==&#x27;undefined&#x27;&amp;&amp;SS.inited) SS.refreshSmalls();
      EPHSVC.getVectors(it.cmd).then(pack=&gt;{
        if(pack){plot.pack=pack;if(typeof SS!==&#x27;undefined&#x27;&amp;&amp;SS.inited) SS.refreshSmalls();}
      });
      this.fetchElements(it.cmd).then(els=&gt;{
        if(els){plot.els=els;if(typeof SS!==&#x27;undefined&#x27;&amp;&amp;SS.inited) SS.refreshSmalls();}
      });
    }
    this.renderList();

    const key=it.cmd+&#x27;|&#x27;+this.siteCoordStr()+&#x27;|&#x27;+new Date().toISOString().slice(0,13);
    let res=this.cache[key];
    if(!res){
      res=await this.fetchHorizons(it.cmd);
      if(token!==this._token) return;
      if(res&amp;&amp;res.rows&amp;&amp;res.rows.length) this.cache[key]=res;
    }
    if(token!==this._token) return;
    document.getElementById(&#x27;eph-fetch-state&#x27;).textContent=res&amp;&amp;res.rows.length?&#x27;LIVE&#x27;:&#x27;ERROR&#x27;;
    if(!res){this.showError(&#x27;Horizons observer-table request failed (network/CORS) — 3-D orbit still plotted. Try ↺ refetch.&#x27;);return;}
    if(!res.rows.length){
      this.showError(res.msg||&#x27;No ephemeris rows returned.&#x27;);
      if(res.excerpt){lg.textContent=res.excerpt;lg.style.display=&#x27;block&#x27;;}
      return;
    }
    plot.rows=res.rows;plot.bodyName=res.bodyName||it.name;plot.fetchedAt=new Date();
    document.getElementById(&#x27;eph-target-sub&#x27;).textContent=
      (res.bodyName||it.name)+&#x27; · &#x27;+res.rows.length+&#x27; × 30-min steps · 72 h · fetched &#x27;+fmtUTCShort(plot.fetchedAt)+&#x27; UTC&#x27;;
    this.renderList();
    this.renderAll();
    if(typeof SS!==&#x27;undefined&#x27;&amp;&amp;SS.inited) SS.refreshSmalls();
  },
  removePlot(cmd,silent){

      else{

  setActive(cmd){

    if(typeof SS!==&#x27;undefined&#x27;) SS.selectByName(p.name);

  },
  refetch(){
    if(!this.active) return;
    const p=this.plotted.find(x=&gt;x.cmd===this.active);
    if(!p) return;
    const key=p.cmd+&#x27;|&#x27;+this.siteCoordStr()+&#x27;|&#x27;+new Date().toISOString().slice(0,13);

  onSiteChange(){
    this.cache={};
    this.renderSiteChip();
    /* refetch every plotted target for the new site */
