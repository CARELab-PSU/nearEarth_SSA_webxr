  showError(msg){
    document.getElementById(&#x27;eph-target-sub&#x27;).textContent=&#x27;⚠ &#x27;+msg;
    document.getElementById(&#x27;eph-verdict&#x27;).style.display=&#x27;none&#x27;;
  },

  async fetchHorizons(cmd){
    const start=new Date(Date.now()-30*60000);
    const stop=new Date(Date.now()+72*3600000);
    const fmt=d=&gt;&quot;&#x27;&quot;+d.toISOString().slice(0,16).replace(&#x27;T&#x27;,&#x27; &#x27;)+&quot;&#x27;&quot;;
    const p=new URLSearchParams({
      format:&#x27;text&#x27;,COMMAND:&quot;&#x27;&quot;+cmd+&quot;&#x27;&quot;,OBJ_DATA:&#x27;NO&#x27;,MAKE_EPHEM:&#x27;YES&#x27;,
      EPHEM_TYPE:&#x27;OBSERVER&#x27;,CENTER:&quot;&#x27;coord@399&#x27;&quot;,COORD_TYPE:&#x27;GEODETIC&#x27;,
      SITE_COORD:&quot;&#x27;&quot;+this.siteCoordStr()+&quot;&#x27;&quot;,
      START_TIME:fmt(start),STOP_TIME:fmt(stop),STEP_SIZE:&quot;&#x27;30 m&#x27;&quot;,
      QUANTITIES:&quot;&#x27;1,4,9,20,23,24&#x27;&quot;,ANG_FORMAT:&#x27;DEG&#x27;,CSV_FORMAT:&#x27;YES&#x27;,
      APPARENT:&#x27;AIRLESS&#x27;,EXTRA_PREC:&#x27;NO&#x27;});
    return this.fetchAPI(p,txt=&gt;this.parse(txt));
  },
  async fetchElements(cmd){
    const k=cmd+&#x27;|els&#x27;;
    if(this.elsCache[k]) return this.elsCache[k];
    const now=new Date(),then=new Date(now.getTime()+3600000);
    const fmt=d=&gt;&quot;&#x27;&quot;+d.toISOString().slice(0,16).replace(&#x27;T&#x27;,&#x27; &#x27;)+&quot;&#x27;&quot;;
    const p=new URLSearchParams({
      format:&#x27;text&#x27;,COMMAND:&quot;&#x27;&quot;+cmd+&quot;&#x27;&quot;,OBJ_DATA:&#x27;NO&#x27;,MAKE_EPHEM:&#x27;YES&#x27;,
      EPHEM_TYPE:&#x27;ELEMENTS&#x27;,CENTER:&quot;&#x27;500@10&#x27;&quot;,
      START_TIME:fmt(now),STOP_TIME:fmt(then),STEP_SIZE:&#x27;1&#x27;,
      OUT_UNITS:&#x27;AU-D&#x27;,REF_PLANE:&#x27;ECLIPTIC&#x27;,CSV_FORMAT:&#x27;YES&#x27;});
    const out=await this.fetchAPI(p,txt=&gt;this.parseElements(txt));
    if(out) this.elsCache[k]=out;
    return out;
  },
  async fetchAPI(params,parser){
    const base=&#x27;https://ssd.jpl.nasa.gov/api/horizons.api?&#x27;+params.toString();
    const urls=[base,&#x27;https://corsproxy.io/?&#x27;+encodeURIComponent(base),
      &#x27;https://api.allorigins.win/raw?url=&#x27;+encodeURIComponent(base)];
    for(const u of urls){
      try{
        const r=await fetch(u,{signal:fetchTimeoutSignal(15000)});
        if(!r.ok) continue;
        const txt=await r.text();
        if(txt.length&gt;100) return parser(txt);
      }catch(e){}
    }
    return null;
  },

  /* observer-table parser: $$SOE..$$EOE CSV */
  parse(txt){
    const out={rows:[],bodyName:null,msg:null,excerpt:null};
    const tn=txt.match(/Target body name:\s*(.+?)\s{2,}/);
    if(tn) out.bodyName=tn[1].trim();
    const i0=txt.indexOf(&#x27;$$SOE&#x27;),i1=txt.indexOf(&#x27;$$EOE&#x27;);
    if(i0&lt;0||i1&lt;0){
      if(/Multiple major-bodies|matches|Matching small-bodies/i.test(txt)){
        out.msg=&#x27;Ambiguous designation — Horizons returned multiple matches (list below). Refine the query.&#x27;;
        out.excerpt=txt.split(&#x27;\n&#x27;).filter(l=&gt;/^\s*-?\d|Record|name/i.test(l)).slice(0,25).join(&#x27;\n&#x27;);
      } else if(/No ephemeris|cannot be computed|No site/i.test(txt)){
        out.msg=&#x27;Horizons could not compute an ephemeris for this target/site.&#x27;;
        out.excerpt=txt.slice(0,600);
      } else {out.msg=&#x27;Unexpected Horizons response.&#x27;;out.excerpt=txt.slice(0,600);}
      return out;
    }
    const MON={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    txt.slice(i0+5,i1).split(&#x27;\n&#x27;).forEach(line=&gt;{
      line=line.trim();if(!line) return;
      const c=line.split(&#x27;,&#x27;).map(s=&gt;s.trim());
      if(c.length&lt;7) return;
      const dm=c[0].match(/(\d{4})-([A-Za-z]{3})-(\d{2})\s+(\d{2}):(\d{2})/);
      if(!dm) return;
      const d=new Date(Date.UTC(+dm[1],MON[dm[2]],+dm[3],+dm[4],+dm[5]));
      const num=v=&gt;{const f=parseFloat(v);return isFinite(f)?f:null;};
      out.rows.push({
        d,sunFlag:c[1]||&#x27;&#x27;,moonFlag:c[2]||&#x27;&#x27;,
        ra:num(c[3]),dec:num(c[4]),az:num(c[5]),el:num(c[6]),
        mag:num(c[7]),sbrt:num(c[8]),delta:num(c[9]),deldot:num(c[10]),
        elong:num(c[11]),phase:num(c[13])});
    });
    return out;
  },
  /* ELEMENTS parser → {a,e,i,Om,w,M0,n,epoch}  (angles rad, n deg/day, epoch JD TDB) */
  parseElements(txt){
    const i0=txt.indexOf(&#x27;$$SOE&#x27;),i1=txt.indexOf(&#x27;$$EOE&#x27;);
    if(i0&lt;0||i1&lt;0) return null;
    const line=txt.slice(i0+5,i1).split(&#x27;\n&#x27;).map(l=&gt;l.trim()).find(l=&gt;l.length&gt;10);
    if(!line) return null;
    const c=line.split(&#x27;,&#x27;).map(s=&gt;s.trim());
    /* CSV columns: JDTDB, CalDate, EC, QR, IN, OM, W, Tp, N, MA, TA, A, AD, PR */
    const f=i=&gt;parseFloat(c[i]);
    if(c.length&lt;12||!isFinite(f(2))) return null;
    return{epoch:f(0),e:f(2),i:f(4)*D2R,Om:f(5)*D2R,w:f(6)*D2R,n:f(8),M0:f(9),a:f(11)};
  },

  twiLabel(f){return f===&#x27;*&#x27;?&#x27;DAYLIGHT&#x27;:f===&#x27;C&#x27;?&#x27;CIVIL TWILIGHT&#x27;:f===&#x27;N&#x27;?&#x27;NAUTICAL TWILIGHT&#x27;:f===&#x27;A&#x27;?&#x27;ASTRONOMICAL TWILIGHT&#x27;:&#x27;NIGHT&#x27;;},
  twiShort(f){return f===&#x27;*&#x27;?&#x27;DAY&#x27;:f===&#x27;C&#x27;?&#x27;CIV&#x27;:f===&#x27;N&#x27;?&#x27;NAU&#x27;:f===&#x27;A&#x27;?&#x27;AST&#x27;:&#x27;NIGHT&#x27;;},
  twiColor(f){return f===&#x27;*&#x27;?&#x27;rgba(120,170,255,0.20)&#x27;:f===&#x27;C&#x27;?&#x27;rgba(110,140,235,0.135)&#x27;:f===&#x27;N&#x27;?&#x27;rgba(100,110,210,0.085)&#x27;:f===&#x27;A&#x27;?&#x27;rgba(85,85,170,0.05)&#x27;:&#x27;rgba(0,0,0,0)&#x27;;},
  twiText(f){return f===&#x27;*&#x27;?&#x27;rgba(150,195,255,.95)&#x27;:f===&#x27;C&#x27;?&#x27;rgba(140,165,245,.9)&#x27;:f===&#x27;N&#x27;?&#x27;rgba(130,140,225,.85)&#x27;:f===&#x27;A&#x27;?&#x27;rgba(125,120,205,.8)&#x27;:&#x27;rgba(110,130,150,.75)&#x27;;},
  darkOK(f){return f===&#x27;&#x27;||f===&#x27;A&#x27;;},
  minEl(){return parseInt(document.getElementById(&#x27;eph-minel&#x27;).value,10);},

  activePlot(){return this.plotted.find(p=&gt;p.cmd===this.active);},

  /* ───────── rendering ───────── */
  renderAll(){
    const ap=this.activePlot();if(!ap) return;
    if(!ap.rows||!ap.rows.length) return;
    const rows=ap.rows,minEl=this.minEl();
    const exempt=ap.cmd===&#x27;10&#x27;||ap.cmd===&#x27;301&#x27;;
    const visAt=r=&gt;r.el!==null&amp;&amp;r.el&gt;minEl&amp;&amp;(exempt||this.darkOK(r.sunFlag));
    const nowMs=Date.now();
    let iNow=0;for(let i=0;i&lt;rows.length;i++) if(Math.abs(rows[i].d-nowMs)&lt;Math.abs(rows[iNow].d-nowMs)) iNow=i;
    const rNow=rows[iNow];

    /* plotted chips */
    const pc=document.getElementById(&#x27;eph-plotted&#x27;);
    pc.innerHTML=&#x27;&lt;span class=&quot;ep-lbl&quot;&gt;PLOTTED&lt;/span&gt;&#x27;+this.plotted.map(p=&gt;
      &#x27;&lt;span class=&quot;ep-chip&#x27;+(p.cmd===this.active?&#x27; on&#x27;:&#x27;&#x27;)+&#x27;&quot; style=&quot;--c:&#x27;+p.color+&#x27;&quot; &#x27;+
      &#x27;onclick=&quot;EPH.setActive(\&#x27;&#x27;+p.cmd.replace(/&#x27;/g,&quot;\\&#x27;&quot;)+&#x27;\&#x27;)&quot;&gt;&#x27;+p.g+&#x27; &#x27;+p.name+
      &#x27;&lt;i onclick=&quot;event.stopPropagation();EPH.removePlot(\&#x27;&#x27;+p.cmd.replace(/&#x27;/g,&quot;\\&#x27;&quot;)+&#x27;\&#x27;)&quot;&gt;✕&lt;/i&gt;&lt;/span&gt;&#x27;).join(&#x27;&#x27;);

    /* verdict */
    const v=document.getElementById(&#x27;eph-verdict&#x27;);
    v.style.display=&#x27;inline-flex&#x27;;
    if(visAt(rNow)){v.textContent=&#x27;● VISIBLE NOW&#x27;;v.className=&#x27;verdict v-vis&#x27;;}
    else if(rNow.el!==null&amp;&amp;rNow.el&gt;minEl){v.textContent=&#x27;◐ UP · SKY TOO BRIGHT (&#x27;+this.twiShort(rNow.sunFlag)+&#x27;)&#x27;;v.className=&#x27;verdict v-bright&#x27;;}
    else{v.textContent=&#x27;○ BELOW &#x27;+minEl+&#x27;° NOW&#x27;;v.className=&#x27;verdict v-down&#x27;;}

    /* now grid (timestamped) */
    const g=document.getElementById(&#x27;eph-now-grid&#x27;);
    g.style.display=&#x27;flex&#x27;;
    const cell=(k,val,cls)=&gt;&#x27;&lt;div class=&quot;eg&quot;&gt;&lt;div class=&quot;eg-k&quot;&gt;&#x27;+k+&#x27;&lt;/div&gt;&lt;div class=&quot;eg-v &#x27;+(cls||&#x27;&#x27;)+&#x27;&quot;&gt;&#x27;+val+&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
    const raH=rNow.ra!==null?(rNow.ra/15):null;
    const raStr=raH!==null?(Math.floor(raH)+&#x27;h &#x27;+padZ(Math.floor((raH%1)*60))+&#x27;m &#x27;+padZ(Math.round((((raH%1)*60)%1)*60))+&#x27;s&#x27;):&#x27;—&#x27;;
    const decStr=rNow.dec!==null?((rNow.dec&gt;=0?&#x27;+&#x27;:&#x27;&#x27;)+rNow.dec.toFixed(3)+&#x27;°&#x27;):&#x27;—&#x27;;
    g.innerHTML=
      cell(&#x27;EPOCH&#x27;,fmtLocalShort(rNow.d,SITE.tz)+&#x27; LOC / &#x27;+fmtUTCShort(rNow.d)+&#x27; UTC&#x27;,&#x27;accent&#x27;)+
      cell(&#x27;AZ / EL&#x27;,rNow.az!==null?rNow.az.toFixed(1)+&#x27;° / &#x27;+rNow.el.toFixed(1)+&#x27;°&#x27;:&#x27;—&#x27;,rNow.el&gt;minEl?&#x27;green&#x27;:&#x27;&#x27;)+
      cell(&#x27;RA (APP)&#x27;,raStr)+cell(&#x27;DEC (APP)&#x27;,decStr)+
      cell(&#x27;V MAG&#x27;,rNow.mag!==null?rNow.mag.toFixed(2):&#x27;—&#x27;)+
      cell(&#x27;RANGE&#x27;,rNow.delta!==null?(rNow.delta&lt;0.01?(rNow.delta*149597870.7).toFixed(0)+&#x27; km&#x27;:rNow.delta.toFixed(4)+&#x27; AU&#x27;):&#x27;—&#x27;)+
      cell(&#x27;RANGE-RATE&#x27;,rNow.deldot!==null?rNow.deldot.toFixed(2)+&#x27; km/s&#x27;:&#x27;—&#x27;)+
      cell(&#x27;SOLAR ELONG&#x27;,rNow.elong!==null?rNow.elong.toFixed(1)+&#x27;°&#x27;:&#x27;—&#x27;)+
      cell(&#x27;PHASE&#x27;,rNow.phase!==null?rNow.phase.toFixed(1)+&#x27;°&#x27;:&#x27;—&#x27;)+
      cell(&#x27;SKY&#x27;,this.twiLabel(rNow.sunFlag),this.darkOK(rNow.sunFlag)?&#x27;green&#x27;:&#x27;amber&#x27;);

    /* windows (active target) */
    const wins=[];let w=null;
    rows.forEach((r,i)=&gt;{
      if(visAt(r)){if(!w)w={i0:i,i1:i,pk:r.el,iPk:i};else{w.i1=i;if(r.el&gt;w.pk){w.pk=r.el;w.iPk=i;}}}
      else if(w){wins.push(w);w=null;}
    });
    if(w)wins.push(w);
    const wt=document.getElementById(&#x27;eph-win-title&#x27;),wb=document.getElementById(&#x27;eph-windows&#x27;);
    wt.style.display=&#x27;block&#x27;;
    wt.textContent=&#x27;VISIBILITY WINDOWS · &#x27;+ap.name.toUpperCase()+&#x27; · EL &gt;&#x27;+minEl+&#x27;°&#x27;+(exempt?&#x27;&#x27;:&#x27; IN ASTRONOMICAL DARKNESS&#x27;);
    if(!wins.length){
      wb.innerHTML=&#x27;&lt;div class=&quot;eph-nowin&quot;&gt;NO VISIBILITY WINDOWS IN THE NEXT 72 H&lt;/div&gt;&#x27;;
    } else {
      wb.innerHTML=&#x27;&lt;div class=&quot;ew-row hdr&quot;&gt;&lt;span&gt;START (LOCAL)&lt;/span&gt;&lt;span&gt;END (LOCAL)&lt;/span&gt;&lt;span&gt;DUR&lt;/span&gt;&lt;span&gt;PEAK EL&lt;/span&gt;&lt;span&gt;AZ@PK&lt;/span&gt;&lt;span&gt;MAG&lt;/span&gt;&lt;/div&gt;&#x27;+
        wins.map(W=&gt;{
          const a=rows[W.i0],b=rows[W.i1],pk=rows[W.iPk];
          const dur=(b.d-a.d)/60000+30;
          return&#x27;&lt;div class=&quot;ew-row&quot;&gt;&lt;span class=&quot;green&quot;&gt;&#x27;+this.dayTag(a.d)+&#x27; &#x27;+fmtLocalShort(a.d,SITE.tz)+&#x27;&lt;/span&gt;&#x27;+
            &#x27;&lt;span&gt;&#x27;+this.dayTag(b.d)+&#x27; &#x27;+fmtLocalShort(b.d,SITE.tz)+&#x27;&lt;/span&gt;&#x27;+
            &#x27;&lt;span&gt;&#x27;+(dur&gt;=60?Math.floor(dur/60)+&#x27;h&#x27;+padZ(Math.round(dur%60)):Math.round(dur)+&#x27;m&#x27;)+&#x27;&lt;/span&gt;&#x27;+
            &#x27;&lt;span class=&quot;amber&quot;&gt;&#x27;+pk.el.toFixed(0)+&#x27;°&lt;/span&gt;&lt;span&gt;&#x27;+pk.az.toFixed(0)+&#x27;°&lt;/span&gt;&#x27;+
            &#x27;&lt;span&gt;&#x27;+(pk.mag!==null?pk.mag.toFixed(1):&#x27;—&#x27;)+&#x27;&lt;/span&gt;&lt;/div&gt;&#x27;;
        }).join(&#x27;&#x27;);
    }
    document.getElementById(&#x27;eph-att&#x27;).style.display=&#x27;block&#x27;;
    this.renderSiteChip();
    this.drawChart();
  },
  dayTag(d){
    const DAYS=[&#x27;SUN&#x27;,&#x27;MON&#x27;,&#x27;TUE&#x27;,&#x27;WED&#x27;,&#x27;THU&#x27;,&#x27;FRI&#x27;,&#x27;SAT&#x27;];
    /* local civil date via tz offset */
    const loc=new Date(d.getTime()+(SITE.tzOffsetMin||0)*60000);
    return DAYS[loc.getUTCDay()]+&#x27; &#x27;+loc.getUTCDate();
  },

  drawChart(){
    const ap=this.activePlot();if(!ap) return;
    const panel=document.getElementById(&#x27;eph-chart-panel&#x27;);panel.style.display=&#x27;block&#x27;;
    const c=document.getElementById(&#x27;eph-chart&#x27;);
    resizeCanvas(c);
    const ctx=c.getContext(&#x27;2d&#x27;),W=c.width,H=c.height;
    if(!ap.rows||!ap.rows.length) return;
    const rows=ap.rows,minEl=this.minEl();
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=&#x27;#02080f&#x27;;ctx.fillRect(0,0,W,H);
    const padL=36,padR=10,padT=22,padB=30;
    const pw=W-padL-padR,ph=H-padT-padB;
    const t0=rows[0].d.getTime(),t1=rows[rows.length-1].d.getTime();
    const X=t=&gt;padL+((t-t0)/(t1-t0))*pw;
    const elMin=-30,elMax=90;
    const Y=el=&gt;padT+(1-(el-elMin)/(elMax-elMin))*ph;

    /* twilight bands from the ACTIVE target&#x27;s solar-presence flags + labels */
    let bi=0;
    while(bi&lt;rows.length-1){
      const f=rows[bi].sunFlag;let bj=bi;
      while(bj&lt;rows.length-1&amp;&amp;rows[bj+1].sunFlag===f) bj++;
      const x0=X(rows[bi].d),x1=X(rows[Math.min(bj+1,rows.length-1)].d);
      const col=this.twiColor(f);
      if(col!==&#x27;rgba(0,0,0,0)&#x27;){ctx.fillStyle=col;ctx.fillRect(x0,padT,x1-x0,ph);}
      if(x1-x0&gt;34){ /* readable in-chart band label */
        ctx.fillStyle=this.twiText(f);
        ctx.font=&#x27;bold 10px &quot;Share Tech Mono&quot;,monospace&#x27;;ctx.textAlign=&#x27;center&#x27;;
        ctx.fillText(this.twiShort(f),(x0+x1)/2,padT-9);
        ctx.strokeStyle=this.twiText(f);ctx.lineWidth=.6;ctx.globalAlpha=.6;
        ctx.beginPath();ctx.moveTo(x0+1,padT-5);ctx.lineTo(x1-1,padT-5);ctx.stroke();ctx.globalAlpha=1;
      }
      bi=bj+1;
    }
    /* grid */
    ctx.font=&#x27;11px IBM Plex Mono&#x27;;ctx.textAlign=&#x27;right&#x27;;
    [-30,0,30,60,90].forEach(e=&gt;{
      ctx.strokeStyle=e===0?&#x27;rgba(0,229,255,0.5)&#x27;:&#x27;rgba(28,58,82,0.7)&#x27;;
      ctx.lineWidth=e===0?1:0.5;
      ctx.beginPath();ctx.moveTo(padL,Y(e));ctx.lineTo(W-padR,Y(e));ctx.stroke();
      ctx.fillStyle=&#x27;rgba(138,163,181,0.9)&#x27;;ctx.fillText(e+&#x27;°&#x27;,padL-4,Y(e)+2);
    });
    ctx.strokeStyle=&#x27;rgba(157,107,255,0.55)&#x27;;ctx.setLineDash([4,4]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padL,Y(minEl));ctx.lineTo(W-padR,Y(minEl));ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=&#x27;rgba(157,107,255,0.85)&#x27;;ctx.textAlign=&#x27;left&#x27;;
    ctx.fillText(&#x27;MIN EL &#x27;+minEl+&#x27;°&#x27;,padL+4,Y(minEl)-3);

    /* time axis: local-midnight ticks with weekday+date, noon minor */
    ctx.textAlign=&#x27;center&#x27;;
    for(let t=t0;t&lt;=t1;t+=1800000){
      const d=new Date(t);
      const ls=fmtLocalTime(d,SITE.tz);
      const lh=parseInt(ls.slice(0,2),10),lm=parseInt(ls.slice(3,5),10);
      if(lm!==0) continue;
      if(lh===0){
        ctx.strokeStyle=&#x27;rgba(0,229,255,0.3)&#x27;;ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(X(t),padT);ctx.lineTo(X(t),padT+ph);ctx.stroke();
        ctx.fillStyle=&#x27;rgba(0,229,255,0.9)&#x27;;ctx.font=&#x27;bold 11px &quot;Share Tech Mono&quot;,monospace&#x27;;
        ctx.fillText(this.dayTag(new Date(t+3600000)),X(t),H-17);
        ctx.fillStyle=&#x27;rgba(138,163,181,0.8)&#x27;;ctx.font=&#x27;10px IBM Plex Mono&#x27;;
        ctx.fillText(&#x27;00:00&#x27;,X(t),H-7);
      } else if(lh%6===0){
        ctx.strokeStyle=&#x27;rgba(50,80,105,0.35)&#x27;;ctx.lineWidth=.5;
        ctx.beginPath();ctx.moveTo(X(t),padT);ctx.lineTo(X(t),padT+ph);ctx.stroke();
        ctx.fillStyle=&#x27;rgba(110,135,155,0.85)&#x27;;ctx.font=&#x27;10px IBM Plex Mono&#x27;;
        ctx.fillText(padZ(lh)+&#x27;:00&#x27;,X(t),H-7);
      }
    }
    ctx.textAlign=&#x27;left&#x27;;
    ctx.fillStyle=&#x27;rgba(138,163,181,0.85)&#x27;;ctx.font=&#x27;10px &quot;Share Tech Mono&quot;,monospace&#x27;;
    ctx.fillText(&#x27;LOCAL TIME · &#x27;+SITE.tz,padL,H-17);

    /* curves: every plotted target; active = thick, visible spans glow green */
    this.plotted.forEach(p=&gt;{
      const isA=p.cmd===this.active;
      const ex2=p.cmd===&#x27;10&#x27;||p.cmd===&#x27;301&#x27;;
      if(!p.rows||!p.rows.length) return;
      for(let i=0;i&lt;p.rows.length-1;i++){
        const a=p.rows[i],b=p.rows[i+1];
        if(a.el===null||b.el===null) continue;
        if(a.d&lt;t0||b.d&gt;t1) continue;
        const vis=a.el&gt;minEl&amp;&amp;(ex2||this.darkOK(a.sunFlag));
        if(isA&amp;&amp;vis){ctx.strokeStyle=&#x27;#00ff9d&#x27;;ctx.lineWidth=2.6;ctx.shadowColor=&#x27;#00ff9d&#x27;;ctx.shadowBlur=6;}
        else{ctx.strokeStyle=p.color;ctx.lineWidth=isA?1.7:1;ctx.shadowBlur=0;ctx.globalAlpha=isA?0.95:0.55;}
        ctx.beginPath();ctx.moveTo(X(a.d),Y(a.el));ctx.lineTo(X(b.d),Y(b.el));ctx.stroke();
        ctx.shadowBlur=0;ctx.globalAlpha=1;
      }
    });

    /* NOW line with timestamp (global epoch) */
    const nowMs=EPOCH.ms();
    if(nowMs&gt;=t0&amp;&amp;nowMs&lt;=t1){
      ctx.strokeStyle=&#x27;#ffd24a&#x27;;ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(X(nowMs),padT);ctx.lineTo(X(nowMs),padT+ph);ctx.stroke();
      ctx.fillStyle=&#x27;#ffd24a&#x27;;ctx.font=&#x27;bold 10px &quot;Share Tech Mono&quot;,monospace&#x27;;ctx.textAlign=&#x27;center&#x27;;
      ctx.fillText(&#x27;NOW &#x27;+fmtLocalShort(new Date(nowMs),SITE.tz),X(nowMs),padT+8);
      ctx.textAlign=&#x27;left&#x27;;
    }
    ctx.save();ctx.translate(9,padT+ph/2);ctx.rotate(-Math.PI/2);
    ctx.fillStyle=&#x27;rgba(138,163,181,0.9)&#x27;;ctx.font=&#x27;10px &quot;Share Tech Mono&quot;,monospace&#x27;;ctx.textAlign=&#x27;center&#x27;;
    ctx.fillText(&#x27;ELEVATION&#x27;,0,0);ctx.restore();

    /* hover crosshair */
    if(!c._hoverBound){
      c._hoverBound=true;
      c.addEventListener(&#x27;mousemove&#x27;,e=&gt;{
        const r=c.getBoundingClientRect();
        EPH._chartHover=(e.clientX-r.left)*(c.width/r.width);
        EPH.drawChart();EPH.chartTip(e);
      });
      c.addEventListener(&#x27;mouseleave&#x27;,()=&gt;{EPH._chartHover=-1;document.getElementById(&#x27;eph-tip&#x27;).style.display=&#x27;none&#x27;;EPH.drawChart();});
    }
    if(this._chartHover&gt;=padL&amp;&amp;this._chartHover&lt;=W-padR){
      const tH=t0+((this._chartHover-padL)/pw)*(t1-t0);
      let iH=0;for(let i=0;i&lt;rows.length;i++) if(Math.abs(rows[i].d-tH)&lt;Math.abs(rows[iH].d-tH)) iH=i;
      const rH=rows[iH];
      ctx.strokeStyle=&#x27;rgba(255,255,255,0.3)&#x27;;ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(X(rH.d),padT);ctx.lineTo(X(rH.d),padT+ph);ctx.stroke();
      if(rH.el!==null){
        ctx.fillStyle=&#x27;#fff&#x27;;ctx.beginPath();ctx.arc(X(rH.d),Y(rH.el),3,0,2*Math.PI);ctx.fill();
      }
      this._tipRow=rH;this._tipT=tH;
    }
  },
  chartTip(e){
    const r=this._tipRow;if(!r) return;
    const tip=document.getElementById(&#x27;eph-tip&#x27;);
    tip.style.display=&#x27;block&#x27;;
    const ap=this.activePlot();
    let extra=&#x27;&#x27;;
    this.plotted.forEach(p=&gt;{
      if(!this._tipT) return;
      if(!p.rows||!p.rows.length) return;
      let j=0;for(let i=0;i&lt;p.rows.length;i++) if(Math.abs(p.rows[i].d-this._tipT)&lt;Math.abs(p.rows[j].d-this._tipT)) j=i;
      const rr=p.rows[j];
      if(rr&amp;&amp;rr.el!==null) extra+=&#x27;&lt;div style=&quot;color:&#x27;+p.color+&#x27;&quot;&gt;&#x27;+p.g+&#x27; &#x27;+p.name+&#x27; · EL &#x27;+rr.el.toFixed(1)+&#x27;° AZ &#x27;+rr.az.toFixed(0)+&#x27;°&#x27;+(rr.mag!==null?&#x27; · m&#x27;+rr.mag.toFixed(1):&#x27;&#x27;)+&#x27;&lt;/div&gt;&#x27;;
    });
    tip.innerHTML=&#x27;&lt;b&gt;&#x27;+this.dayTag(r.d)+&#x27; · &#x27;+fmtLocalShort(r.d,SITE.tz)+&#x27; LOC · &#x27;+fmtUTCShort(r.d)+&#x27; UTC&lt;/b&gt; · &#x27;+this.twiLabel(r.sunFlag)+extra;
    let x=e.clientX+12,y=e.clientY+10;
    if(x+tip.offsetWidth&gt;window.innerWidth-10)x=e.clientX-tip.offsetWidth-12;
    tip.style.left=x+&#x27;px&#x27;;tip.style.top=y+&#x27;px&#x27;;
  }
};

  /* ═════ REENTRY WATCH (OrbitSmith static reentry snapshot) ═════ */
  _reTab:&#x27;up&#x27;,_reData:null,
  setReTab(which,btn){
    this._reTab=which;
    document.querySelectorAll(&#x27;.d-re-tab&#x27;).forEach(b=&gt;b.classList.remove(&#x27;on&#x27;));
    if(btn) btn.classList.add(&#x27;on&#x27;);
    this.renderReentry();
  },
  async refreshReentry(){
    const j=await OS.fetchReentry();
    if(j&amp;&amp;j.data){this._reData=j.data;this.renderReentry();}
    else{const c=document.getElementById(&#x27;d-re-count&#x27;);if(c)c.textContent=&#x27;REENTRY FEED UNREACHABLE — RETRYING…&#x27;;}
  },
  renderReentry(){
    const host=document.getElementById(&#x27;d-re-list&#x27;),cnt=document.getElementById(&#x27;d-re-count&#x27;);
    if(!host||!this._reData) return;
    const preds=this._reData.predictions||[],decays=this._reData.decays||this._reData.decay||[];
    cnt.textContent=preds.length+&#x27; UPCOMING · &#x27;+decays.length+&#x27; RECENT DECAY&#x27;;
    const now=Date.now();
    const parseEp=s=&gt;{if(!s)return null;const d=new Date(s.replace(&#x27; &#x27;,&#x27;T&#x27;)+(/[zZ]|[+\-]\d\d:?\d\d$/.test(s)?&#x27;&#x27;:&#x27;Z&#x27;));return isNaN(d)?null:d;};
    const fmtDelta=ms=&gt;{const a=Math.abs(ms),h=Math.floor(a/3600000),m=Math.floor(a%3600000/60000);
      return (h&gt;=48?Math.floor(h/24)+&#x27;d &#x27;+(h%24)+&#x27;h&#x27;:h&gt;0?h+&#x27;h &#x27;+m+&#x27;m&#x27;:m+&#x27;m&#x27;);};
    if(this._reTab===&#x27;up&#x27;){
      if(!preds.length){host.innerHTML=&#x27;&lt;div class=&quot;d-dim&quot;&gt;NO ACTIVE TIP PREDICTIONS IN SNAPSHOT.&lt;/div&gt;&#x27;;return;}
      const rows=preds.map(p=&gt;{
        const ep=parseEp(p.decay_epoch),dt=ep?ep.getTime()-now:null;
        const past=dt!==null&amp;&amp;dt&lt;0;const hot=p.high_interest;
        const cls=hot?&#x27;hot&#x27;:&#x27;&#x27;;
        const eta=ep?(past?&#x27;window passed · unresolved&#x27;:&#x27;T− &#x27;+fmtDelta(dt)):&#x27;—&#x27;;
        const win=p.window_min!=null?&#x27;±&#x27;+(p.window_min&gt;=60?(p.window_min/60).toFixed(0)+&#x27;h&#x27;:p.window_min+&#x27;m&#x27;):&#x27;&#x27;;
        return &#x27;&lt;div class=&quot;dre-row &#x27;+cls+&#x27;&quot;&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-name&quot;&gt;&#x27;+(p.name||(&#x27;NORAD &#x27;+p.norad_id))+&#x27;&lt;/span&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-eta &#x27;+(hot?&#x27;hot&#x27;:&#x27;&#x27;)+&#x27;&quot;&gt;&#x27;+eta+&#x27;&lt;/span&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-meta&quot;&gt;&#x27;+(p.rcs_size||&#x27;—&#x27;)+&#x27; · i=&#x27;+(p.incl!=null?p.incl+&#x27;°&#x27;:&#x27;—&#x27;)+&#x27; · &#x27;+(p.direction||&#x27;&#x27;)+&#x27;&lt;/span&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-meta r&quot;&gt;&#x27;+win+(p.lat!=null?&#x27; · &#x27;+p.lat.toFixed(0)+&#x27;°,&#x27;+p.lon.toFixed(0)+&#x27;°&#x27;:&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;/div&gt;&#x27;;
      }).join(&#x27;&#x27;);
      host.innerHTML=rows;
    }else{
      if(!decays.length){host.innerHTML=&#x27;&lt;div class=&quot;d-dim&quot;&gt;NO CONFIRMED DECAY RECORDS IN SNAPSHOT.&lt;/div&gt;&#x27;;return;}
      host.innerHTML=decays.slice(0,40).map(p=&gt;{
        const ep=parseEp(p.decay_epoch||p.decay_date||p.epoch);
        const ago=ep?fmtDelta(ep.getTime()-now)+&#x27; ago&#x27;:&#x27;—&#x27;;
        return &#x27;&lt;div class=&quot;dre-row decay&quot;&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-name&quot;&gt;&#x27;+(p.name||(&#x27;NORAD &#x27;+p.norad_id))+&#x27;&lt;/span&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-eta decay&quot;&gt;&#x27;+ago+&#x27;&lt;/span&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-meta&quot;&gt;&#x27;+(p.rcs_size||&#x27;—&#x27;)+(p.country?&#x27; · &#x27;+p.country:&#x27;&#x27;)+&#x27;&lt;/span&gt;&#x27;+
          &#x27;&lt;span class=&quot;dre-meta r&quot;&gt;&#x27;+(ep?ep.toISOString().slice(0,10):&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;/div&gt;&#x27;;
      }).join(&#x27;&#x27;);
    }
  },

  /* ═════ CATALOG STATISTICS (OrbitSmith active-catalog snapshot) ═════ */
  async refreshStats(){
    const [today,recent]=await Promise.all([OS.fetchStatsToday(),OS.fetchStatsRecent()]);
    const d=today&amp;&amp;today.data;
    if(!d){const t=document.getElementById(&#x27;d-stats-total&#x27;);if(t)t.innerHTML=&#x27;UNREACHABLE&lt;small&gt;ORBITSMITH STATISTICS&lt;/small&gt;&#x27;;return;}
    const o=d.objects||{};
    document.getElementById(&#x27;d-stats-total&#x27;).innerHTML=
      (o.total||0).toLocaleString()+&#x27;&lt;small&gt;TRACKED OBJECTS · &#x27;+(d.date||&#x27;&#x27;)+&#x27;&lt;/small&gt;&#x27;;
    const bars=[
      [&#x27;PAYLOAD&#x27;,o.payload||0,&#x27;#00d4ff&#x27;],
      [&#x27;DEBRIS&#x27;,o.debris||0,&#x27;#9fb8c8&#x27;],
      [&#x27;ROCKET BODY&#x27;,o.rocket_body||0,&#x27;#ff7a4a&#x27;],

      &#x27;&lt;b&gt;&#x27;+b[1].toLocaleString()+&#x27;&lt;/b&gt;&lt;/div&gt;&#x27;).join(&#x27;&#x27;);

      &#x27;&lt;div class=&quot;dst-metric&quot;&gt;&lt;div class=&quot;m-v&quot;&gt;&#x27;+(d.tip_active!=null?d.tip_active:&#x27;—&#x27;)+&#x27;&lt;/div&gt;&lt;div class=&quot;m-k&quot;&gt;TIP ACTIVE&lt;/div&gt;&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;dst-metric&quot;&gt;&lt;div class=&quot;m-v&quot;&gt;&#x27;+(d.decay_7d!=null?d.decay_7d:&#x27;—&#x27;)+&#x27;&lt;/div&gt;&lt;div class=&quot;m-k&quot;&gt;DECAY 7D&lt;/div&gt;&lt;/div&gt;&#x27;;

  /* ═════ 1 · NAKED-EYE PASS PREDICTOR ═════ */
  async startScan(){
    const token=++this._scanToken;
    const st=document.getElementById(&#x27;d-pass-state&#x27;);
    st.textContent=&#x27;SCANNING BRIGHT CATALOG…&#x27;;
    let raw=await fetchGroup(&#x27;visual&#x27;);
    if(token!==this._scanToken) return;
    let sats=(raw?parseCatalog(raw):getFallbackSats()).filter(t=&gt;t.satrec);
    /* magnitude screen ≤ 3.5: known mags first, cap list for scan budget */
    const known=sats.filter(t=&gt;this.STD_MAG[t.satnum]!==undefined&amp;&amp;this.STD_MAG[t.satnum]&lt;=3.5);
    const rest=sats.filter(t=&gt;this.STD_MAG[t.satnum]===undefined).slice(0,20);
    const screenList=[...known,...rest];
    const results=[];
    let i=0;
    const scanNext=()=&gt;{
      if(token!==this._scanToken) return;
      if(i&gt;=screenList.length){this.finishScan(results);return;}
      const tle=screenList[i++];
      try{
        const anchor=Date.now();
        const w=findNextVisible(tle,48);
        if(w) results.push({tle,
          w:{t0Abs:anchor+w.t0*1000,t1Abs:anchor+w.t1*1000,pk:w.elPk,az0:this.azAt(tle,anchor+w.t0*1000)},
          mag:this.STD_MAG[tle.satnum]??3.5});
      }catch(e){}
      st.textContent=&#x27;SCANNING &#x27;+i+&#x27; / &#x27;+screenList.length+&#x27; BRIGHT OBJECTS…&#x27;;
      setTimeout(scanNext,30);
    };
    scanNext();
    /* rescan every 15 min so the board stays fresh on the always-on display */
    clearTimeout(this._rescanT);
    this._rescanT=setTimeout(()=&gt;this.startScan(),15*60*1000);
  },
  azAt(tle,ms){ /* azimuth of the object at an absolute epoch */
    try{
      const d=new Date(ms);
      const pv=sgp4ECI(tle.satrec,d);
      if(!pv) return 0;
      const GM=gmst_from_jd(julianDate(d)),ct=Math.cos(GM),st=Math.sin(GM);
      const fx=ct*pv.r[0]+st*pv.r[1],fy=-st*pv.r[0]+ct*pv.r[1],fz=pv.r[2];
      const sE=geo2ecef(SITE.lat_deg,SITE.lon_deg,SITE.h_m);
      const enu=mv3(topoRotm(SITE.lat_deg,SITE.lon_deg),[fx-sE[0],fy-sE[1],fz-sE[2]]);
      return ((Math.atan2(enu[0],enu[1])*R2D)+360)%360;
    }catch(e){return 0;}
  },
  finishScan(results){
    results.sort((a,b)=&gt;a.w.t0Abs-b.w.t0Abs);
    this._upcoming=results.slice(0,6);
    this._next=results[0]||null;
    const st=document.getElementById(&#x27;d-pass-state&#x27;);
    st.textContent=results.length?results.length+&#x27; VISIBLE PASSES IN NEXT 48 H&#x27;:&#x27;NO NAKED-EYE PASSES IN NEXT 48 H&#x27;;
    const list=document.getElementById(&#x27;d-pass-list&#x27;);
    list.innerHTML=this._upcoming.map((r,k)=&gt;{
      const t0=new Date(r.w.t0Abs);
      const sel=this._cardSel===r.tle.satnum;
      return &#x27;&lt;div class=&quot;dp-row&#x27;+(k===0?&#x27; first&#x27;:&#x27;&#x27;)+(sel?&#x27; sel&#x27;:&#x27;&#x27;)+&#x27;&quot; onclick=&quot;DISC.pickPass(&#x27;+r.tle.satnum+&#x27;)&quot;&gt;&#x27;+
        &#x27;&lt;span class=&quot;dp-name&quot;&gt;&#x27;+r.tle.name.slice(0,18)+&#x27;&lt;/span&gt;&#x27;+
        &#x27;&lt;span class=&quot;dp-mag&quot;&gt;MAG &#x27;+(r.mag&lt;=0?&#x27;&#x27;:&#x27;+&#x27;)+r.mag.toFixed(1)+&#x27;&lt;/span&gt;&#x27;+
        &#x27;&lt;span class=&quot;dp-time&quot;&gt;&#x27;+fmtLocalTime(t0,SITE.tz).slice(0,5)+&#x27; LOC · PEAK &#x27;+r.w.pk.toFixed(0)+&#x27;°&lt;/span&gt;&lt;/div&gt;&#x27;;
    }).join(&#x27;&#x27;);
    this.renderCards();
  },
  tickCountdown(){
    const cd=document.getElementById(&#x27;d-countdown&#x27;);if(!cd)return;
    if(!this._next){cd.textContent=&#x27;— — : — — : — —&#x27;;this.setAlert(false);return;}
    const w=this._next.w;
    const dt=(w.t0Abs-EPOCH.ms())/1000;
    if(dt&gt;0){
      cd.textContent=fmtHMS(dt);
      document.getElementById(&#x27;d-next-name&#x27;).textContent=this._next.tle.name;
      document.getElementById(&#x27;d-next-sub&#x27;).textContent=&#x27;RISES AZ &#x27;+w.az0.toFixed(0)+&#x27;° · PEAK EL &#x27;+w.pk.toFixed(0)+&#x27;° · &#x27;+fmtLocalTime(new Date(w.t0Abs),SITE.tz).slice(0,8)+&#x27; LOCAL&#x27;;
      this.setAlert(false);
    } else if(EPOCH.ms()&lt;w.t1Abs){
      cd.textContent=&#x27;OVERHEAD&#x27;;
      this.setAlert(true,this._next);
    } else {
      this._next=this._upcoming&amp;&amp;this._upcoming[1]?this._upcoming[1]:null;
      if(this._upcoming)this._upcoming.shift();
      this.setAlert(false);
    }
  },
  setAlert(on,r){
    const b=document.getElementById(&#x27;d-alert&#x27;);
    if(!b) return;
    if(on&amp;&amp;!this._alertOn){
      b.style.display=&#x27;flex&#x27;;
      document.getElementById(&#x27;d-alert-name&#x27;).textContent=r.tle.name;
    }
    if(on){
      const ls=(window._liveSel||[]).find(s=&gt;s.tle&amp;&amp;s.tle.satnum===r.tle.satnum);
      document.getElementById(&#x27;d-alert-sub&#x27;).textContent=
        &#x27;LOOK UP! VISIBLE NOW · MAG &#x27;+(r.mag&lt;=0?&#x27;&#x27;:&#x27;+&#x27;)+r.mag.toFixed(1)+
        (ls?&#x27; · AZ &#x27;+ls.az.toFixed(0)+&#x27;° EL &#x27;+ls.el.toFixed(0)+&#x27;°&#x27;:&#x27; · PEAK EL &#x27;+r.w.pk.toFixed(0)+&#x27;°&#x27;);
    }
    if(!on&amp;&amp;this._alertOn) b.style.display=&#x27;none&#x27;;
    this._alertOn=on;
  },

  /* ═════ 2 · POP-CULTURE METRIC TRANSFORMATION CARDS ═════

  _cardSel:null,
  pickPass(satnum){

        &#x27;&lt;span class=&quot;dp-name&quot;&gt;&#x27;+r.tle.name.slice(0,18)+&#x27;&lt;/span&gt;&#x27;+
        &#x27;&lt;span class=&quot;dp-mag&quot;&gt;MAG &#x27;+(r.mag&lt;=0?&#x27;&#x27;:&#x27;+&#x27;)+r.mag.toFixed(1)+&#x27;&lt;/span&gt;&#x27;+
        &#x27;&lt;span class=&quot;dp-time&quot;&gt;&#x27;+fmtLocalTime(t0,SITE.tz).slice(0,5)+&#x27; LOC · PEAK &#x27;+r.w.pk.toFixed(0)+&#x27;°&lt;/span&gt;&lt;/div&gt;&#x27;;

  frame(nowP,dt){

  /* ═════ 4 · REAL-TIME SPACE WEATHER (NOAA SWPC · expanded) ═════ */
  async refreshWeather(){
    const get=async u=&gt;{try{const r=await fetch(u,{signal:fetchTimeoutSignal(14000)});return r.ok?await r.json():null;}catch(e){return null;}};
    const [kp,wind,flare,mag,plasma,f107,scales]=await Promise.all([
      get(&#x27;https://services.swpc.noaa.gov/json/planetary_k_index_1m.json&#x27;),

      get(&#x27;https://services.swpc.noaa.gov/json/goes/primary/xray-flares-latest.json&#x27;),

      get(&#x27;https://services.swpc.noaa.gov/products/summary/10cm-flux.json&#x27;),

    ]);
    const kEl=document.getElementById(&#x27;d-kp-val&#x27;),kBar=document.getElementById(&#x27;d-kp-bar&#x27;);
    let kNow=null;
    if(kp&amp;&amp;kp.length){
      kNow=parseFloat(kp[kp.length-1].kp_index??kp[kp.length-1].estimated_kp);
      kEl.textContent=&#x27;Kp &#x27;+kNow.toFixed(1);
      kBar.style.width=Math.min(100,kNow/9*100)+&#x27;%&#x27;;
      kBar.style.background=kNow&lt;4?&#x27;#00ff9d&#x27;:kNow&lt;6?&#x27;#ffd24a&#x27;:&#x27;#ff5566&#x27;;
      document.getElementById(&#x27;d-kp-tag&#x27;).textContent=kNow&lt;4?&#x27;QUIET FIELD&#x27;:kNow&lt;5?&#x27;UNSETTLED&#x27;:kNow&lt;6?&#x27;MINOR STORM G1&#x27;:kNow&lt;7?&#x27;MODERATE STORM G2&#x27;:&#x27;STRONG STORM G3+&#x27;;
      this.drawKpSpark(kp);
    } else kEl.textContent=&#x27;Kp —&#x27;;
    const wEl=document.getElementById(&#x27;d-wind-val&#x27;);
    if(plasma&amp;&amp;plasma.length&gt;2){
      const ph=plasma[0],iSpd=ph.indexOf(&#x27;speed&#x27;),iDen=ph.indexOf(&#x27;density&#x27;);
      const rows=plasma.slice(1);
      const samp=this._sampleSeries(rows,140);
      const spd=samp.map(r=&gt;parseFloat(r[iSpd])).filter(v=&gt;isFinite(v));
      const den=samp.map(r=&gt;parseFloat(r[iDen])).filter(v=&gt;isFinite(v));
      const lastSpd=[...rows].reverse().map(r=&gt;parseFloat(r[iSpd])).find(v=&gt;isFinite(v));
      const lastDen=[...rows].reverse().map(r=&gt;parseFloat(r[iDen])).find(v=&gt;isFinite(v));
      if(wind&amp;&amp;wind.WindSpeed) wEl.textContent=parseFloat(wind.WindSpeed).toFixed(0)+&#x27; km/s&#x27;;
      else if(lastSpd!=null) wEl.textContent=lastSpd.toFixed(0)+&#x27; km/s&#x27;;
      else wEl.textContent=&#x27;— km/s&#x27;;
      if(lastDen!=null) document.getElementById(&#x27;d-dens-val&#x27;).textContent=lastDen.toFixed(1)+&#x27; p/cm³&#x27;;
      this.drawSpark(&#x27;d-wind-spark&#x27;,spd,{color:&#x27;#ffd24a&#x27;,fill:true});
      this.drawSpark(&#x27;d-dens-spark&#x27;,den,{color:&#x27;#7fe0ff&#x27;,fill:true});
    }else{
      if(wind&amp;&amp;wind.WindSpeed) wEl.textContent=parseFloat(wind.WindSpeed).toFixed(0)+&#x27; km/s&#x27;;
      else wEl.textContent=&#x27;— km/s&#x27;;
    }
    /* IMF Bz — the magnetosphere coupling switch */
    if(mag&amp;&amp;mag.length&gt;1){
      const hdr=mag[0],iBz=hdr.indexOf(&#x27;bz_gsm&#x27;),iBt=hdr.indexOf(&#x27;bt&#x27;);
      let last=null;
      for(let k=mag.length-1;k&gt;0;k--){if(mag[k][iBz]!==null&amp;&amp;mag[k][iBz]!==&#x27;&#x27;){last=mag[k];break;}}
      if(last){
        const bz=parseFloat(last[iBz]),bt=parseFloat(last[iBt]);
        const bzEl=document.getElementById(&#x27;d-bz-val&#x27;);
        bzEl.textContent=(bz&gt;=0?&#x27;+&#x27;:&#x27;&#x27;)+bz.toFixed(1)+&#x27; nT&#x27;;
        bzEl.style.color=bz&lt;-5?&#x27;#ff5566&#x27;:bz&lt;-2?&#x27;#ffd24a&#x27;:&#x27;#00ff9d&#x27;;
        document.getElementById(&#x27;d-bz-tag&#x27;).textContent=
          bz&lt;-5?&#x27;STRONGLY SOUTH — COUPLING OPEN&#x27;:bz&lt;-2?&#x27;SOUTHWARD — ENERGY LEAKING IN&#x27;:bz&lt;2?&#x27;NEUTRAL&#x27;:&#x27;NORTHWARD — SHIELD CLOSED&#x27;;
        document.getElementById(&#x27;d-bt-val&#x27;).textContent=&#x27;|B| &#x27;+bt.toFixed(1)+&#x27; nT&#x27;;
      }
      const bzS=this._sampleSeries(mag.slice(1),140).map(r=&gt;parseFloat(r[iBz])).filter(v=&gt;isFinite(v));
      this.drawSpark(&#x27;d-bz-spark&#x27;,bzS,{color:&#x27;#ff7ad0&#x27;,zero:true});
    }
    const fEl=document.getElementById(&#x27;d-flare-val&#x27;);
    if(flare&amp;&amp;flare.length&amp;&amp;flare[0].max_class){
      fEl.textContent=flare[0].max_class;
      fEl.style.color=/^[XM]/.test(flare[0].max_class)?&#x27;#ff5566&#x27;:/^C/.test(flare[0].max_class)?&#x27;#ffd24a&#x27;:&#x27;#00ff9d&#x27;;
    } else if(flare&amp;&amp;flare.length===0){fEl.textContent=&#x27;NONE 24H&#x27;;fEl.style.color=&#x27;#00ff9d&#x27;;}
    else fEl.textContent=&#x27;—&#x27;;
    /* F10.7 — thermosphere heating / density proxy */
    if(f107&amp;&amp;f107.Flux){
      const f=parseFloat(f107.Flux);
      const el=document.getElementById(&#x27;d-f107-val&#x27;);
      el.textContent=f.toFixed(0)+&#x27; sfu&#x27;;
      document.getElementById(&#x27;d-f107-tag&#x27;).textContent=
        f&lt;90?&#x27;LOW DENSITY · LOW DRAG&#x27;:f&lt;150?&#x27;MODERATE THERMOSPHERE&#x27;:&#x27;HOT EXPANDED ATMOSPHERE · HIGH DRAG&#x27;;
      el.style.color=f&lt;90?&#x27;#00ff9d&#x27;:f&lt;150?&#x27;#ffd24a&#x27;:&#x27;#ff5566&#x27;;
    }
    /* NOAA R/S/G scales now */
    if(scales&amp;&amp;scales[&#x27;0&#x27;]){
      const c=scales[&#x27;0&#x27;];
      const chip=(k,o)=&gt;{const lv=o&amp;&amp;o.Scale!==null?parseInt(o.Scale):0;
        return &#x27;&lt;span class=&quot;d-scale s&#x27;+lv+&#x27;&quot; title=&quot;&#x27;+(o&amp;&amp;o.Text?o.Text:&#x27;none&#x27;)+&#x27;&quot;&gt;&#x27;+k+(lv||0)+&#x27;&lt;/span&gt;&#x27;;};
      document.getElementById(&#x27;d-scales&#x27;).innerHTML=chip(&#x27;R&#x27;,c.R)+chip(&#x27;S&#x27;,c.S)+chip(&#x27;G&#x27;,c.G);
    }
    document.getElementById(&#x27;d-wx-upd&#x27;).textContent=&#x27;SWPC · &#x27;+fmtUTCShort(new Date())+&#x27;Z&#x27;;
  },
  /* even downsample of a long row array to ~max points (keeps last point) */
  _sampleSeries(rows,max){
    const n=rows.length;if(n&lt;=max) return rows.slice();
    const step=n/max,out=[];
    for(let i=0;i&lt;max;i++) out.push(rows[Math.min(n-1,Math.floor(i*step))]);
    out.push(rows[n-1]);
    return out;
  },
  /* generic time-history sparkline: series = array of numbers (oldest→newest).
     opts: {color, fill, zero (draw 0 baseline), min, max, bands:[{v,color}]} */
  drawSpark(id,series,opts){
    const c=document.getElementById(id);if(!c)return;
    opts=opts||{};
    const vals=series.filter(v=&gt;typeof v===&#x27;number&#x27;&amp;&amp;isFinite(v));
    c.width=Math.max(2,c.clientWidth*2);c.height=Math.max(2,c.clientHeight*2);
    const ctx=c.getContext(&#x27;2d&#x27;),W=c.width,H=c.height,pad=3*2;
    ctx.clearRect(0,0,W,H);
    const n=vals.length;if(n&lt;2)return;
    let mn=opts.min!=null?opts.min:Math.min(...vals);
    let mx=opts.max!=null?opts.max:Math.max(...vals);
    if(opts.zero){mn=Math.min(mn,0);mx=Math.max(mx,0);}
    if(mx-mn&lt;1e-9){mx+=1;mn-=1;}
    const X=i=&gt;i/(n-1)*(W-pad*2)+pad;
    const Y=v=&gt;H-pad-((v-mn)/(mx-mn))*(H-pad*2);
    if(opts.zero){const y=Y(0);ctx.strokeStyle=&#x27;rgba(140,160,180,.35)&#x27;;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    (opts.bands||[]).forEach(b=&gt;{const y=Y(b.v);ctx.strokeStyle=b.color||&#x27;rgba(120,145,165,.22)&#x27;;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});
    const col=opts.color||&#x27;#00e5ff&#x27;;
    if(opts.fill){
      ctx.beginPath();ctx.moveTo(X(0),H-pad);
      vals.forEach((v,i)=&gt;ctx.lineTo(X(i),Y(v)));
      ctx.lineTo(X(n-1),H-pad);ctx.closePath();
      const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,col+&#x27;55&#x27;);g.addColorStop(1,col+&#x27;00&#x27;);
      ctx.fillStyle=g;ctx.fill();
    }
    ctx.beginPath();
    vals.forEach((v,i)=&gt;{i?ctx.lineTo(X(i),Y(v)):ctx.moveTo(X(i),Y(v));});
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.shadowColor=col;ctx.shadowBlur=6;ctx.stroke();ctx.shadowBlur=0;
  },
  drawKpSpark(kp){
    const series=kp.filter((r,i)=&gt;i%5===0).map(r=&gt;parseFloat(r.kp_index??r.estimated_kp)||0);
    this.drawSpark(&#x27;d-kp-spark&#x27;,series,{color:&#x27;#00e5ff&#x27;,min:0,max:9,
      bands:[{v:5,color:&#x27;rgba(255,210,74,.30)&#x27;},{v:7,color:&#x27;rgba(255,86,102,.30)&#x27;}]});
  },

  /* ═════ 4b · LIVE AURORA OVAL — on a 3-D globe (NOAA OVATION 30-min) ═════
     The probability grid is painted onto an equirectangular canvas texture and
     wrapped on a translucent additive shell PARENTED TO THE EARTH MESH, so the
     oval stays geographically pinned while the globe rotates at true GMST. */
  ag:null,_auCv:null,_auTex:null,
  buildAuroraGlobe(){

                    &#x27;https://services.swpc.noaa.gov/json/aurora-forecast-v2.json&#x27;]){

  paintAurora(j){
    const st=document.getElementById(&#x27;d-aurora-state&#x27;);
    if(!this._auCv) return;
    const ctx=this._auCv.getContext(&#x27;2d&#x27;),W=this._auCv.width,H=this._auCv.height;
    ctx.clearRect(0,0,W,H);
    if(!j||!j.coordinates){
      if(st) st.textContent=&#x27;OVATION FEED UNREACHABLE — GLOBE SHOWS BASE EARTH · RETRYING IN 10 MIN&#x27;;
      if(this._auTex) this._auTex.needsUpdate=true;
      return;
    }
    if(st) st.textContent=&#x27;OVATION 30-MIN FORECAST · &#x27;+(j[&#x27;Forecast Time&#x27;]||j.forecast_time||&#x27;&#x27;)+&#x27; · GREEN→RED = VIEWING PROBABILITY · RED ▲ = YOUR SITE&#x27;;
    const cw=W/360,chh=H/180;
    for(const c of j.coordinates){
      const p=c[2];if(p&lt;3) continue;
      let lon=c[0];if(lon&gt;180)lon-=360;
      const lat=c[1];
      const x=(lon+180)/360*W, y=(90-lat)/180*H;
      const t2=Math.min(1,p/100);
      const r=Math.round(40+215*t2),g=Math.round(255-90*t2),b=Math.round(120-80*t2);

      ctx.fillRect(x-cw*1.3,y-chh*1.3,cw*2.6,chh*2.6);
    }
    this._auTex.needsUpdate=true;
  },

  launchAz(L){ /* representative launch azimuth from the target orbit class */
    const o=(L.orbit||&#x27;&#x27;).toUpperCase();
    if(/SSO|POLAR/.test(o)) return L.lat&gt;0?188:8;     /* southbound from N-hemisphere */
    if(/GTO|GEO/.test(o)) return 93;                  /* near-due-east */
    if(/ISS|LEO/.test(o)) return L.lat&gt;20?45:90;      /* NE corridor (51.6° from the Cape) */
    return 90;

  drawTFR(L){
    const cv=document.getElementById(&#x27;d-tfr-map&#x27;);
    cv.width=cv.clientWidth*2;cv.height=Math.round(cv.width*0.56);
    const ctx=cv.getContext(&#x27;2d&#x27;),W=cv.width,H=cv.height;
    /* zoomed crop of the equirectangular basemap: ±9° lon · ±5° lat around the pad */
    const dLon=9,dLat=5.04;
    const lon0=L.lon-dLon,lat0=L.lat+dLat;
    const xy=(la,lo)=&gt;({x:(lo-lon0)/(2*dLon)*W,y:(lat0-la)/(2*dLat)*H});
    if(typeof worldMapImg!==&#x27;undefined&#x27;&amp;&amp;worldMapImg){
      const iw=worldMapImg.width,ih=worldMapImg.height;
      const sx=(lon0+180)/360*iw, sy=(90-lat0)/180*ih;
      ctx.drawImage(worldMapImg,sx,sy,(2*dLon)/360*iw,(2*dLat)/180*ih,0,0,W,H);
      ctx.fillStyle=&#x27;rgba(2,8,14,.45)&#x27;;ctx.fillRect(0,0,W,H);
    } else {ctx.fillStyle=&#x27;#06101a&#x27;;ctx.fillRect(0,0,W,H);}
    const pad=xy(L.lat,L.lon);
    const kmPerPxX=2*dLon*111.32*Math.cos(L.lat*D2R)/W;
    const az=this.launchAz(L)*D2R;
    /* hazard corridor: widening downrange polygon along the launch azimuth */
    const downrange=(km,off)=&gt;{ /* km along az, off km cross-track */
      const dN=km*Math.cos(az)-off*Math.sin(az), dE=km*Math.sin(az)+off*Math.cos(az);
      return xy(L.lat+dN/111.32, L.lon+dE/(111.32*Math.cos(L.lat*D2R)));
    };
    ctx.beginPath();
    const cor=[[0,3],[120,18],[420,60],[820,110],[820,-110],[420,-60],[120,-18],[0,-3]];
    cor.forEach((c,k)=&gt;{const p=downrange(c[0],c[1]);k?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);});
    ctx.closePath();
    ctx.fillStyle=&#x27;rgba(255,85,102,.13)&#x27;;ctx.fill();
    ctx.strokeStyle=&#x27;rgba(255,85,102,.75)&#x27;;ctx.lineWidth=2;ctx.setLineDash([8,5]);ctx.stroke();ctx.setLineDash([]);
    /* stage-1 + fairing drop boxes downrange */
    [[300,40,&#x27;STAGE 1 / BOOSTER DZ&#x27;],[640,55,&#x27;FAIRING DZ&#x27;]].forEach(z=&gt;{
      const c=downrange(z[0],0),r=z[1]/kmPerPxX;
      ctx.strokeStyle=&#x27;rgba(255,170,60,.85)&#x27;;ctx.lineWidth=2;
      ctx.strokeRect(c.x-r,c.y-r*0.6,r*2,r*1.2);
      ctx.fillStyle=&#x27;rgba(255,190,90,.95)&#x27;;ctx.font=&#x27;bold 13px IBM Plex Mono&#x27;;
      ctx.fillText(z[2],c.x-r,c.y-r*0.6-6);
    });
    /* concentric TFR rings around the pad: 5 / 12 / 30 NM */
    [[9.26,&#x27;5 NM&#x27;],[22.2,&#x27;12 NM&#x27;],[55.6,&#x27;30 NM TFR&#x27;]].forEach(rr=&gt;{
      ctx.strokeStyle=&#x27;rgba(0,229,255,.7)&#x27;;ctx.lineWidth=1.6;
      ctx.beginPath();ctx.arc(pad.x,pad.y,rr[0]/kmPerPxX,0,2*Math.PI);ctx.stroke();
      ctx.fillStyle=&#x27;rgba(0,229,255,.85)&#x27;;ctx.font=&#x27;12px IBM Plex Mono&#x27;;
      ctx.fillText(rr[1],pad.x+rr[0]/kmPerPxX*0.71+4,pad.y-rr[0]/kmPerPxX*0.71);
    });
    /* pad marker + azimuth arrow */
    ctx.fillStyle=&#x27;#ff5566&#x27;;
    ctx.beginPath();ctx.moveTo(pad.x,pad.y-10);ctx.lineTo(pad.x+7,pad.y);ctx.lineTo(pad.x,pad.y+10);ctx.lineTo(pad.x-7,pad.y);ctx.closePath();ctx.fill();
    const tip=downrange(150,0);
    ctx.strokeStyle=&#x27;#00ff9d&#x27;;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(pad.x,pad.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
    ctx.fillStyle=&#x27;#00ff9d&#x27;;ctx.font=&#x27;bold 13px IBM Plex Mono&#x27;;
    ctx.fillText(&#x27;AZ &#x27;+this.launchAz(L).toFixed(0)+&#x27;° (&#x27;+(L.orbit||&#x27;LEO&#x27;)+&#x27;)&#x27;,tip.x+6,tip.y);
    ctx.fillStyle=&#x27;#ffb0ba&#x27;;ctx.font=&#x27;bold 13px IBM Plex Mono&#x27;;
    ctx.fillText(&#x27;PAD · &#x27;+L.lat.toFixed(3)+&#x27;°, &#x27;+L.lon.toFixed(3)+&#x27;°&#x27;,pad.x+12,pad.y+22);
    document.getElementById(&#x27;d-tfr-note&#x27;).textContent=
      &#x27;ILLUSTRATIVE TFR + HAZARD GEOMETRY for the planned &#x27;+(L.orbit||&#x27;LEO&#x27;)+&#x27; azimuth — live FAA NOTAM polygons require authenticated API access. Safety zones map directly to the launch azimuth and staging points before the vehicle ever leaves the pad.&#x27;;
  }
};

/* ╔══════════════════════════════════════════════════════════════════╗
   ║  MODULE · ConjunctionWatch — close-approach (CA) screening        ║
   ║  · SOCRATES CDM feed (CelesTrak) — top projected approaches       ║
   ║  · per-pair ECI scene: both orbits, TCA geometry, miss vector     ║
   ║  · conjunction sub-point on the high-fidelity Earth               ║
   ║  · osculating SMA history a(t)=1/(2/r − v²/μ) for both objects    ║
   ╚══════════════════════════════════════════════════════════════════╝ */
const CA={
  inited:false,three:null,rows:[],sel:-1,sort:&#x27;range&#x27;,
  t1:null,t2:null,_tleCache:{},_src:&#x27;—&#x27;,

  init(){
    if(this.inited) return;
    this.inited=true;
    this.three=initThree3D(&#x27;ca-canvas-wrap&#x27;,{axes:false,rad:RE_KM*5.4});
    this.refresh();
    setInterval(()=&gt;this.refresh(),60*60*1000);   /* hourly feed refresh */
  },

  /* ── SOCRATES feed: try CSV endpoints, then the HTML report, then sample ── */
  async refresh(){
    const st=document.getElementById(&#x27;ca-feed-state&#x27;);
    st.textContent=&#x27;FETCHING SOCRATES…&#x27;;
    const bases=[
      &#x27;https://celestrak.org/SOCRATES/sort-minRange.csv&#x27;,
      &#x27;https://celestrak.org/SOCRATES/sort-maxProb.csv&#x27;,
      &#x27;https://celestrak.org/SOCRATES/socrates.csv&#x27;,
      &#x27;https://celestrak.org/SOCRATES/&#x27;
    ];
    let rows=null,src=null;
    for(const base of bases){
      const urls=[base,&#x27;https://corsproxy.io/?&#x27;+encodeURIComponent(base),
                  &#x27;https://api.allorigins.win/raw?url=&#x27;+encodeURIComponent(base)];
      for(const u of urls){
        try{
          const r=await fetch(u,{signal:fetchTimeoutSignal(20000)});
          if(!r.ok) continue;
          const txt=await r.text();
          rows=this.parseSocrates(txt);
          if(rows&amp;&amp;rows.length){src=base.endsWith(&#x27;/&#x27;)?&#x27;SOCRATES HTML REPORT&#x27;:&#x27;SOCRATES CSV&#x27;;break;}
        }catch(e){}
      }
      if(rows&amp;&amp;rows.length) break;
    }
    if(!rows||!rows.length){
      rows=this.sampleRows();src=&#x27;⚠ FEED UNREACHABLE — EMBEDDED SAMPLE&#x27;;
    }
    this._src=src;
    this.rows=rows;
    this.renderList();
    st.textContent=src+&#x27; · &#x27;+rows.length+&#x27; PAIRS&#x27;;
    if(this.sel&lt;0&amp;&amp;rows.length) this.select(0);
  },

  /* tolerant parser: SOCRATES CSV (header keyed) or the HTML report table */
  parseSocrates(txt){
    const out=[];
    if(/&lt;html|&lt;table/i.test(txt)){
      /* HTML report: rows carry NORAD ids, names, TCA, range, speed, prob */
      const trs=txt.split(/&lt;tr[^&gt;]*&gt;/i).slice(1);
      for(const tr of trs){
        const cells=[...tr.matchAll(/&lt;td[^&gt;]*&gt;([\s\S]*?)&lt;\/td&gt;/gi)].map(m=&gt;m[1].replace(/&lt;[^&gt;]+&gt;/g,&#x27;&#x27;).trim());
        if(cells.length&lt;8) continue;
        const nums=cells.map(c=&gt;parseFloat(c));
        /* heuristics: find two 4-6 digit ints (NORAD ids) and a date cell */
        const idIdx=cells.map((c,i)=&gt;/^\d{4,6}$/.test(c)?i:-1).filter(i=&gt;i&gt;=0);
        const tcaIdx=cells.findIndex(c=&gt;/\d{4}.*\d{2}:\d{2}/.test(c));
        if(idIdx.length&gt;=2&amp;&amp;tcaIdx&gt;=0){
          const rng=nums.find((v,i)=&gt;i&gt;tcaIdx&amp;&amp;isFinite(v)&amp;&amp;v&lt;50);
          const spd=nums.find((v,i)=&gt;i&gt;tcaIdx&amp;&amp;isFinite(v)&amp;&amp;v&gt;0.05&amp;&amp;v&lt;20);
          out.push({id1:cells[idIdx[0]],n1:cells[idIdx[0]+1]||&#x27;OBJ &#x27;+cells[idIdx[0]],
                    id2:cells[idIdx[1]],n2:cells[idIdx[1]+1]||&#x27;OBJ &#x27;+cells[idIdx[1]],
                    tca:new Date(cells[tcaIdx].replace(/\s+/,&#x27;T&#x27;)+&#x27;Z&#x27;),
                    rangeKm:rng??0,relV:spd??0,prob:null});
        }
        if(out.length&gt;=20) break;
      }
      return out.filter(r=&gt;r.tca&amp;&amp;!isNaN(r.tca));
    }
    /* CSV with a header row */
    const lines=txt.split(/\r?\n/).filter(l=&gt;l.trim());
    const hi=lines.findIndex(l=&gt;/TCA/i.test(l)&amp;&amp;/,/.test(l));
    if(hi&lt;0) return null;
    const H=lines[hi].split(&#x27;,&#x27;).map(s=&gt;s.trim().toUpperCase());
    const col=names=&gt;{for(const n of names){const i=H.findIndex(h=&gt;h.includes(n));if(i&gt;=0)return i;}return -1;};
    const c={id1:col([&#x27;NORAD_CAT_ID_1&#x27;,&#x27;SAT1_ID&#x27;,&#x27;OBJECT_1_ID&#x27;]),n1:col([&#x27;OBJECT_NAME_1&#x27;,&#x27;SAT1_NAME&#x27;]),
             id2:col([&#x27;NORAD_CAT_ID_2&#x27;,&#x27;SAT2_ID&#x27;,&#x27;OBJECT_2_ID&#x27;]),n2:col([&#x27;OBJECT_NAME_2&#x27;,&#x27;SAT2_NAME&#x27;]),
             tca:col([&#x27;TCA&#x27;]),rng:col([&#x27;TCA_RANGE&#x27;,&#x27;MIN_RNG&#x27;,&#x27;RANGE&#x27;]),
             v:col([&#x27;RELATIVE_SPEED&#x27;,&#x27;REL_SPEED&#x27;,&#x27;RELATIVE_VELOCITY&#x27;]),p:col([&#x27;MAX_PROB&#x27;,&#x27;PC&#x27;,&#x27;PROBABILITY&#x27;])};
    if(c.id1&lt;0||c.id2&lt;0||c.tca&lt;0) return null;
    for(let i=hi+1;i&lt;lines.length&amp;&amp;out.length&lt;25;i++){
      const f=lines[i].split(&#x27;,&#x27;).map(s=&gt;s.trim());
      if(f.length&lt;H.length-1) continue;
      const tca=new Date(f[c.tca].replace(&#x27; &#x27;,&#x27;T&#x27;)+(f[c.tca].endsWith(&#x27;Z&#x27;)?&#x27;&#x27;:&#x27;Z&#x27;));
      if(isNaN(tca)) continue;
      out.push({id1:f[c.id1],n1:c.n1&gt;=0?f[c.n1]:&#x27;OBJ &#x27;+f[c.id1],
                id2:f[c.id2],n2:c.n2&gt;=0?f[c.n2]:&#x27;OBJ &#x27;+f[c.id2],
                tca,rangeKm:c.rng&gt;=0?parseFloat(f[c.rng]):0,
                relV:c.v&gt;=0?parseFloat(f[c.v]):0,
                prob:c.p&gt;=0?parseFloat(f[c.p]):null});
    }
    return out;
  },
  sampleRows(){
    const h=3600000,now=Date.now();
    return[
      {id1:&#x27;25544&#x27;,n1:&#x27;ISS (ZARYA)&#x27;,id2:&#x27;48275&#x27;,n2:&#x27;CZ-5B R/B&#x27;,tca:new Date(now+9*h),rangeKm:1.42,relV:11.2,prob:2.1e-4},
      {id1:&#x27;43013&#x27;,n1:&#x27;NOAA 20&#x27;,id2:&#x27;29275&#x27;,n2:&#x27;FENGYUN 1C DEB&#x27;,tca:new Date(now+14*h),rangeKm:0.31,relV:14.6,prob:8.4e-4},
      {id1:&#x27;20580&#x27;,n1:&#x27;HST&#x27;,id2:&#x27;39084&#x27;,n2:&#x27;COSMOS 2251 DEB&#x27;,tca:new Date(now+22*h),rangeKm:0.88,relV:9.8,prob:1.2e-4},
      {id1:&#x27;48274&#x27;,n1:&#x27;TIANHE&#x27;,id2:&#x27;31114&#x27;,n2:&#x27;IRIDIUM 33 DEB&#x27;,tca:new Date(now+31*h),rangeKm:2.6,relV:12.4,prob:4.0e-5},
      {id1:&#x27;28654&#x27;,n1:&#x27;NOAA 18&#x27;,id2:&#x27;34454&#x27;,n2:&#x27;SL-16 R/B&#x27;,tca:new Date(now+41*h),rangeKm:0.54,relV:13.1,prob:5.5e-4}
    ];
  },

  setSort(s,btn){
    this.sort=s;
    document.querySelectorAll(&#x27;.ca-sort&#x27;).forEach(b=&gt;b.classList.remove(&#x27;on&#x27;));

  renderList(){
    const host=document.getElementById(&#x27;ca-list&#x27;);if(!host)return;
    const rows=[...this.rows];
    if(this.sort===&#x27;range&#x27;) rows.sort((a,b)=&gt;a.rangeKm-b.rangeKm);
    else if(this.sort===&#x27;tca&#x27;) rows.sort((a,b)=&gt;a.tca-b.tca);

      const dt=(r.tca.getTime()-EPOCH.ms())/1000;

        &#x27;&lt;div class=&quot;car-top&quot;&gt;&lt;span class=&quot;car-pair&quot;&gt;&#x27;+r.n1.slice(0,15)+&#x27; ⚠ &#x27;+r.n2.slice(0,15)+&#x27;&lt;/span&gt;&#x27;+
        &#x27;&lt;span class=&quot;car-rng&quot;&gt;&#x27;+(r.rangeKm&lt;1?(r.rangeKm*1000).toFixed(0)+&#x27; m&#x27;:r.rangeKm.toFixed(2)+&#x27; km&#x27;)+&#x27;&lt;/span&gt;&lt;/div&gt;&#x27;+
        &#x27;&lt;div class=&quot;car-sub&quot;&gt;&#x27;+r.id1+&#x27; × &#x27;+r.id2+&#x27; · TCA &#x27;+(dt&gt;0?&#x27;T−&#x27;+fmtHMS(dt):&#x27;T+&#x27;+fmtHMS(-dt))+
        &#x27; · &#x27;+r.relV.toFixed(1)+&#x27; km/s&#x27;+(r.prob?&#x27; · Pc &#x27;+r.prob.toExponential(1):&#x27;&#x27;)+&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
    }).join(&#x27;&#x27;);
  },

  async fetchTLE(id){
    if(this._tleCache[id]) return this._tleCache[id];
    /* a NORAD id may already be in a loaded catalog bucket */
    if(typeof CAT!==&#x27;undefined&#x27;&amp;&amp;CAT.sats.length){
      const hit=CAT.sats.find(s=&gt;String(s.tle.satnum)===String(id));
      if(hit){this._tleCache[id]=hit.tle;return hit.tle;}
    }
    const base=&#x27;https://celestrak.org/NORAD/elements/gp.php?CATNR=&#x27;+id+&#x27;&amp;FORMAT=tle&#x27;;
    for(const u of [base,&#x27;https://corsproxy.io/?&#x27;+encodeURIComponent(base),
                    &#x27;https://api.allorigins.win/raw?url=&#x27;+encodeURIComponent(base)]){
      try{
        const r=await fetch(u,{signal:fetchTimeoutSignal(15000)});
        if(!r.ok) continue;
        const t=await r.text();
        if(t.includes(&#x27;1 &#x27;)&amp;&amp;t.includes(&#x27;2 &#x27;)){
          const p=parseCatalog(t).filter(x=&gt;x.satrec);
          if(p.length){this._tleCache[id]=p[0];return p[0];}
        }
      }catch(e){}
    }
    return null;
  },

  async select(i){
    this.sel=i;this.renderList();
    const r=this._view[i];if(!r)return;
    document.getElementById(&#x27;ca-pair-title&#x27;).textContent=r.n1+&#x27;  ×  &#x27;+r.n2;
    document.getElementById(&#x27;ca-detail-state&#x27;).textContent=&#x27;FETCHING ELEMENT SETS…&#x27;;
    const[t1,t2]=await Promise.all([this.fetchTLE(r.id1),this.fetchTLE(r.id2)]);
    this.t1=t1;this.t2=t2;this.cur=r;
    if(!t1||!t2){
      document.getElementById(&#x27;ca-detail-state&#x27;).textContent=&#x27;⚠ TLE FETCH FAILED FOR &#x27;+(!t1?r.id1:r.id2)+&#x27; — GEOMETRY UNAVAILABLE&#x27;;
      return;
    }
    document.getElementById(&#x27;ca-detail-state&#x27;).textContent=&#x27;SGP4 ELEMENT SETS LOADED · EPOCHS &#x27;+fmtDateUTC(t1.epoch).slice(0,11)+&#x27; / &#x27;+fmtDateUTC(t2.epoch).slice(0,11);
    this.buildScene();
    this.drawSMA();
    this.renderDetail();
  },

  eciAt(tle,d){
    try{const pv=satellite.propagate(tle.satrec,d);
      if(pv&amp;&amp;pv.position&amp;&amp;isFinite(pv.position.x))
        return{r:[pv.position.x,pv.position.y,pv.position.z],v:[pv.velocity.x,pv.velocity.y,pv.velocity.z]};
    }catch(e){}
    return null;
  },

  buildScene(){
    const T=this.three,r=this.cur;
    /* clear previous pair artifacts */
    [&#x27;caOrb1&#x27;,&#x27;caOrb2&#x27;,&#x27;caMk1&#x27;,&#x27;caMk2&#x27;,&#x27;caMiss&#x27;,&#x27;caTCA&#x27;,&#x27;caSub&#x27;,&#x27;caSubLine&#x27;].forEach(n=&gt;{
      const o=T.scene.getObjectByName(n);if(o)T.scene.remove(o);
    });
    const mkOrbit=(tle,color,name)=&gt;{
      const P=tle.T_s,N=180,pts=[];
      for(let k=0;k&lt;=N;k++){
        const d=new Date(r.tca.getTime()+((k/N)-0.5)*P*1000);
        const s=this.eciAt(tle,d);
        if(s) pts.push(new THREE.Vector3(s.r[0],s.r[2],-s.r[1]));
      }
      if(pts.length&lt;2) return;
      const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({color,transparent:true,opacity:.9}));
      line.name=name;T.scene.add(line);
    };
    mkOrbit(this.t1,0x00e5ff,&#x27;caOrb1&#x27;);
    mkOrbit(this.t2,0xffd24a,&#x27;caOrb2&#x27;);
    const s1=this.eciAt(this.t1,r.tca),s2=this.eciAt(this.t2,r.tca);
    if(s1&amp;&amp;s2){
      const p1=new THREE.Vector3(s1.r[0],s1.r[2],-s1.r[1]);
      const p2=new THREE.Vector3(s2.r[0],s2.r[2],-s2.r[1]);
      const mk=(p,c,n)=&gt;{const m=new THREE.Mesh(new THREE.SphereGeometry(130,16,16),
        new THREE.MeshBasicMaterial({color:c}));m.position.copy(p);m.name=n;T.scene.add(m);};
      mk(p1,0x00e5ff,&#x27;caMk1&#x27;);mk(p2,0xffd24a,&#x27;caMk2&#x27;);
      const miss=new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1,p2]),
        new THREE.LineBasicMaterial({color:0xff5566}));
      miss.name=&#x27;caMiss&#x27;;T.scene.add(miss);
      const mid=p1.clone().add(p2).multiplyScalar(0.5);
      const tcaMk=new THREE.Mesh(new THREE.TorusGeometry(420,40,10,40),
        new THREE.MeshBasicMaterial({color:0xff5566,transparent:true,opacity:.65}));
      tcaMk.position.copy(mid);tcaMk.lookAt(0,0,0);tcaMk.name=&#x27;caTCA&#x27;;T.scene.add(tcaMk);
      /* conjunction SUB-POINT: rotate the ECI midpoint into ECEF at TCA → geodetic */
      const gm=gmst_from_jd(julianDate(r.tca)),ct=Math.cos(gm),st=Math.sin(gm);
      const mE=[ct*(s1.r[0]+s2.r[0])/2+st*(s1.r[1]+s2.r[1])/2,
               -st*(s1.r[0]+s2.r[0])/2+ct*(s1.r[1]+s2.r[1])/2,(s1.r[2]+s2.r[2])/2];
      const lon=((Math.atan2(mE[1],mE[0])*R2D+540)%360)-180;
      const lat=Math.atan2(mE[2],Math.hypot(mE[0],mE[1]))*R2D;
      this.subLL={lat,lon};
      /* the sub-point lives on the rotating earthMesh so it tracks GMST */
      const la=lat*D2R,lo=lon*D2R;
      const sp=new THREE.Mesh(new THREE.SphereGeometry(110,12,12),
        new THREE.MeshBasicMaterial({color:0xff5fd2}));
      sp.position.set(RE_KM*1.01*Math.cos(la)*Math.cos(lo),RE_KM*1.01*Math.sin(la),-RE_KM*1.01*Math.cos(la)*Math.sin(lo));
      sp.name=&#x27;caSub&#x27;;
      if(T.earthMesh) T.earthMesh.add(sp); else T.scene.add(sp);
      const sl=new THREE.Line(new THREE.BufferGeometry().setFromPoints([sp.position.clone().multiplyScalar(1.0),sp.position.clone().normalize().multiplyScalar(mid.length())]),
        new THREE.LineBasicMaterial({color:0xff5fd2,transparent:true,opacity:.3}));
      sl.name=&#x27;caSubLine&#x27;;
      if(T.earthMesh) T.earthMesh.add(sl); else T.scene.add(sl);
    }
  },

  /* osculating semi-major axis a(t)=1/(2/r − v²/μ) over ±12 h for both objects */
  drawSMA(){
    const c=document.getElementById(&#x27;ca-sma&#x27;);if(!c)return;
    c.width=c.clientWidth*2;c.height=c.clientHeight*2;
    const ctx=c.getContext(&#x27;2d&#x27;),W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=&#x27;rgba(2,8,14,.6)&#x27;;ctx.fillRect(0,0,W,H);
    const series=[[this.t1,&#x27;#00e5ff&#x27;],[this.t2,&#x27;#ffd24a&#x27;]].map(([tle,col])=&gt;{
      const pts=[];
      for(let k=0;k&lt;=96;k++){
        const d=new Date(this.cur.tca.getTime()+((k/96)-0.5)*24*3600*1000);
        const s=this.eciAt(tle,d);
        if(!s) continue;
        const rm=Math.hypot(...s.r),vm2=s.v[0]**2+s.v[1]**2+s.v[2]**2;
        pts.push({k,a:1/(2/rm-vm2/MU_E)});
      }
      return{pts,col,tle};
    });
    const all=series.flatMap(s=&gt;s.pts.map(p=&gt;p.a));
    if(!all.length) return;
    let aMin=Math.min(...all),aMax=Math.max(...all);
    const pad=(aMax-aMin)*0.15+0.5;aMin-=pad;aMax+=pad;
    /* TCA line */
    ctx.strokeStyle=&#x27;rgba(255,85,102,.8)&#x27;;ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=&#x27;rgba(255,85,102,.9)&#x27;;ctx.font=&#x27;13px IBM Plex Mono&#x27;;ctx.fillText(&#x27;TCA&#x27;,W/2+5,14);
    series.forEach(s=&gt;{
      ctx.beginPath();
      s.pts.forEach((p,i)=&gt;{
        const x=p.k/96*W,y=H-(p.a-aMin)/(aMax-aMin)*H;
        i?ctx.lineTo(x,y):ctx.moveTo(x,y);
      });
      ctx.strokeStyle=s.col;ctx.lineWidth=2.5;ctx.shadowColor=s.col;ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;
      const last=s.pts[s.pts.length-1];
      ctx.fillStyle=s.col;ctx.font=&#x27;13px IBM Plex Mono&#x27;;
      ctx.fillText(s.tle.name.slice(0,14)+&#x27; a≈&#x27;+last.a.toFixed(1)+&#x27; km&#x27;,8,s.col===&#x27;#00e5ff&#x27;?16:32);
    });
    ctx.fillStyle=&#x27;rgba(140,165,185,.85)&#x27;;ctx.font=&#x27;12px IBM Plex Mono&#x27;;
    ctx.fillText(&#x27;OSCULATING SMA · TCA ± 12 H&#x27;,W-220,H-8);
  },

  renderDetail(){
    const r=this.cur,el=document.getElementById(&#x27;ca-info&#x27;);
    const row=(k,v)=&gt;&#x27;&lt;div class=&quot;ssi-k&quot;&gt;&#x27;+k+&#x27;&lt;/div&gt;&lt;div class=&quot;ssi-v&quot;&gt;&#x27;+v+&#x27;&lt;/div&gt;&#x27;;
    el.innerHTML=&#x27;&lt;div class=&quot;ssi-name&quot; style=&quot;font-size:11px;&quot;&gt;CONJUNCTION GEOMETRY&lt;/div&gt;&#x27;+
      &#x27;&lt;div class=&quot;ssi-grid&quot;&gt;&#x27;+
      row(&#x27;OBJECTS&#x27;,&#x27;&lt;span style=&quot;color:#00e5ff&quot;&gt;&#x27;+r.n1+&#x27;&lt;/span&gt; (&#x27;+r.id1+&#x27;)&lt;br/&gt;&lt;span style=&quot;color:#ffd24a&quot;&gt;&#x27;+r.n2+&#x27;&lt;/span&gt; (&#x27;+r.id2+&#x27;)&#x27;)+
      row(&#x27;TCA&#x27;,fmtDateUTC(r.tca)+&#x27;&lt;span class=&quot;ssi-sub&quot;&gt;&#x27;+fmtLocalTime(r.tca,SITE.tz)+&#x27; LOCAL&lt;/span&gt;&#x27;)+
      row(&#x27;MISS DIST&#x27;,(r.rangeKm&lt;1?(r.rangeKm*1000).toFixed(0)+&#x27; m&#x27;:r.rangeKm.toFixed(2)+&#x27; km&#x27;))+
      row(&#x27;REL VELOCITY&#x27;,r.relV.toFixed(2)+&#x27; km/s&#x27;)+
      (r.prob!==null?row(&#x27;MAX Pc&#x27;,r.prob.toExponential(2)):&#x27;&#x27;)+
      (this.subLL?row(&#x27;SUB-POINT&#x27;,this.subLL.lat.toFixed(2)+&#x27;°, &#x27;+this.subLL.lon.toFixed(2)+&#x27;°&#x27;):&#x27;&#x27;)+
      (this.t1?row(&#x27;SMA / INC ①&#x27;,this.t1.a.toFixed(0)+&#x27; km · &#x27;+this.t1.inc.toFixed(1)+&#x27;°&#x27;):&#x27;&#x27;)+
      (this.t2?row(&#x27;SMA / INC ②&#x27;,this.t2.a.toFixed(0)+&#x27; km · &#x27;+this.t2.inc.toFixed(1)+&#x27;°&#x27;):&#x27;&#x27;)+
      &#x27;&lt;/div&gt;&#x27;;
  },

  frame(nowP,dt){
    const T=this.three;
    T.ctrl.update(dt);
    /* live markers at the global epoch + earth at GMST */
    const d=EPOCH.now();
    if(T.earthMesh) T.earthMesh.rotation.y=gmst_from_jd(julianDate(d));
    if(nowP-(this._sunT||0)&gt;400){this._sunT=nowP;T.setSun(sunECIUnit(d));}
    if(this.t1&amp;&amp;this.t2&amp;&amp;nowP-(this._mkT||0)&gt;120){
      this._mkT=nowP;
      const m1=T.scene.getObjectByName(&#x27;caMk1&#x27;),m2=T.scene.getObjectByName(&#x27;caMk2&#x27;);
      const s1=this.eciAt(this.t1,d),s2=this.eciAt(this.t2,d);
      if(m1&amp;&amp;s1) m1.position.set(s1.r[0],s1.r[2],-s1.r[1]);
      if(m2&amp;&amp;s2) m2.position.set(s2.r[0],s2.r[2],-s2.r[1]);
    }
    if(nowP-(this._listT||0)&gt;1000){this._listT=nowP;if(this.rows.length)this.renderList();}
    T.renderer.render(T.scene,T.camera);
  }
};

/* ╔══════════════════════════════════════════════════════════════════╗
   ║  MODULE · UIStateManager — lab-grade always-on persistence        ║
   ║  Every core parameter caches continuously to localStorage:        ║
   ║  camera viewpoints · active filters · selection arrays · time     ║
   ║  rate/offset · tab + sub-toggle states · sandbox sliders.         ║
   ║  A browser reset re-initializes straight into the prior layout.   ║
   ╚══════════════════════════════════════════════════════════════════╝ */
const STATE={
  KEY:&#x27;ssa.v4.state&#x27;,
  _t:null,_restoring:false,
  dirty(){ /* debounced save — call from any state-changing hook */
    if(this._restoring) return;
    clearTimeout(this._t);
    this._t=setTimeout(()=&gt;this.save(),900);
  },
  camOf(T){return T&amp;&amp;T.ctrl?{t:T.ctrl.tTheta,p:T.ctrl.tPhi,r:T.ctrl.tRad}:null;},
  applyCam(T,c){
    if(!T||!T.ctrl||!c) return;
    T.ctrl.tTheta=T.ctrl.theta=c.t;T.ctrl.tPhi=T.ctrl.phi=c.p;T.ctrl.tRad=T.ctrl.rad=c.r;
  },
  save(){
    try{
      const s={
        v:5,
        view:document.body.dataset.view||&#x27;tracker&#x27;,
        wxOpen,
        horizonH:HORIZON_S/3600,
        skyVisOnly:SKY_VIS_ONLY,
        catGroups:CAT.GROUPS.filter(g=&gt;g.on).map(g=&gt;g.id),
        catFilter:CAT.filter,
        rate:EPOCH.rate,
        minEl:(document.getElementById(&#x27;eph-minel&#x27;)||{}).value,
        ephPlotted:typeof EPH!==&#x27;undefined&#x27;?EPH.plotted.map(p=&gt;({cmd:p.cmd,name:p.name,g:p.g||&#x27;◆&#x27;})):[],
        ephActive:typeof EPH!==&#x27;undefined&#x27;?EPH.active:null,
        sel:SEL.map(s=&gt;s.tle.satnum),
        sandbox:DISC.sandbox,
        cardSel:DISC._cardSel,
        ssScale:typeof SS!==&#x27;undefined&#x27;?SS.trueScale:undefined,
        cams:{
          eci:this.camOf(typeof eciThree!==&#x27;undefined&#x27;?eciThree:null),
          ecef:this.camOf(typeof ecefThree!==&#x27;undefined&#x27;?ecefThree:null),
          cat:this.camOf(CAT.three),
          ca:this.camOf(typeof CA!==&#x27;undefined&#x27;?CA.three:null),
          ss:this.camOf(typeof SS!==&#x27;undefined&#x27;?SS.three:null),
          sb:this.camOf(DISC.three)
        }
      };
      localStorage.setItem(this.KEY,JSON.stringify(s));
    }catch(e){}
  },
  load(){
    try{return JSON.parse(localStorage.getItem(this.KEY)||&#x27;null&#x27;);}catch(e){return null;}
  }
};

/* ════ VIEW SWITCHING ════ */
function switchView(v){
  document.body.dataset.view=v;
  document.querySelectorAll(&#x27;.view&#x27;).forEach(el=&gt;el.classList.remove(&#x27;active&#x27;));
  document.getElementById(&#x27;view-&#x27;+v).classList.add(&#x27;active&#x27;);
  document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach(b=&gt;b.classList.toggle(&#x27;active&#x27;,b.dataset.view===v));
  try{
  if(v===&#x27;catalog&#x27;&amp;&amp;!CAT.inited){
    CAT.init();
    CAT.loadChecked();
    const c=STATE._pending&amp;&amp;STATE._pending.cams?STATE._pending.cams.cat:null;
    if(c) STATE.applyCam(CAT.three,c);
  }
  if(v===&#x27;eph&#x27;){
    if(!EPH._listDone){
      EPH.renderList();
      EPH.renderSiteChip();
      const sel=document.getElementById(&#x27;eph-site-sel&#x27;);
      EPH.SITES.forEach((s,i)=&gt;{
        if(i===0) return;
        const o=document.createElement(&#x27;option&#x27;);o.value=i;o.textContent=s.n;sel.appendChild(o);
      });
    }
    if(!SS.inited){
      SS.init();
      document.querySelectorAll(&#x27;.ss-scale-btn&#x27;).forEach((b,k)=&gt;b.classList.toggle(&#x27;on&#x27;,(k===1)===SS.trueScale));
      const c=STATE._pending&amp;&amp;STATE._pending.cams?STATE._pending.cams.ss:null;
      if(c) STATE.applyCam(SS.three,c);
      /* restore plotted deep-space targets sequentially */
      const pl=STATE._pending?STATE._pending.ephPlotted:null;
      if(pl&amp;&amp;pl.length&amp;&amp;!EPH.plotted.length){
        (async()=&gt;{
          for(const p of pl){await EPH.select(p);}
          if(STATE._pending.ephActive) EPH.active=STATE._pending.ephActive;
          EPH.renderList();EPH.drawChart();
        })();
      }
    }
    if(EPH.activePlot()) setTimeout(()=&gt;EPH.drawChart(),40);
  }
  if(v===&#x27;ca&#x27;&amp;&amp;!CA.inited){
    CA.init();
    const c=STATE._pending&amp;&amp;STATE._pending.cams?STATE._pending.cams.ca:null;
    if(c) STATE.applyCam(CA.three,c);
  }
  if(v===&#x27;disc&#x27;&amp;&amp;!DISC.inited){
    DISC.init();
    const c=STATE._pending&amp;&amp;STATE._pending.cams?STATE._pending.cams.sb:null;
    if(c) STATE.applyCam(DISC.three,c);
  }
  if(v===&#x27;tracker&#x27;&amp;&amp;SEL.length&amp;&amp;SEL[0].data){
    /* hidden canvases collapse to 0×0 — repaint static layers on return */
    setTimeout(()=&gt;renderAllSel(),30);
  }
  }catch(err){
    console.error(&#x27;[switchView:&#x27;+v+&#x27;]&#x27;,err);
    if(typeof reportRuntimeError===&#x27;function&#x27;) reportRuntimeError(&#x27;TAB &#x27;+v.toUpperCase()+&#x27; INIT: &#x27;+err.message,err);
  }
  STATE.dirty();
}

/* ════ WX STRIP COLLAPSE ════ */
let wxOpen=false;
function toggleWx(){
  wxOpen=!wxOpen;
  document.getElementById(&#x27;wx-strip&#x27;).classList.toggle(&#x27;open&#x27;,wxOpen);
  document.getElementById(&#x27;wx-toggle-btn&#x27;).textContent=wxOpen?&#x27;▾ COLLAPSE&#x27;:&#x27;▸ EXPAND&#x27;;
  STATE.dirty();
}

/* ════ V4 · BOOT — restore exact prior operating state ════ */
window.addEventListener(&#x27;load&#x27;,async()=&gt;{
  try{
  SITE.tzOffsetMin=computeTZOffsetMin(SITE.tz);
  const saved=STATE.load();
  STATE._pending=saved;
  STATE._restoring=true;

  document.getElementById(&#x27;load-msg&#x27;).textContent=&#x27;Initializing 3-D scenes…&#x27;;
  setupResizers();
  initThreeScenes();
  EPOCH.bindHUD();
  masterLoop();
  loadWorldMap(()=&gt;{});
  updateLocalTZLabel();
  setupGTClick();

  /* restore simple toggles before any propagation */
  if(saved){
    if(saved.horizonH) setHorizon(saved.horizonH);
    if(saved.skyVisOnly) toggleSkyVis();
    if(saved.wxOpen) toggleWx();
    if(saved.rate!==undefined&amp;&amp;saved.rate!==1) EPOCH.setRate(saved.rate);
    if(saved.minEl&amp;&amp;document.getElementById(&#x27;eph-minel&#x27;)) document.getElementById(&#x27;eph-minel&#x27;).value=saved.minEl;
    if(saved.catGroups&amp;&amp;saved.v&gt;=5) CAT.GROUPS.forEach(g=&gt;g.on=saved.catGroups.includes(g.id));
    if(saved.catFilter){CAT.filter=saved.catFilter;
      const fb=document.querySelector(&#x27;#cat-filter-bar .cfb-btn.on&#x27;);
      document.querySelectorAll(&#x27;#cat-filter-bar .cfb-btn&#x27;).forEach(b=&gt;{
        const lbl={ALL:&#x27;ALL OBJECTS&#x27;,ACTIVE:&#x27;ACTIVE SATS&#x27;,DEBRIS:&#x27;DEBRIS ONLY&#x27;,RB:&#x27;ROCKET BODIES&#x27;}[saved.catFilter];
        b.classList.toggle(&#x27;on&#x27;,b.textContent===lbl);
      });}
    if(saved.sandbox) DISC.sandbox=saved.sandbox;
    if(saved.cardSel!==undefined) DISC._cardSel=saved.cardSel;
    if(saved.ssScale!==undefined&amp;&amp;typeof SS!==&#x27;undefined&#x27;) SS.trueScale=!!saved.ssScale;
    if(saved.cams){
      STATE.applyCam(eciThree,saved.cams.eci);
      STATE.applyCam(ecefThree,saved.cams.ecef);
    }
  }

  document.getElementById(&#x27;load-msg&#x27;).textContent=&#x27;Fetching TLE catalog from Celestrak…&#x27;;
  let raw=await fetchGroup(&#x27;stations&#x27;);
  allSats=raw?parseCatalog(raw):getFallbackSats();
  if(!raw) document.getElementById(&#x27;sat-list&#x27;).innerHTML=
    &#x27;&lt;div class=&quot;loading-list&quot; style=&quot;color:var(--amber)&quot;&gt;⚠ CORS blocked.&lt;br&gt;Showing embedded samples.&lt;/div&gt;&#x27;;
  populateList(allSats);

  /* restore the ActiveSelection array (NORAD ids), else default to ISS */
  let restored=0;
  if(saved&amp;&amp;saved.sel&amp;&amp;saved.sel.length){
    saved.sel.forEach(sn=&gt;{
      const tle=allSats.find(t=&gt;t.satnum===sn);
      if(tle&amp;&amp;SEL.length&lt;SEL_MAX&amp;&amp;!SEL.find(s=&gt;s.tle.satnum===sn)){
        SEL.push({tle,color:SEL_COLORS[SEL.length]});restored++;
      }
    });
  }
  if(!restored){
    const iss=allSats.find(t=&gt;t.satnum===25544)||allSats[0];
    if(iss) SEL.push({tle:iss,color:SEL_COLORS[0]});
  }
  if(SEL.length){renderAllSel();startTimers();}

  document.getElementById(&#x27;loading-overlay&#x27;).classList.add(&#x27;hide&#x27;);
  setTimeout(()=&gt;{document.getElementById(&#x27;loading-overlay&#x27;).style.display=&#x27;none&#x27;;},700);
  setTimeout(()=&gt;fetchConditions(),1500);

  /* restore active tab last (lazily boots its module) */
  STATE._restoring=false;
  if(saved&amp;&amp;saved.view&amp;&amp;saved.view!==&#x27;tracker&#x27;) switchView(saved.view);

  /* continuous cache: heartbeat save every 10 s + camera deltas */
  setInterval(()=&gt;STATE.save(),10000);
  }catch(err){
    console.error(&#x27;[boot]&#x27;,err);
    if(typeof reportRuntimeError===&#x27;function&#x27;) reportRuntimeError(&#x27;BOOT FAILED: &#x27;+err.message,err);
    /* never strand the user behind the loading overlay */
    const ov=document.getElementById(&#x27;loading-overlay&#x27;);
    if(ov){ov.classList.add(&#x27;hide&#x27;);setTimeout(()=&gt;ov.style.display=&#x27;none&#x27;,700);}
  }
});
&lt;/script&gt;
&lt;script&gt;
/* ══ SSA→VR BRIDGE SHIM v2 (injected) ══ */
(function(){
  function mk(){
    try{
      window.__SSA_BRIDGE={
        ready:true,
        get SEL(){return SEL;},
        get EPOCH(){return EPOCH;},
        get allSats(){return allSats;},
        get currentTLE(){return currentTLE;},
        get SEL_COLORS(){return SEL_COLORS;},
        get CAT(){return (typeof CAT!==&#x27;undefined&#x27;)?CAT:null;},
        get CA(){return (typeof CA!==&#x27;undefined&#x27;)?CA:null;},
        consts:{MU_E:MU_E,RE_KM:RE_KM,WE:WE},
        satellite:window.satellite,
        selectSat:function(t){return selectSat(t);},
        renderAllSel:function(){return renderAllSel();},
        startTimers:function(){return startTimers();},
        setRate:function(r){try{EPOCH.setRate(r);}catch(e){}},
        setOffset:function(ms){try{EPOCH.setOffset(ms);}catch(e){}},
        liveNow:function(){try{EPOCH.live();}catch(e){}},
        offsetMs:function(){try{return EPOCH.offsetMs();}catch(e){return 0;}},
        now:function(){return EPOCH.now();},
        ms:function(){return EPOCH.ms();},
        rate:function(){return EPOCH.rate;},
        gmst:function(d){return gmst_from_jd(julianDate(d));},
        sunECI:function(d){try{return sunECIUnit(d);}catch(e){return [1,0,0];}},
        initDisc:function(){try{if(typeof DISC!==&#x27;undefined&#x27;&amp;&amp;!DISC.inited)DISC.init();}catch(e){}},
        initCatalog:function(){try{if(typeof CAT!==&#x27;undefined&#x27;){if(!CAT.inited)CAT.init();CAT.loadChecked();}}catch(e){}},
        initCA:function(){try{if(typeof CA!==&#x27;undefined&#x27;&amp;&amp;CA.init&amp;&amp;!CA.inited)CA.init();}catch(e){}},
        switchView:function(v){try{switchView(v);}catch(e){}}
      };
      if(typeof CA!==&#x27;undefined&#x27;&amp;&amp;typeof CA.select===&#x27;function&#x27;&amp;&amp;!CA.__vrWrapped){
        CA.__vrWrapped=true;
        var _o=CA.select.bind(CA);
        CA.select=function(i){
          var r=_o(i);
          var emit=function(){try{window.dispatchEvent(new CustomEvent(&#x27;ssa:ca-select&#x27;,
            {detail:{pair:(CA._view&amp;&amp;CA._view[i])||null,t1:CA.t1,t2:CA.t2}}));}catch(e){}};
          Promise.resolve(r).then(emit); setTimeout(emit,700);
          return r;
        };
      }
      console.info(&#x27;[ssa-bridge] v2 ready&#x27;);
    }catch(e){ console.error(&#x27;[ssa-bridge] retry&#x27;,e); setTimeout(mk,500); }
  }
  if(document.readyState!==&#x27;loading&#x27;) setTimeout(mk,400);
  else window.addEventListener(&#x27;DOMContentLoaded&#x27;,function(){setTimeout(mk,400);});
})();

			<a-plane class="clickable rot-btn"  data-rot="0.26"  position="0.54 0 0"  width="0.11" height="0.05" material="shader: flat; color: #14304a"><a-text value="ROT ⟳" align="center" color="#cfe8f0" width="0.4" position="0 0 0.001"></a-text></a-plane>

		<a-entity id="scrub-bar" position="0 0.78 -1.30" rotation="-55 0 0">

			<a-text id="scrub-label" value="T +0.0 h · LIVE" position="0 0.055 0" align="center" color="#7fd8ff" width="0.9"></a-text>
			<a-plane id="live-btn" class="clickable" position="0.40 0 0" width="0.12" height="0.05" material="shader: flat; color: #103a2a"><a-text value="● LIVE" align="center" color="#4dffb0" width="0.42" position="0 0 0.001"></a-text></a-plane>
		</a-entity>

		<!-- legend hologram (left of table) -->
		<a-plane id="legend-panel" position="-0.86 0.95 -1.15" rotation="-12 34 0" width="0.42" height="0.25"></a-plane>

		<!-- CA alert pylon (left) -->
		<a-plane id="beacon-panel" class="clickable" position="-1.05 1.28 -0.85" rotation="0 42 0" width="0.5" height="0.235"></a-plane>
		<a-plane id="exitca-btn" class="clickable" visible="false" position="0 0.95 -1.02" rotation="-30 0 0" width="0.3" height="0.07" material="shader: flat; color: #401014"><a-text value="⨯ EXIT CA VIEW" align="center" color="#ff8888" width="0.8" position="0 0 0.001"></a-text></a-plane>

		<!-- search pad (right) -->
		<a-plane id="search-panel" class="clickable" position="1.05 1.25 -0.85" rotation="0 -42 0" width="0.55" height="0.45"></a-plane>

		<!-- intro briefing -->
		<a-plane id="intro-panel" class="clickable" position="0 1.62 -1.02" rotation="0 0 0" width="1.28" height="0.80"></a-plane>
		<a-plane id="intro-start" class="clickable" position="0 1.16 -1.00" width="0.34" height="0.08" material="shader: flat; color: #00ffcc"><a-text value="▶ BEGIN MISSION" align="center" color="#021018" width="0.9" position="0 0 0.001"></a-text></a-plane>

		<!-- holographic Earth volume -->
		<a-entity id="earth-volume" position="0 1.25 -1.5" scale="0.0000142301 0.0000142301 0.0000142301">
			<a-sphere id="vr-earth" radius="6378.137" segments-width="48" segments-height="48"></a-sphere>
			<a-sphere id="pick-sphere" class="clickable" radius="47000"
				material="shader: flat; opacity: 0.0; transparent: true; side: double" visible="true"></a-sphere>
		</a-entity>

		<!-- hover holo-tooltip (world space, billboard) -->
		<a-plane id="sat-tip" visible="false" width="0.30" height="0.10" material="transparent: true"></a-plane>

		<!-- 180° arc panels + neon frames -->
		<a-plane position="-1.81 1.5 0"        rotation="0 90 0"  width="1.16" height="0.72" material="shader: flat; color: #00ffcc; opacity: 0.10; transparent: true"></a-plane>
		<a-plane id="vr-p-wx"    class="vr-panel" position="-1.8 1.5 0"        rotation="0 90 0"  width="1.1" height="0.66"></a-plane>
		<a-plane position="-1.281 1.5 -1.281"  rotation="0 45 0"  width="1.16" height="0.72" material="shader: flat; color: #00ffcc; opacity: 0.10; transparent: true"></a-plane>
		<a-plane id="vr-p-oe"    class="vr-panel" position="-1.273 1.5 -1.273" rotation="0 45 0"  width="1.1" height="0.66"></a-plane>
		<a-plane position="0 1.5 -1.81"        rotation="0 0 0"   width="1.16" height="0.72" material="shader: flat; color: #00ffcc; opacity: 0.10; transparent: true"></a-plane>
		<a-plane id="vr-p-gt"    class="vr-panel" position="0 1.5 -1.8"        rotation="0 0 0"   width="1.1" height="0.66"></a-plane>
		<a-plane position="1.281 1.5 -1.281"   rotation="0 -45 0" width="1.16" height="0.72" material="shader: flat; color: #00ffcc; opacity: 0.10; transparent: true"></a-plane>
		<a-plane id="vr-p-sky"   class="vr-panel" position="1.273 1.5 -1.273"  rotation="0 -45 0" width="1.1" height="0.66"></a-plane>
		<a-plane position="1.81 1.5 0"         rotation="0 -90 0" width="1.16" height="0.72" material="shader: flat; color: #00ffcc; opacity: 0.10; transparent: true"></a-plane>
		<a-plane id="vr-p-stats" class="vr-panel" position="1.8 1.5 0"         rotation="0 -90 0" width="1.1" height="0.66"></a-plane>
